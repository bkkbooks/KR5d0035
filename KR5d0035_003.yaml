front:
  text: 金鎖流珠引卷之三
  hash: sha256:bbd0b4cddbb77b4a7e632af287c98c709c14b2275cf185941ab849be3df91daa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_003-001a, image: hfl/0631/0631-068.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注初受三五法夫志人受法籙初受三五之法未知其理分别三者三元註上中下三元前聖老君謂之太一註出太玄故曰太一太極真人受之於太上老君分符破契以盟二天師與弟子同在壇中一一唱將軍姓名而度弟子唱受受後不得妄行元勑令刺手血以爲水水和之師弟子飲之爲盟各下髮爲結結鐶爲誓約約不背師反道及背三官當以考召其身吏兵先坐其罪可不慎之謹其身故爲盟誓也之法籙本有一千七百九十卷以太一爲名謂之天教三者名曰三元籙五者名曰五行籙其三五之法則爲上中下三等法也修真道之部上部天人所修中部神仙所修下部丗人所修故從三元而修上至天真中至神仙下至人仙丗人屬居下界故先真仙下法所修進中上也此書上極畢上部中極中部下極下部號曰太一三五金籙玉籙内典註後聖攺爲正一之法名曰金鎖流珠也後聖君傳授正一真人註張天師是也號正一真人便因名三五正一爲號三者是三元五者是五行也天地之精亦人之五靈註五行在天爲五星在地爲五嶽在人爲五蔵若能存思安鎭五蔵五行神常備具則堅牢不敗不壞便是真人長生不死謂之曰五靈也能明三五法即得長生此正一法籙本一千七百九十卷三千六百二十四階後聖君以爲三元部之上部名曰上元主天註應是天上大真大神大仙之衆皆有籙掌主也置三大將軍籙部領一千三百六十階籙註二百二十四階傳於下土洞天中足一百二十階出丗丗人得足者皆任神仙天官上品即長生真人也若欠闕不足即不得長生也中元主人亦有三大將軍主領一千階籙註五百六十階傳下丗洞天中足二百四十八階出人丗丗人得足者皆任大真官欠闕不足即不度丗也下元主地及水亦三大將軍主領一千一百五十二階籙註八百七十二階傳下丗洞天中足五百五十階出人丗丗人得足者皆任地仙也欠闕不足即不得延命壽託化貴門也以爲三統部領立三元將軍防衛於内治身救人置三官主掌於外驅鬼使神制約人物皆是三元五星之所主也皆祕於上天正一之籙都有三千六百二十四階下界修行之人知有其數者亦得入長生之位人也何況受得傳留或流丗足者便是仙人更以修行十年之外白日上昇天真後聖君再言人世有修行之士上元足者任爲天仙中元足者任爲人中之仙下元足者任爲地仙三元俱足者其任爲天仙之官真人之位功滿白日拔宅上昇如世有師可一一依師口言立誓及信不得違犯科盟犯即天罰三官記録不得爲真人故言初受三五之法授受不可妄行卿須教授初學者使依師約命行用令後人繼代存師有靈有驗註後聖爲道陵之師陵日日思存不休如卧亦想如見捻訣存之一年功力神通制伏祅祟鬼賊畏而伏罪合死陵以放之不伏罪之者陵以誅之於是蜀川鬼獄之地爲福德之鄉人鬼得恩无不敬奉之時天地舉功後聖遷爲三天正一真人號三天大法師子孫繼代拔宅上昇是其志心存想今傳授正一上清法師之功應驗修行年數功滿舉家得道俱昇矣繼代神通流出吾法謂之流珠此即是大道上足弟子也若遇非人所見所聞問以虛言但以不言皆以他對此即名金鎖故攺神仙之正法名金鎖流珠三五之法初受義也小王君曰夫爲師之道先明其三五太一註太一者本上清太玄之法也老君取名太一之經籙定三等也正一後聖君再言正者正其心一者通其道也註陸法師解正直其心從一取道道之性无偏黨正直過心若能志節抱直而行心性不生二三則道不離心性故經云道生一是也其正一之名管通於三五之部註上部上元中部中元下部下元五隨之上部言上清中部言正一註正一言人身之事故言居中元中部靈寳五符五嶽眞形圖言地上之法故合居下元下部是也下部言五法是後聖君傳授之時有三部分付大王君方平二百五十六號曰三元置三元齋註時秦昭王四年正月十五日授度也茅君喜時同匕十卷而爲仙人王君爲真人而巳分爲三元法籙註法是經无吏兵將軍神人形名籙是天符書天之文管天之神符書赫弈形影雰雰上則正於天中則正人制神下則檢約地水龍鬼精妖之炁令歸正道也謂之天地人上元約天通籙上清註上清經法符籙皆屬上元所部形影三百六十階中元制神助人逮通治病助國下元攝録地水神鬼精妖之炁役使神靈鬼精等祐人除斥災害之法用下元之法也後聖君曰上元之法主天官中元之法主人身中仙靈官也下元之法主地水中仙靈官也各有主將吏兵以約三官中神鬼精妖令不爲人天祟害故上聖置三五經圖正一之道註正一者正心取道更无二三故名正一後聖君見其大道門戶稍多後學者初心迷惑恐失其眞性故上於太上大道君前請攺金籙玉籙經名教化下界人民令一心敬信者入一門中精修便令得道而取名曰正一此法者一向正心求修至真不以邪見惑志以至功德得道不在捨妻棄子不在絶榖棲山棄官隱丗後令成道後聖君三爲宰輔七百五十年仕殷周事六十四天子而上昇爲上清太平金闕帝晨後聖玄元玉皇上道君豈在山林之中棄捨妻子絶榖隱丗而得也初受及修求門戸具前註初受上清法引老君曰夫上清法者是上清髙上至真至聖太上大道君内玉籙金籙大法也以管上清太上諸君丈人諸天帝君大神之官上仙真官上靈官將軍兵士吏等百千億萬衆皆上清經法籙之部使也初受時可齋戒七日告盟天地日月星宿訖仍令別一道者啓告於保舉師請保某身心謹直節志䖍懇奉慕大道萬里尋師註如近即云負笈尋師伏乞尊師慈仁見照與某保舉凡身進啓某尊師門下進受上清玉籙云云等二十四階或三十六階得恩賜許敢負違盟約七祖爲盟誓敢輕師負道身謝三官以死無恨謹陳口啓未敢冒辭再拜註如許即於傳度儀上具辭投辭訖一一依師所破用而力所不辨即拜告請言此物辦力所不及尊師放得即立壇三日三夜陳告十方奏啓太上道君太上老君太平金闕帝晨後聖玄元玉皇上道君三聖天尊皆黄表赤文得告報後方始得授傳授傳皆依儀法初受三註上中下三元也五註五星五靈五行五聲五形五藏五指五頭五炁金鎖流珠經云在天爲五星在道爲五靈在神爲五行在樂爲五聲在地爲五嶽在人爲五藏在手爲五指在法爲五頭在禁術爲五炁故爲之三五一十五人之性命屬此五行也後聖君告尹真人口訣云人知受三五者各有其功隨師指受也志人依師師與依儀不違署付法訣投授如此之志皆得成道經云至道爲師志人受道受極三元億劫長存受畢五星迴出長生神仙度丗飛昇上清之法法在他國亦往他國註經云明師上法在他方國土欲求㝷受者身不逺千里而求師不可苦請師來來亦非法也如若有王命身不由心即禮請禮請不違科律法在靈山亦往靈山註後聖君告後聖大司馬曰卿學道仰貴輕賤不可得道備卿之身夫道在於山事須依山而受道在城市事須依城市而受道在下愚㣲賤之人亦須依指示而授不得輕師慢道言似有輕即失人身而爲下鬼者更不復人身輕浮雖是下人之妻身且有道德卿曽闌膝下拜爲師何忽失言輕笑他自責己身罵以小年无知於庸下女人受三五及上清等法痛之甚卿豈不有此言孟司馬對曰却是詢凡愚庸下及笑於師且衛輕浮今得上真之位稱上天夫人詢至愚至凡肉眼无識死罪伏願天尊大通道力見念令作何法禮謝見捨其罪後聖君再告卿但於三五正法帶佩於身本命日悔過謝其言之及甲子日亦須謝過二年之内必當得道詢依言謝之二年後聖君召爲後宫南府大司馬主教十天合得仙莫輕師之道後聖君再告尹真人師若凡常其理亦不得言其師有過失況其師有志道更不得失言亦便爲試不過太上遥見必加其罪罪書輕師師弟失神仙之品退仙二階師亦退階慎之慎之老君曰夫爲師傳受大道之法若自未究其道源通靈通天地濟世之術有功即不合爲人師妄傳至道令其繼代失道宗元彼此得罪不輕此等天曹判輕泄之罪者黄帝時有南山君註姓南名山君隱山有學知儒禮樂之典甚深稱積德積仁深入大道之教棲山四十餘載不出人間傳弟子一千人以名多忽聞上帝勑令侍仙真人下勘其南山君曰責卿學道師何人今傳道法於衆山君對曰師西山君註姓西名山君今改姓白取白西義名西番地於是真人令司命召西山子到又責曰卿輒稱有道何德於天何德於地何功於人忽傳至道於南山子傳衆百姓多以洩露天文熏濁真聖炁穢天文且子身未通靈濟身未得老病垂死忽爾度人太上大道君令我召汝問其妄度人之由速須一一具說其由我當上奏亦與子開正方便出過減罪西山子對君以志心學道久隱山中本自修行後當濟民而被南山子苦以膝行求受炁術并五帝靈符註今真文是又五符是三皇内籙金經註金鎖流珠是也玉籙註二十四道君玉籙也叄等三十六卷且臣昔於昊天氏邊受得以代相繼不許妄爲伏願天真哀救西君洩露天書之過非敢妄不受而則自傳不相代伏受正盜傳度之罪真人曰不道君妄傳爲受法自己未得通靈年限未滿何積違科別无盜用之名據此罪亦合退仙子但言得保舉人廣成君保無洩露即身得無過西山君再拜稱死罪再謝真人上天宫啓太上適罪也註若據如此即不可妄傳傳須得其理依科也後聖君告天師曰卿繼代傳三五正法上清真經内籙等周三元五靈註五靈法中法周備中謂之五靈也畢即受真炁註炁有三等上等三元爲之元炁上天爲大道文法中等五行爲之真炁上天爲之武法下等六甲謂之神炁天上人中地謂之一文一武禁炁通神之力故學道初門爲神仙初品告令後學人莫不先依之以受法籙周畢者受此三等真炁以知修行之門得日日言功上士功滿三千白日昇天包三元五行六甲七星註星躡歩天綱地紀法六法註正一三元五行六甲七星八卦九宫六法俱管天地神靈周遍无不伏心受驅使之俱周畢分旌分節授劔訖即師分旌節名簡於洞府地戸九仙宫之門註地戸仙宫正是括蒼洞天括蒼山中是東正樂成西連括州南正永嘉北接樂安是也師於門授畢書寫人間法籙經籍靈書等法足即從六甲法中及躡歩中修行言功功滿白日上昇如欲人間及本師言奏給世上真官之位卿須繼代著書封入仙郷里貫一一上奏係天曹籍於是天師奉太上之言封西蜀山二十四所爲治置治官以通地戸九仙之意註天師云去東南地戸逺所以封置蜀山請爲二十四治每治請係合昇天仙一萬人以代地戸九仙宫之義當天師在世時移地戸仙宫事於蜀判天師上昇後又移於括蒼山東正洞天中判但地上有事皆此宫奏上天曹取報告天符即下老君告東海東水陸仙母註水陸仙母彭夫人也彭祖長女也初嫁王家十年夫亡再嫁孟家夫又亡遂即清髙尚心學道初見地蛇於塵中行屈曲之路因以學曲行三歩常往往行之喜弄耳如此得七年忽見一女曰學歩綱也對曰閑以亂行非爲歩也因每日學蛇行所以履之稍熟令人好行之非有心求道如此妄行某豈有志心求道作此妖妄更令人心修有何所益女子曰蛇歩龍綱捍辟不祥也吾是西王母仲女也見母好歩綱受以躡地紀之法與之母行一十四年昇東海東太上封方丈山女居之爲水陸仙母令掌方丈及海陸地女人求仙主教天使令所傳而成至道曰汝世人也受仙師之教得仙在速汝教世人須以傳其志人也亦令三五之法備周直指其元令得在速非人勿傳之勿犯之當退汝身今近代傳七女子皆得道後聖統仙總真王君曰從此卷向前是上元之法也金鎖流珠引卷之三
