front:
  text: 太玄金籙金鎖流珠引序思一
  hash: sha256:3ed58d493717418e6fdb4d6fe7daee8190e14c2b58e89d7c9873c75a0cec9c4f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_000-001a, image: hfl/0631/0631-004.png}
body:
  text: 中華仙人李淳風序并注太上三五太玄金籙者即元始天尊傳太上大道君也號髙聖太上玉晨玄皇大道君注元始分身也或云天尊弟子為萬道之主道君傳紫清太素髙虛洞曜三元上道君君傳紫晨太微天帝道君注時號上清至真道尊為三十六天之主也君傳紫明太微九道髙元玉晨道君又傳太上老君注一云太上老君是太上道君弟子非師太微天帝應是傳太平金闕帝晨後聖玄元上道君也此亦是太上老君分身故稱託胎出號老子而授流珠履斗之法太微天帝君之下玉晨道君傳紫元太微八素三元玄晨元君君傳紫微元靈龜臺九靈太真元君注主教訓天下學真之人君傳大靈上霄飛晨中央黃老君君傳太元東霞搏桑丹林大帝上道君君住搏桑傳二十真人中土絶傳紫晨太微天帝道君傳上清太平金闕帝晨後聖玄元玉皇上道君注一云玉皇帝大道君是也主下理十天封掌兆人上通上清為後聖君前聖太上道君稱萬道之主號曰虛皇後聖太上老君稱萬道之君號曰玉皇自有金闕帝君官臣具足亦如世人君人臣之任各有主掌天宫九野皆周也君姓李名𣆀字伯陽攺金籙名之曰太玄三五金鎖流珠經籙正論履斗步綱之要籙有八十六篇四十三卷上詣太上老君號髙聖太上玉晨玄皇大道君請此四十三卷下傳世人係代為真君真臣願度十天注九野之數并下天界曰十天世界為上天神仙都玉京稱玉皇上帝也以自撰略為一十五卷正經及掌訣圖書論步綱躡紀之事總號之金鎖大名次流珠次飛步天綱次即禹步地紀傳二十卷與尹君君號後聖大法師左上卿卿傳方諸大真人皆佐後聖聖又傳後聖太師注天師是也太微左真保皇道君注主封校兆人三天之上九天官主後聖又傳九微太真玉闕上相大司命髙晨師東海玉明青華小童道君注主教知真而得真者有志修之人得正度傳法為上真仙都玉京金闕後聖玉皇帝君下仙之臣後聖君又傳後聖上保注君封此位司南極太丹元君紫元夫人注主教當為真人者便授太丹之經流珠之訣夫人有二人一紫微夫人姓李後聖君第三女曽事清河王君注方平小子也子為周穆王上宰相年百年而巳性不於道著功夫人勸行履斗之法不行也注名仲春君又傳白山太素真君注念同王下教真道也後聖君又傳後聖上宰注仙家上宰臣總真之位如世上尚書宰相之位西極總真王君注主教成真者便行教修金鎖流珠金經金籙之道多有拔宒上升家口俱去者至多也總真傳南極南嶽真人左仙公太虛上真赤君注主教當為真人者即授此流珠飛步之道與君下再與行之又傳侍帝晨領五嶽司右弼王桐柏真人王君佐後聖君後聖君再授玄洲注一云玄州字是也二十九真人注主關奏仙名應合受師奏授籙法令試不過與過者校量先奏後聖玉皇帝可保仙官職名二十九真各生九地萬國千山萬水下界人名主之秦楚南海小童君主之燕齊北真大童君主之宋衛鄭梁西靈童主之都管東海者大童君主之各主諸方界關奏合有仙功著仙聞於太平金闕後聖君便令教試依功給道可仙給仙可真與真其中除仙真外亦有三等上等著功者注功是內心先行仁德於人救治疾病貧乏後行履斗服符日月年嵗之功也非世廣造土木為觀寺是人天之善未必得為功德與道永乖也風見西胡人神之教亦不令人苦造土木等寺廟亦令守心行十善之教如年夏深成可告天天給金剛本佛受者經乃言功德功德滿道成矣今見時人至心捨家捨力為搭廟殿宇者甚多不見有一人得道也皆却被五行行瘟之鬼與土木之神返害其身喪家滅代者多風讀梁志蕭帝好重佛教仍令朝臣以佛經為業一年於都下起三百六十大寺廣度僧尼不修兵甲後果被賊臣所禁身死國亡豈非此之事非功德之理也夫人欲學至道須明功德之理慎勿以此慎修行之業也第一等者修身慎行謹言無妄修錬真心好樂經典讀誦立功香火連宵與人治患更遇六甲神符服而年深且得不死人中之仙矣再修得遇仙師授此圖經方以履步綱斗亦得為真人神仙第二等者好錬金石以為真至之藥救人疾病堅身理藏服餌於山間林藪亦逺萬壽百年不死死後亦不為下鬼便得託生受其本福第三等志心好道隨從明師不逺萬里捨心供力不憚勞苦年月深逺師自與言功記德即教此經傳授之後志心修行却獲功德於師先得關奏後聖當與給道補為真人者多矣此三等說後聖告正一真人注張天師也及總真王君金闕聖君又授紫微左夫人注主教當成為真人者三試過即先奏金闕給道封真也又下教授二十四真人升天為二十四玉京左右金闕上真宫御史臣注主教檢諸天諸地生民之事量定得真之功修年月深淺之數奏度章表又使王君總真下校授茆盈孚仲甫等為司命君注主領教學道當為真人者而試之令教合道之志者當以教之盈以訓二弟及二許注子父仙也楊左六人盡以授修行此經也後以諸方仙真得者皆因此經或以天尊上真前聖虛皇上帝大道君授傳或以前聖太上大宰道君所傳後聖玄元玉皇帝大道君或分身再傳或以後聖大宰天師總真係代相授賜拔宅妻子俱升如此得仙真之衆或隱去或見白日上升者人數蓋多不可一一而書記也今以略舉相繼以為引首之目敘其前聖後聖金口所傳金籙玉圖流珠示引次用前後合行用依科排比篇名一一圖分折其袐要內訣引入其大道之門修行得者繼代付授後學髙賢心命合仙之士即不得妄傳非人此引黑書者老君所授赤書者後聖君再言天師受告及王君傳録具一一注於書後篇用一一隨卷題配之太玄三清金鎖流珠譜序此金鎖兩字本尹君傳王君又傳流珠兩字王君問曰何為金鎖流珠尹君曰太上老君還太真尊位號上清太平金闕帝天師及王君授弟子王二君注一王長二王子登曰前聖虛皇上帝大道君即元始太上道君是也後聖玉皇上帝玄元上道君是也注一云太上大道君應前位玉晨後聖玄元上道君攺金籙名號金鎖名始其意金鎖本說鎖魂錬魄求生去死之法本說堅身如金留神繫鎖注一云留神如鎖謂之金鎖舊金籙說之口誦金鎖注呪名金鎖是理自身流銖乃助國以救他人足履金綱注步天綱躡地紀是也故名此兩字以授後賢曉達其名應時得道王君再問流珠何不解說尹君曰流珠是北斗九星也注北斗七星見二星不見并不見者九星也人以修行步綱故曰流轉隨珠注晝夜斗轉周天無窮如水流之不絶星圓如珠故曰流珠也本名金籙行法注舊金籙辭言行法鎖神四字為首後聖君攺行法名流珠即今飛步七星配衣九斗伐惡收逆是也太上尹真人於後聖君傳授金鎖流珠四字指有三清注玉清上清太清是也天師造三清序尹真人著三清詞王君歌三清曲注皆言從一得三從三得五從五得七從七得九此言三天陽數也足於九也上極太一注一天也下包二儀注地也二儀生四四生六六生八八生十注皆從道始生極隂之數也玉清之上帝曰虛皇大道君注元始之號玉清之中帝曰髙皇太上道君注太上道君之號上髙皇注太上道君也上清之上玉清之下帝曰玉皇注太上老君也又一云後聖太平君太清之上上清之十曰天皇上帝太一尊神注太一道君是也一云太一師天也太極之尊神曰天也道之子學道之人知三清正主可以學當今上清之主後聖君注道主也太清太一君注天主也主之夫章奏皆先從太清過入上清注入仙名亦先從太清注訖始入上清注上金牌也後聖君告諸真人欲求真之道先須從禹步即飛天綱注禹者衣也本羽字是正音因夏禹理水得遇此天文步綱之法禹學之四年道成使蛟龍虎豹鬼神之法開決江河歸海理水有功後入聖真攺為此禹字因禹也功滿後三十年肉身升仙禹今為太極真人羣臣時見禹妹俱去以收衣冠葬于㑹稽山山留遺廟名可著於三清如空步天綱不知禹步之道身不得升三清三清亦無名籍為地府不奏天曹無名注夫人雖是天生植養於地生死之命雖屬於天善惡之功須關於地地之靈者先須制之故制地步地紀制天躡天綱神靈伏也丗人不知此道不得朝三清其金鎖流珠本經本起玉清大道君也本名金籙玉籙內經注天尊名之金籙玉籙也後聖攺之金籙名金鎖玉籙號流珠因以傳授矣
