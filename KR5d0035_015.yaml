front:
  text: 金鎖流珠引卷之十七言七
  hash: sha256:48fb6cec103a4b194d3445566372bf6fa5197c22bcc4ee7c059b64c9525d4cb5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_015-001a, image: hfl/0634/0634-063.png}
body:
  text: 中華總真大仙宰王方平張道陵趙升王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注六甲隂功上之上太上老君常敕左右軍修舉其功過注言功滿三千者可遷仙位過犯三十條者退仙一階敕三官故常令甲子日言奏文狀在於六甲君官將吏等多以取甲子日言功功是隂功也其隂功有六注一每日心禮天尊前聖後聖太上大道君天帝三尊三元等君言此功自在師口訣受法之時須口一一上問記取莫忘此是口言功為第一祕法夫修行人不得此法存禮百無有通不知次第而行功天曹並不言録事須一一得師口訣以傳授身心俱受畢便吞符功可上天記録一一與子言其多少也聞奏不絶也今具列言隂功隂德陽功陽德各具在有七條墨書是前聖虛皇上帝大道君授合仙之人骨命不合仙不授注前聖太上老君是也朱書是後聖玉皇上帝上道君授合真之人不合真不授注夫為師傳法皆須細試弟子察其情性若多陽功不須妄授內隂功有三前聖授三皇君及四十九真人俱得仙一則身授道後內以直心隂修救度人物疾病自身常服二等六甲計日言功前修老君六甲三年服符道氣鎮神安心氣治五藏光明神力有濟注濟者以符試救人疾厄得差度者謂之神力通濟人之難得神之力上感道恩德合天心功救得一人一物命謂之功濟也即添服靈飛六甲符便以計修年月日修行之功謂之第一隂功也後聖君告東海青童君及諸天諸方合為注合為者是告此法之時未得為仙真之位猶是志心求修人未得成道受此法後皆十年十五年十四年八年九年得道成大真人後聖君知其識性合為真人故言合為大真人也大真人曰夫志人識性真心修求大道皆須內著隂功陽德即積此功德而為真人注隂功陽德具後注說非從宿因前業所種生命骨體合道注宿因說生合官職所種即合有少許來由若說求真情性俱失此名身外種植福田資給來生得受人中之因不關身中得道之事夫求真者真人之情性即得也即得為真人此是妄言也吾今一一具說此法於六甲引書之內而作三等隂功三等陽德授傳識性注識性者識道之性而無妄常行隂德隂功不休故世人龍神鬼畏而敬之謂之識真也繼代為真人第一等隂功六甲中修行出五行三界之法注法中服符祭醮奏章步綱等法各各自有經傳流行世世雖有本而無真者言功也第二等隂功七星中步躡地紀天綱降九精使九靈衣七斗消五毒度三災入真境之法注此法各自有經文此言修行用功之科具在金鎖流珠中有也第三等隂功變三五七九注三是三元五是五行七是七星天綱地紀九是九真上大道君九祖君內說步綱之法驅役萬神之要訣禹步之要注三是三元即行九跡禹步五是五行上元三五禹步法或十二跡或十五跡皆變天綱地紀之步而多是受之於務猶子之下後方變為禹步右三等隂功皆合墨書為前聖曽授上盤古三皇中古黃帝夏禹繼代不絶後聖方再授東海青童小君及諸天諸方大真者即朱書也第一等隂功有十條老君曰第一條隂功可以修服六甲符計日服之從甲子日始終於癸亥日又周而復始於甲子每至旬滿逢甲日輒有三大符注一玉女符一是甲直日符一甲日將符三符併吞之併吞之即每日存呼神將旬將旬玉女六丁玉女直日某神姓名注假令甲子日即呼王文卿從官人數符吏姓名等即誦前聖太上老君長生呪一遍方始呪曰令則玄髮白反黑齒落更生神仙度世心開目明出入行來萬神見營所求皆得所願皆成既却百鬼又辟五兵除某死籍著則玄仙名乘雲駕龍上升天庭急急如律令祝訖便服符日月年數數一服不休此是論一日一功一年三百六十功亦三百六十也年年行之不休不論年月身自堅牢如金之體百病不入永無敗壞之期此之隂功上條第一也此太上老君教三皇條之上上條第二條隂功常以慈心救人濟物注人有疾病在身被鬼祟所害以符藥術救之令人得疾差鬼得輕放使人鬼相離不為𡨚對此為大功於人大恩赦鬼各得相去離不為患害名曰大功於人鬼者也解敵釋對隂行止諌之心常以得前一人言之定訖於夜後隂與某人解某怨對令其二人各自退悔其過不相謀恨即須禹步存大山隔斷二魂神不相恨念毒氣各自消散後日月稍多自能彼此消惡如此之功微妙為上上妙極注老君喻此隂功者本是一人知有道能制解口舌怨對而法師領一人之言便解諌而人不相對怨此名無上功德步天綱圖躡地紀圖順倒反三遍訖言曰今有某州縣鄉里某官人百姓止言百姓某乙與某處州縣鄉里姓名與某相加謀欲以相敵敵即相謀殺臣今行隂綱與隔解之呪曰令彼此不嗔各歡相代阻隔山海俱難吾轉天關各指指後欲前舉心者心身自寒各須伏心獲安犯吾此令者魂魄守天盤盤訓伐罪也右斗上十二步盤上三十四步舊說云順倒反於綱上便為之今之是順倒反三遍今按後聖君授方諸小童君及王君口訣云順倒兩遍畢向陽星綱頭起右散行三遍訖上綱左足躡陽明星次右足躡隂精又先前右足躡玄冥左足躡丹元次右足躡北極左足躡天關右足次前與左足并乃通氣祝曰金木相剋木土相伐水火相滅銅口鐵舌前舉者折二心各退兩舌無說二心俱伏不相誅滅吾出隂兵制汝二人心怨休歇急急如律令祝訖各捻左右刀支少間注刀支上卷具注訖此更云在左手第五指第三節右邊是訣此法為人修行令怨對不相加伐并被人謀害自身為之或彼人有心此人不對常恐來責伐我身求請阻隔令永不來者以與三夜為之不令人見之見之即不神驗也注夫人行隂功隂德其隂功隂德未成便被陽人知見見便即一口發言千口動舌却為隂過更敢望修行其隂功助人而復被隂官所責也若自行隂功助國護身救人者前從地紀三遍訖順倒反三遍是也即飛天綱三遍訖即散變三步九跡禹步擊止之如恐不止即十二步禹步一遍又步十五步存上中下三將軍領兵各三千萬衆及六甲諸神一一存如含弘圖及流珠中元下元等三將軍圖擊之三度萬事自消亦不苦損彼人若六度為之彼人病不可妄行損已隂功九度為之彼立殞注不可妄行之損已隂功以成隂過也禹步三等並以圖在上引中訖今此禹步以存作山隔斷相敵之人陳法訣步圖右轉一轉存為九重山隔此人魂神畏而不來也此名地軸禹步存二十四地軸神開一寸之地而為萬里江山或萬里江山攝為一寸步之地此禹步微妙能伏攝於人身騰空而不知逺近也訣在左手第一指根三橫文中是地心訣也注亦得師示文理之極露處得真訣步綱三遍訖即以右手捻左手中訣訖又踏地舉足下地心訣及地里訣即呪曰天清地平日月順行人物俱泰國得君貞今有某人逆天喧呼臣履禹綱隔斷常為千山萬坑不得過過者全軍身不生以取本色石擲之便止本色石在六甲籙中看取即得也此步綱非但作隂功救人而常行之三年立可縮地脉往往甚速於飛空注昔壷公先生姓施名存孔夫子弟子也以師孔之業求仕數不達乃仰天而歎曰我心猶欲求至道至尊玉皇上帝殿下之臣萬重雲臺玉京左殿卿相何況於世人皇帝下求一小臣如許難得即棄儒書學道尋師初遇西州趙公遂法師學讀經籍聲啓朝修禮念之道精志不休三十七年漸覺沈昏困老無力又仰天而歎曰何幸天生我愚身學儒儒道成而不榮學道心志苦而不明豈非我身無宿因福運命不行奈何任老而死須㬰之間悶絶而死死中忽見一女人甚美貌絶世告存曰汝學道不逢明師不知修行求智慧之心堅金剛之身勞蓮花五色之藏唯學歌音之聲誦讀間語作小兒之學學哢音句之能去道漸遙若為得道汝可改行別學須往少室山中尋九靈先生九靈先生是老君分身也一云是老君弟子王夫人人生善修行隂功隂德今道已成須以早去勿在遲遲於是施存得覺便往少室山中尋求三月日不遇但以清淨齊心不移忽於路傍逢一老人年可七八十許皓首行步如虎力狀可負别人施存視之良久知是神人即走趣下情而拜路人驚怪問曰拜此老人何也衆中有一人曰真人相見趨謁之禮也於是九靈先生責曰汝來何遲吾欲將汝入王屋山謁六甲夫人久待汝來天曹有符下令授汝修行六甲隂功服符治身身今已老何不早修於是施存伏地叩頭再拜唯稱死而再生得遇見先生伏願先生教以不死之法得延賤下之軀不死伏為奴僕之使使不論年月唯願收録以乞餘生九靈先生便將入王屋山三年教行躡步天綱地紀之法吞餌六甲靈飛之文及授地軸之符籙二十四階常轉地軸天關隂而修滿十四年道成已將一壷可容二升之器以包羅大羅天之下太極之中世界以入壷中或壷為六甲營出氣禁之術為籙授度世人以行隂功隂德豈非心之至而感神人為師教授成道後更遊世七百年至晉時為費長房所遇教長房縮地脉之法三日宿壷中受法歸早三周年一旦太平金闕後聖玉皇上道君使仙人玉女下迎上升為左仙上卿之位如世太常卿相似果其太上大道不違施存之願見賜仙卿第三條隂功學道法成隂功可濟若道功著常觀世間有凶神毒龍妖鬼妄行狂風暴雨傷損人物不論水陸須步躡天綱地紀各三遍具前說步天地綱圖散為禹步九跡十二跡或十五跡常轉配天關舉手指之三六九注或三度毒祅自止可不損其命六度指病九指須死不可妄行禁殺非道也須以察知實以害人妄作祅怪三度兩度人物衆皆是不安乃可動法步綱度其妖自止止而即放不可便殺殺之即捻某龍神鬼之妖精獸等刀支其妖獸等即三日內自死後聖君告金鎖流珠掌訣衆物龍獸等用訣刀支皆在此中用此看驗得君曰不可妄行行者皆傷他命有罪於衆人物人物不安傷人物命或作水旱敗傷衆命以法收斬注天關所止指是九指是斬也以一命而救得十命謂之倍功救數滿三千白日升天注風按晉書神靈異記曰許遜身為旌陽縣宰而學神仙禹步之道忽蜀山大蛇三條漢江毒蛟六條共蛇為祟喫人前後橫江截嶺捉人為食上天知聞遜法成禹步躡跡配轉天關收而殺之不過九物之命而救者十萬餘人此蛇作夢於晉步帝臣今食江淮人十五萬人也晉帝大驚不逾二年遜獨獲斬遙敕封遜正朝宰相固讓不受地府書奏天曹天曹奏上帝太平金闕後聖玉皇上道君遣使下迎賜遜白日升天家口拔宅而去世也此之故殺而無罪却獲隂功又或有精妖祟人纍代皆結縛不斷或是隂精邪祟疾病人口宅舍不安人多疾患代代不休者此准太上老君符命與符治病病者得差轉配天關遙指之九度并救六甲中某日直官名從官人數直符吏等名急急催促如此治病符能變為神為吏斬彼妖祟而其病立差如此之功上天為上上玉帝遙喜祕之勿妄用右六甲隂功三條餘七條在第十四卷金鎖流珠引卷之十七
