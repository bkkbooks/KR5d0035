body:
  text: 中華總真大仙宰王方平張道陵趙升王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注五行六紀所生引上太上老君告太極真人曰道生一注一天也太一尊神號太陽之氣吐太陽之精曜凝結而為日日氣下與隂合一生二注二地也隂氣之精上騰為月月氣同下合陽故隂陽交氣凝結為人物居天地之間號曰三才也二生三注三人也既有人即有寒暑春秋四時輪回周而復始乃生四天公此説出雷公式是黃帝敘録用應四時而生四足每足主一方行令名曰四時春夏秋冬是也號之曰四天公合用四式加臨主四天也三生四時前注具言也四時生五行注五行此所生也五行生六甲六甲生七星七星生八卦八卦生九精九精生十干星十干星生十二支神十二支神生二十八宿二十八宿生五斗三十五官星五斗三十五官星生周天萬象周天萬象生無窮也五行即此之所生也名金水木火土五星也人之命始生因配五行而得命亦運五行而出衰盛注志人學道常推金木相剋我不受剋金水相生我即隨生水火相滅我不受滅火木相生我即盛榮五行不害我欲長生五者天有五星人有五藏地有五嶽三五也是萬道之主神明之宗大無不包細無不容注一云細無不入大無不包是也故能生人滅人注五行相扶即生五行相剋即滅也人所生也皆主五行假如東方木命人亥為所生水注水能浮木土能成木木命得此二星之氣王相也火能燒木以大王金以剋木木畏金也所生土注木雖剋土土且能活於木木而無損有生成王相之象故能長佩土符吉也所生火注火與木會雖木而被燒成火不損消化之氣得火而王宜佩火符求財所畏金注金剋木也常以甲子之中有六十日常以金剋木之日何日甲子甲午壬寅辛亥壬申癸酉巳上六日是也修行如常以丁卯火日書熒惑星君符佩之六十日一換符也火命人用寅為所生木注木能生火土能成火一云浮火是水能剋滅大大故畏水長帶土符鎮之長生也所生金注火雖剋金亦成得金器故能相成之道所王亦於木土注火得木王得土而安故用木符王以土符安神也所畏水注水滅火是以火命人少小足病多厄難鬼賊者為其水能滅火之故也其如四命之中只言相剋不言相滅唯獨水火即有此言須常早年投道以佩土木之符鎮剋其火即得身安神守又長呼土木星精之名衛護臣某乙之身却除刑害水星辰精常令去某乙身神三魂七魄二千里之外勿相干犯所常取火日書木符金日書土符永帶佩吉金命人用已為所生土注土非正土巳猶借寄辰位辰即正土巳即正火火能剋金非金正始生上古大仙所以移宫寄位取辰又辰是季神不合正受所生又須推正位於巳巳且屬火故以取火位為所生但常思土星帶天符與火符同帶之永不相剋而相生相成王也所成於木火注火雖剋金又錬易成器之金聖人正意云前小凶而後永吉也又金能剋木木能成火火無木而不生故言木火相生而能剋金金人須用水土行星翻轉相剋相成訖然每夜卧長存辰星水神護身前木神後火神常衛巳并帶符於巳永能相成也不相剋害也後聖君告赤松子云卿金命人也始生於巳巳屬火卿於卿常承為所屬於身損也天以取辰為寄宫土卿於金永吉并木符水符止之無妨害之氣氣自消滅除之也所王水注水能生金故取為王氣也常以用水星符戴之於頭上永吉也所畏火注火若單行剋金金則受害若水來在火前火則不能剋金故以金求救昔水也金人常以夜思水神以圖於身左右牀帳之問存常如見者火星辰精不敢來自一生不被刑害修行即得計功功滿白日上升後聖君告天師曰非但金人畏火但是五命之人皆有相剋相滅皆依此金人算取相生教後人也金雖畏火得火錬鑄成形得水相扶自得堅貞黑金之用器也金即五色金也注金銀鐵銅錫是五金之數也皆須從火而成真形矣水命人土命人等所生同宫以申為所生金注金西方金也水土所生之鄉五行經水生金或云土生金二物皆能生於五金非五金生於水土所言始生金者以西方庚辛之地屬金卿故水土太隂之氣而結為水土之形是其所生本卿地屬金也所成木注木雖浮於水能以成水之德又成火注火得土而安土得火而成堅剛故乘於火成器也故云相成也所生金注金是水之子子母見而得王氣故配王於金水之用符也二行用法總同前法又所王同水算金是土之王也夫五行之氣各有相成亦有相剋故人得相生命能長被相剋壽為短非關天也自身不知故受死無疑身心若知壽永無衰注此老君告尹喜言聖者莫若天地猶生其病注病雲風雨愁是之病也病亦是五行之氣相剋敗故謂天病吾常思存堅剛其身猶得出病出病之法主五行注金水木火土五行也長生之神前聖所授黃帝行之木人取丁亥土日或癸亥水捻水星訣步五星五遍以受長生之訣也常以乙卯日丁卯日建卯行步五星除災厄去病上入生榮王盛之宫捻去災訣步五星九遍誦五行呪十八篇一遍注十八呪在流珠上帙第二步綱是捻水土之訣福德助祐我木命人身長生往往行之三年便獲不死之道辰生久視之身也火人取庚寅木日戊寅土日捻木土之訣步五星五遍以受長生訣也常以甲午金日壬午木日建午行步五星除災去病上入生榮王盛之宫捻去災訣步五星九遍誦五行祝十八篇一遍注具前捻金木之訣福德助祐我火命人身長生往往行之三年便獲不死之道長生久視之身也金人取癸巳水日丁已土日捻水土之訣步五星五遍以受長生訣也常以乙酉水日己酉土日建酉行步五星除災度厄去病上入生榮王盛之宫捻去災訣步五星九遍誦五行祝十八篇一遍捻水土之訣福德助祐我金命人身長生往往行之三年便獲不死之道長生久視之身也土人取丙申火日壬申金日捻火金之訣步五星五遍以受長生訣也常以甲子金日丙子水日建子行步五星除災度厄去病上入生榮王盛之宮捻去災訣步五星九遍誦五行祝十八篇一遍捻火金之訣福德助祐我土命人身往往行之三年便獲不死之道長生久視之身也水人取庚申木日甲申水日捻木水之訣步五星五遍以受長生訣也常以壬子木日甲子金日建午行步五星除災度厄去病上入生榮王盛之宫捻去災訣步五星九遍誦五行祝十八篇一遍捻木金之訣福德助祐我水命人身長生往往行之三年便獲不死之道長生久視之身也又五行生命人各依本屬算取所生相宜者行之一年則身無百病注亦一年辟非二年辟兵三年去死籍四年五行之精皆總扶助子身天上五星各化為人下教子真道得地中真修行功滿五老下迎上升金闕佐後聖君仙宰之臣也直至二七年滿要升則升注如二七年不要升仙但請人問為遊樂請本師封掌考召中一仙職即得行樂不問妻男女之事但以心不離道道亦不離其心但能為世官官遷任無妨昔仙祖老君代代為帝王之師亦曽為宰輔歷殷周之朝三為柱史四為宰輔事六十四天子育入十二夫人有子孫三百六十人七百五十九年後方升上清真人號太平金闕後聖玉皇上道君是也太平金闕後聖玄元玉皇上道君告王總真方平張天師善勝真人曰卿欲為人天度師之道妙法可為人師注按太平金闕後聖君紀云是漢安二年三月七日後聖玉皇上道君授衆真二十五人衛從仙人靈神吏兵千乘萬騎莫知其數飛雲紫氣五色浮羅告授以終忽然失仰之所也於是王君等人再拜起言臣等愚心暗昧不曉科法多違多犯恐招罪責不敢為師傳授大道正法今日遇聞開祐千載幸因得遇道恩慈賜開教蒙昧蒙聾曉聞聞後則敢依法傳授真仙之法道君曰夫志心學士棲宿山林靜室燒香讀書注書是道書也丗人號曰經清齋素食或有絶榖休糧或三十年四十年五十年六十年老病而死或居世廣聚人物作髙臺觀宇志功土木千間萬間飛臺百尺亦當衰病而死者更多如此之流豈不欲得道然此之功志且與道俱乖去道漸逺夫人物皆假隂陽氣而結胎受生胎數滿而産産育之日算五行之所生注生日便算五行何也嵗是一月是二日是三時是四并算母元受胎之月是五行也生育後長大亦是五行所王成注夫人行年至盛之時算五行皆相扶並無相剋及有衰厄所算五行果有相刑此即聖君言之實也亦有五行所休滅注休者衰厄窮困之惎滅者被禍來臨身滅也卿欲為真之道早須知之卿雖三五百年之命未是真身須以近去五行逺結三台注五行是害身之賊三台是護魂魄之神遠是長勤存三台近是勤作法隔五行存神來衛護我身隔斷五行之害則免主死之難也即稍與真人道合可亦傳此法教授弟子以為後來真人卿可躡地紀制五行注地紀是禹步七星生北斗是也五行是大金籙配衣也在流珠上篇步綱中是登三台注躡紀不用履三台但作登三台之步者有三步一步三迹三步九迹是一名禹步是太上老君教夏禹也因而名禹步三步九迹之要也入天門注夫志學道先須結齋心靜寂空室躡地紀七遍即步下三台禹步九遍三步九迹存入天門中即方飛步天關之圖圖各自有日日各在本經具也飛三五注三是三元五是五行三即存三元將軍出同躡紀收捕三元天地人中之惡凶害我者存之如流珠圖又如存用舍弘等三事用之防護身也又五星中有禍星欲常害我身命者每以飛躡之日及每夜欲卧之時但仰卧思五德將軍東青龍將軍一人身長八十一丈領兵八十一萬居吾身之左防衛張弓布箭西白虎將軍一人身長三十六丈領兵三十六萬居吾身之右手捧弓弩南朱雀將軍一人身長六十四丈領兵六十四萬居吾前鳴角在前兵士把刀北玄武將軍一人身長二十五丈領兵二十五萬在吾後槌鐘負鼓兵士執杖在吾後防衛黃庭將軍一人身長一十二大或七十二丈領兵十二萬或七十二萬在吾面前或背後守衛於吾身若惡星凶宿與天地水中凶神惡鬼惡人欲有隂謀陽害之者五德將軍五人及兵吏同心併力共三元將軍當與收捕誅剪令滅絶之應口消滅如霜遇日自當消盡訣在左手第一指中節上天門注天關中斗九精九星斗也名飛步天綱之經是也制刑禍注作三五法去自身中刑禍之星氣及五行害剋之災并天上剋我星氣者皆須禹步九遍捻某星訣請某星於天救我之宿勿令某星犯我之宿何謂之某星且如金人畏火星火星犯我所生之宿我求水屋救我本宿求水星法常以子日夜半時星月見即出室北戶外握固閉氣仰觀辰星拜三拜啓曰某乙行年若干嵗某月某日生本宿某今被熒惑火星作祟禍害某乙今請紫微天皇君北極辰星之神往剋滅之勿令犯觸臣所生本命之星及生日所管之宿當與臣等速救度却令火星之精出自急退散害氣自消敢負上聖之恩乞令臣長生久視身家平安敢負上聖紫微天皇君之恩即禹步一遍躡地紀三遍配衣轉天關指熒惑火星九度捻水星訣存九泉大海而隔滅之即祝曰五行相推金木相伐水火相滅銅口鐵舌逆吾者殺云云在流珠上卷中注老君先傳紫微天帝言朱書是後聖君傳祝訣餘四星相剋解説具後修求福注太微天帝君授後聖君言夫修志心常思靜念念自身神光化為北斗之星常懸額上夜一度思便卧白日亦存北斗為配衣於身上如此三年通神天地降福日月為之照明五星為之修福六甲為之防衛一云吞六甲符佳七星為之轉關隨手所指救人生産立生救毒惡死立生萬事隨手所指不可妄傳非道之子必反損身也令身出三災注天災者羅橫禍衰厄口舌疾病兵雷之類也地災者居宅造作土木之氣或五行吉凶相剋之厄或居宅前後空危東西髙下四維長短太嵗行建向災傷害人口或東鄰西舍造作黃黑方災害氣土木相刑之災人災者或夫妻年命相剋或朋友喜怒相謀兵甲相逐或疾病溫注人鬼之氣遞相染著口舌謀合相打戰伐如此之災躡紀登天門踏地戶皆自消滅如恐不滅禹步配斗并轉天關指之一一能自消滅除之也度五苦一云五惡注五苦是也一云五行五星是也身若能依金水木火土相次解辟步綱躡紀轉天關而指五星從金而先繞禹步圖外行三步指金星五度捻金星訣次躡金星指木星躡木星指土星躡土星指水星躡水星指火星各一一捻訣度之即誦消災祝曰五行相推金木相剋水火相滅云云出流珠中如此曉夜身為仙祖注古人學仙如讀書人心忘勞苦志成名遂方得官祿仙家事業亦復須應如此之勤勞志苦乃成仙道此是後聖君勑弟子言老君曰夫五行剋災修行身者其法至多其中妙者有次木星被金星來害我本命生位宿注本生命宿木人東方甲乙寅卯兩位木也角亢氐房心尾箕常以戊午火日夜初星宿見時於中庭或於門外握固閉氣仰觀熒惑星拜三拜啓曰臣某乙行年若干歲某月某日生本宿某星今被注若常行之即云恐被云云太白金星之災作祟禍害某乙今請南極丹臺太初君南上熒惑星之神往剋滅之勿令犯觸臣所生本命之星及生日所管之宿與臣等速救度却令金星之精出自急退散害氣自消敢負上聖之恩乞令臣身長生久視身家乎安敢負上聖丹臺太初君之恩即禹步一遍躡地紀三遍配衣轉天關指之太白金星九過九度捻金訣存九爐猛火而隔剋之即祝曰五行相推云云水星被土星來害我本命生位宿者注水宿北方亥子丑斗牛女虛危是也二星季星位也常以辛卯木日夜初星宿見時於屋東逈地握固閉氣仰觀歲星拜三拜啓曰臣某乙行年若干歲某月某日生本宿某星今被鎮星土災相祟禍害某乙今請東極青臺太元君東上歲星之神往剋滅之勿令犯觸臣所生本命之星及生日所管之宿當與臣等速救度却令土之精出自急退散害氣自消敢負上聖之恩乞令臣身長生久視身家平安敢負上聖青臺太元君注本無君字之恩即禹步一遍躡地紀三遍配衣轉天關指鎮上星九過九度捻土訣存九岡林木折來剌之隔剋之即祝曰五行相推云云火星被水星來害我本生位宿注火屬南方已午未井鬼栁星張翼軫是火南方宿也常以辛丑土日夜初星宿見時屋東北方間靜地握固閉氣仰觀鎮星拜三拜注其鎮星並無定位但隨其所在之方行法第一佳也啓曰臣某乙行年若干歲某月某日生本宿某星今被辰星水災作祟禍害某乙今請中極黃宫上臺太真君中上鎮星之神往剋滅塞之勿令流出犯觸臣所生命之星及生日所管之宿當與臣等速救度即令水之精自塞斷絶急退散害氣自消敢負上聖之恩乞令臣身長生久視身家平安敢負上聖上臺太真君之恩即禹步一遍躡地紀三遍配衣轉天關指辰星九過九度捻水訣存三山九壟土壓塞之九泉之水隔斷之勿令流動即祝曰五行相推金木相伐水火相滅注舊五行祝言也水流土絶注太平金闕後聖玄元玉皇上道君再為尹君是火命人常被水星氣剋身於十年五年之內忽一月十日衰稍如有疾尹君告玉皇玉皇傳此祝攺變於前一同不失火生土上水死自熱銅口鐵舌逆我者殺逆天者滅土水相剋反還自賊云云具前法訖金鎖流珠引卷之十二
