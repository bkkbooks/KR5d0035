front:
  text: 金鎖流珠引卷之二十四辭四
  hash: sha256:38f8c2bd31615175197d02176cfc56afd4f227d0da809cf8f054459c8e7af240
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_022-001a, image: hfl/0635/0635-080.png}
body:
  text: 中華總真大仙宰主方平張道陵趙升王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注伏虎使龍禁蛇法此樊劉二真所重人間有毒虎豹天上有毒龍等用此禁之老君曰使龍者夜於淨室無女人之處即得若有女人近左右呼之不來也之中勿入女子室女莫入男房之中三日即可躡地紀飛天綱各三遍也散禹步九迹捻目龍虎目也左手把符招九下立到一云更配衣轉天關只得來也龍虎總得各自有符在前者昔後漢滅魏初有樊劉善召使之按樊夫人正傳云樊夫人者本漢髙祖時有功臣樊噲十二代女孫也外氏王郇王喬十七代孫繼代有氣禁之術夫人自小失毋以外祖郇收養少小好讀書外祖教之年一十三即休學常自讀六甲及禮易忽於王氏家上十三代祖祕法文書函中見是老君六甲符書七卷七星步綱儀十卷及此引書二十餘卷所以日日盜開看讀於宅外林木之間去宅百步或五十步往往如此三年忽見林木之際有一女人甚年少問曰汝好道耶對曰某年雖小甚好道伏看此書教人長生不死之術後當得仙此世界罕聞有此之語世人不知此道書世必絶無所以小年甚好愛其説讀五三遍方始定記得文字女仙曰我是仙人阿王小教汝讀書汝但今後間時即潛來此我與汝上過并教汝行用之訣如此一依仙人所教日日中時輒獨潛往如此二年外祖毋異之潛逐往見於林下讀書有女人共在甚喜之不告於大小聽之三年學讀道成使鬼神如奴僕如手順心通靈追攝虎豹百無不得魏文帝時天大旱七十餘日赤日無雲帝百方求雨無應郡縣舉王郇外女孫學道術成追攝虎豹驅使鬼神必能求請帝命內妃趙丹齎書錦帛令以求請乞兩夫人時在室多羞不欲為之妃因言喻某是王家生由是外表眷情何以諱借當今天旱如此救人皆得功德天下人物得安何以祕惜夫人即作書與龍王令人送之深潭水中應時下雨後年一十五方事劉家隨夫為官天下經過後夫劉綱知以禮求請將此書十卷教之授以三元六甲七星之圖後五十餘年夫妻俱得仙會稽東山白日妻坐雲駕龍之車上而去夫上皂英樹上隨妻俱去玄即拜為仙官中位下真也考召法師及志道之人等家每年正月一日早朝人未起前自發牒符保護身家令平安無疾疫法太上老君金口勑女青詔書保護身家正律曰天是吾志心弟子及與吾行考召科法平直救濟人物疾病災厄災厄者有十種之災一天行瘟災與救得有功天不責二時行但禁決無妨三官中非橫事四火五水六兵圖七被鬼注祟八窮困九聾盲十內鬼等也之者可是吾考召弟子即每年正月一日早朝書六甲中六十日送惡鬼名并女青律總在鬼律中於牒頭三通牒帖社廟隂司宅上三通一周年身家永無災瘴疾厄口舌之類自消更須躡地紀飛天綱各三遍散為禹步九迹呪曰攝毒攝毒攝毒攝毒攝病攝病攝邪攝邪攝鬼攝鬼攝蛇攝蛇攝口攝口攝攝舌舌攝攝蛇蛇攝攝鼠鼠攝攝耗耗攝攝散散攝攝水水攝攝金金攝攝火火攝攝土土攝攝木木攝攝姧姧侯侯人已上一百二十攝攝急急急攝消散急急如律令此呪聲髙讀之時把文符牒於左手右手捻都監訣一一攝攝須手招一下甚吉上真髙仙皆每年為之不絶老君曰學道有門求真有路得門曰通通神也夫人學道得門皆威力能使鬼神天地應通謂之威感動天地未見人物號曰神通得路曰仙仙真人位修真人行得此書三十餘卷洞曉金籙後聖號金鎖流珠經通三元出上清包正一謂之道路以通必能乘龍駕空名修道之路以通後能乘龍躡空逍遙紫府位近仙公但行之九年永一家人口無病行之二十年舉家得道力此法頗入拔宅法按此法欲作法皆在舊年十二月二十六七日書此牒帖符詔書鬼律法師押署訖即取正月一日早朝五更三點之中勑讀呪令人不用讀牒上言語唯聞呪為一切官人保護身家口發牒住處社廟及宅保一二年合平安法亦有舊章法在新章儀中也老君告徐法師曰徐來勒是保護度災厄法師今是張替號云三天正一法師今又是小張繼大張為天師夫教弟子欲為國師為國家保護內宫及安逺鎮州府百姓者先奏天書六通後聖攺號章文為章書也上帝然給符牒五嶽四瀆都邑社廟有大檄符書三十六卷二十四卷鎮內宫殿五卷五行山後聖號為五嶽山即五是五行木火土水金之數是也餘七卷六卷投名山洞穴一卷投水府巳上皆是儀讀誦之低小聲不得音樂之響奏聞此皆入陽法人間之科誡賢識賢識呼齋為社撰習為功音響之文非仙真上聖所造聲唄告示自别致人深識不為此法聚社古來呼齋為社會今又攺為齋會會識論經此是初學之人未得其門乃為之如此之法卿莫令弟子為之非正法上章章本自别書出有五章文後聖君授符牒一十二道以鎮國保護消災度厄各有文儀在下篇中一一檢取行用老君曰為邦國主今之郡縣主是官長官太守長今也不用檄符出牒三道及符三十六道一十二符鎮十二神上十二符門戶上十二符宅中正口及家長帶之百姓隨意為之勿書三十六符也章三通官人三通百姓合得二通一通勑符作法先躡地紀後飛天綱各三遍散九迹為禹步配衣然後九指有災禍之城屋宅一切災害氣祟隨手而消然後各依用勑文符畢將符牒行依法安處永一二年無諸災害為百姓除禍鎮災殃保護身家同前用法老君律言百姓符用二十四道章二通用行隨法師意行法其訣在左手第四指第一節急捻之考召法師及弟子法師下考召典書吏等人將家口或自身行往他州界先發帖牒太廟及城隍神官此神晉朝有之扶迎拜送保護往還法老君役使社廟神靈記曰考召使本法師字行李及有家口行往皆須向三五日前發心帖帖九州社長伍子胥是也如非正考召法師即發牒及著上字是下書史官吏之屬若是九州考召法師即行正帖不用牒牒頭無符帖頭有之老君告命一符連帖前如法籙官官仙官受籙髙即官髙受籙小即官小時人今呼道士為仙官位小牒云上件相言語一依公行文牒相似唯攺一法字隂牒依法事須帖社廟云云公中帖牒即言依檢事須云云道家行帖即言依法事須帖牒社廟神及某神官扶迎拜送保護以界付界行李水陸平安不得妄有他故者云云訣法同前訣在左手第一節是也誅符破廟法誅者責問符吏符牒遲遲時不依急切不肯允遲有去無報謂之誅符破廟亦責問社廟神官符牒章有法無報故合決杖停解别有差替謂之破廟也羅天師傳太上老君金口所説科律一符不允責在直符再書書令之章也不達決解直符可以躡地紀三遍誦十八篇呪訖散為禹步九迹三步配衣轉天關指某日某地地者假如今日是甲子即指子地言某月某日是甲子王文卿當直日此日是何直符傳符牒為某事其事不行允合重凝停解差替以周而復始後聖君科可責問其罪事須依科勘問科決不多停解差替如此即常安於吏兵社廟卿等事須依金科玉律行下訖報即勑云云如前注中之符勑行用速於水火也破廟亦可躡地紀三遍誦十八篇呪訖散三步九迹配衣轉天關指某廟某州縣社不肯傳下符牒天命令人破決脊停解差替言若替即存其廟古人但言停無替即是破訖報後聖君告張天師曰夫誅符破廟皆上古志真人請差天神大將軍大官下監決解停破也吾令但依元差三將軍天與身應天上一某元將軍身中應出同行之是也但曰上中下元看取行用也即不得用重章奏請天官下監誅符破廟此二事行用並有訣訣在左手第三指第三節上右邊捻之若行此法三度五度訖但捻訣符吏自有推排有過之者請罷常訣以赦之後符吏轉加敬畏舉心便行起念便至勿妄忩忩愼之真人也三會日醮祭言功遷賞吏兵法社廟不遷賞酒仍位壇外坐老君曰夫受法之人皆須準科儀行醮祭則吉妄行則凶上志之人皆明此道其科言上元月中上會之日醮天官君上元唐將軍上元上部唐將軍姓唐名短中元上部又是姓唐名宏為上元座之吏兵領中元下元上部諸將軍降臨醮席三上九獻酒為三元主將吏兵受醮之首領三元將軍吏兵功曹司吏諸籙中兵將玉童玉女等降赴就某席坐受醮此日是正月七日也上以召會九天之官中以九地之官下以人身中法籙將軍吏兵及水官將軍吏兵也後聖君告天師曰夫三會之日天地水三官中大神君將軍吏兵等俱會北一日為社會求飲醮此日醮除罪獲善福祐人物育養奴婢牛馬之類也禍滅災消身家喜慶何也為此日天地水三官三神俱會於此日也上帝恩放此日不朝集所以獲福又夫醮皆是入正日之夜人定後一更時或二更時醮得大福祐此時衆神俱會之時若過三更至五更切不堪醮何也為神官皆屬隂夜中似如人見日日早朝會家間客即得來要客皆有公事直至衙退方始得來其神官仙官將軍吏兵等入三更向後至五更皆欲上朝天曹以心攻前排整車御忙心亂思不來受禮來亦不久忽忽不多周匝所以不獲福却招惡也如志人學須道先知此為妙愼勿妄示非人非人妄説異端即招天考又科言中元月中中會日地官君上元中部李將軍及中元中部葛將軍等為醮主醮之後聖君告天師曰天地之間各二儀後即有三元中元為地人兩主也李將軍領地官葛將軍主領人身三魂七魄身中三將軍百五十將軍仙靈將吏但是中元人身中受符籙為仙座以主中元之氣也皆是李葛將軍為主部領天官水官等三元俱足官將吏兵會也先領上元下元君官將軍兵士功曹司吏六甲君官將軍兵吏玉童玉女直宫從宫符吏等先坐訖始中元李葛二將軍二人及兵士方坐師主心分主領指撝座位定後方始啓請分明一一飲食在師主指撝安置上酒處分般數取足令人更益密漿之屬保真見李尊師令添茶每座三四盞保真令丁醮祭傳法伏依本師不敢違闕請後人相傳繼代莫絶本師之教又科言下元月中下會日水官君上元下部徐將軍及中元下部周將軍等為主醮之事後聖君告張天師曰上會日正月七日天真下觀子此日設醮天官君兵將及地水官等盡心須以虔懇勿穢濁受福無量中會地真來監醮地官君兵將吏及天官水官君等下會日水真來監醮水官君兵將吏及天地官君等中會七月七日下會十月五日此三日並是三會之日也先領上元及中元君官將軍兵士功曹司吏等先坐訖始下元徐周二將軍二人及兵士方坐師主心分主領指撝座位主是受三元籙人自醮及入諸弟子等共醮亦得故云師主後聖君告天師曰卿是三元法籙吏兵師主故上古為之師主為有弟子及同學人兵設醮即須各依辭云云如若自辭即不用辭若讀詞畢即讀言功狀一遍其狀言功遷賞吏兵如實有功即言如無功即不用言功後聖君言功章本云有功言之將吏遷舉無功言之保護身家平安亦未是功但軍狀言之即得其吏兵不在遷位舉功之限但言賞吏兵即得也狀言有功舉遷法文某州縣鄉里或任某州官道士言某觀山道士係天師古今太玄三元法籙云云陽平治左平氣總領門下大都功并左廉察版署祭酒上清玄都古號太清無極太上大道無極法師是大洞三景弟子中嶽黃帝真人上古三元法經籙總言也臣某年若千歲去今正月七日已後隨時若是正月上會日即云從年十月五日巳後云云至七月七日已前行符牒總救得若干人病及有災厄貧乏具件有并若干人病行符藥牒帖救得差愈若干人貧乏病無錢財買藥救治臣給錢買藥或與藥一一具言之得愈者或若干人被災害官私口舌得臣符救度得平出無重科決者具件總有若干人臣使靈官將軍吏兵功曹玉女玉童有方救拔得度免見病死刑罰此兵將有功合遷一階人數悉皆得差允者并於臣家保護臣身家平健有功將軍仙靈官功曹吏兵準科法遷階言功將軍言功二百仙靈官言功一百五十功曹玉童玉女言功一百吏兵等言功亦一百直符言功七十以賞勞效於人助國之功者遷升真位謹狀此是古儀注今但依此體但任别改其中文字體請不移但依古也日月具名狀其醮祭自別有文儀金鎖流珠引卷之二十四
