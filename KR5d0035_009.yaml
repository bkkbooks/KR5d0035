front:
  text: 金鎖流珠引卷之九思八
  hash: sha256:aedca8470205aeb343ef22c9b85459c082e32f70251ab5ddde514a92fa12a3aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_009-001a, image: hfl/0632/0632-090.png}
body:
  text: 中華總真大仙宰主方平張道陵趙升王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注上元上部將軍步綱圖前聖老君授禹注禹受三等禹步一三步九迹二十二迹三二十八迹今此三五大法通其禹步不傳丗丗絶此步後聖君再授方諸童君及尹喜真人王君及張天師等因此朱書者皆後聖君再授也右腳蹈地左轉一轉即隨事所言老君授黃帝求長生等法訣七條一求長生於世為榮貴法訣捻司命目誦五行祝一遍金木水火土祝云云二追召天狐法捻獸目言請上部功曹追限某日到三召龍捻龍訣四召天神司命與上長生捻司命目五召殺天上妖魅捻天鬼刀支六欲召請日月星辰神捻日月星宿訣注左手甲下是也七欲升天及思自身神上天欲追天魔妖精龍獸天狗天豹等祟祟人合死者前思本師承後出諸部如含弘兵共尋追斬之捻都監訣後聖君曰步訖即捻上元上部將軍訣注訣在左手第一指甲下又在中節二處都欲上仙籍及修行出災害注如有災衰惡疾一一具為辭狀言之或為人求福德收祟去災厄亦具辭狀言之一切悉能消滅老君曰上元本命日求長生先從上部將軍起次中部次下部其中元上部同注中部下部總同用之得上元本命步上部三遍捻訣訖存上元上部唐將軍注坎中元上部唐將軍同從上元上部入泥丸宫等入泥丸宫少時即入臣則玄左腎中注思存如含影圖此名正魂魄也行之二年神仙不死之驗上部事畢上元中部將軍步綱圖禹受前聖步綱之道以於中部注中部屬人上部屬天下部屬地三部之內中部下部事多過於上部數條中人中事下地中事甚精或使效功或收捕有德驅役人鬼決水開山制鬼助人使龍使虎分變九迹成術萬端積德纍仁飛身太極留其中部教授有心注上部將軍步傳丗丗號之曰大禹步亦一十五步曲折而行故稍難於上部而下欲有相似若通者亦不為難志道之人役使蛟龍虎豹濟助世人兼令得道乘龍御虎豹也左腳踏一轉訖但依心願言之此中部李將軍行禁五行六甲七星九精五斗散此禹步依之如衣使之如僕隨心順口後聖君告命祝初起綱又祝曰太一是吾身吾是天中仙祖頭為太一府足為天柱五藏為六甲主守天關驅使北斗叱喝一下千神萬靈俱隨口走急急如律令即思將軍入心賢中老君告黃帝及方諸童君曰此法一十六條是中部將軍合管使部行用步綱三遍畢即捻中部將軍訣注訣在左手第一指中節是第一法中部雖是上元主人人是中部中部自有三將軍注亦上中下三元此中部將軍能與人求正仙道可以中元本命日行此十六條事總人間用要之法即行不要但步綱一自身中元本命日步中部李將軍綱起三遍正魂鎮魄祝曰李將軍入臣右腎中葛將軍為副使令臣則玄長生人世久視無畏無懼注便存入右賢中存之如含影圖賢中坐鎮賢也祝訖叩齒十二通捻中部訣注訣在左手第一指中節此法行之一年便長生久視百法立驗成二自身出災害厄疾還取中元本命日從自身五苦地起步綱一遍出王相注王相算命具在上五行引中注祝曰出死入生注夫修行文書及章表有死字在上行其生字不合於下書忌生生無極得見太平君位畢捻水火土刀支金命人捻火刀支木命人捻金刀支水命人捻土刀支火命人捻水刀支土命人捻木刀支隨命各自有破五苦八難九厄百病刀支步綱於三五法中消之一年之中未便消滅災厄不剋已身長生其五力支具掌圖中三自身坐宅及院不安即取中元甲子日步綱繞宅取三市或長禹步不論迹數以遍為極訖三遍即祝曰乾尊耀靈坤順內榮云云在金鎮流珠上卷中祝訖便安定四自家宅中男女多病人口不安取中元甲午日甲申庚申壬寅日於中庭步上中下三部將軍綱各一遍捻明堂訣注訣在左手第二指第二節捻之噀水四方存出三將軍各領吏兵三千萬人繞宅三匝出火水獅子蛇兵等趂除鬼祟妖氣流清蕩濁訖即書鎮宅符帖門戶上注其鎮宅符在三部雜符文中即祝曰符制百鬼伏滅邪精玄武息盜白虎云云五自身被兵圍繞或行兵心中存作中部禹步一十五迹次下部十五迹轉天關指之存三部注上中下三元總都部九將軍掣擊之立即走衝破便出即捻刀支訣訣在左手第五指第二節右邊是刀支訣急捻之欲血出即得以配五斗衣五度指之所指之處破乃領兵衝之立見倒過出後即解刀支彼人不死不解即死祝曰出死入生立到天庭青龍扶我出白虎衛我行我是天使使天關衝破汝五兵急急急急急急破急急如律令注即揚旗走馬擊鼓破之立出六自身逺行經過山草恐有蛇獸劫賊來害及恐有諸凶毒注凶是人毒是蛇獸之物相害者但覓無草地步中上下部三將軍禹步各三遍訖捻生人喉頭目及刀支并蛇目虎目等訖身出九天之上注九天之上是算孤虛也一不逢衆凶毒衆凶毒忽逢且以孤擊虛一女子打九丈夫不畏永不逢賊獸等忽相遇彼自驚走而去永不相干祝曰亭亭白姧汝死我還我按三元閉水封山賊獸逺走不須路間路間地軸縛汝不難不肯去急縳急縳急縛急急如律令注按此法未發之時在家中步綱作法了行無有賊獸之物敢干人干人賊獸自死也七自有親族在他方州縣疾病及無圍隔者注按此説父毋伯叔兄弟表外之親皆得非親道友弟子亦得外人非義者切不得救之從中部起注綱為人在中部次上元下部各三遍訖後聖君告天師曰亦須躡天關地紀各一遍一云順倒返三遍即存中元上部唐將軍一人長八十一丈赤幘通天大冠帶劔把戟領兵千萬衆前往彼宅放火燒鬼飛走把刀入門大呌三五聲獅子龍蛇入彼人屋內牀上牀下屋上屋下屋前屋後屋左屋右凶殃毒殺患者皆誅斬之令砂崩瓦碎鹿走千里誅斬清蕩事訖令其病速差某賊某兵速敗訖報者云云注作辭捻上元訣次中元中部葛將軍一人身長七十二丈赤幘通天大冠帶劔執節領兵三千萬衆往某州縣鄉里某家宅中某身染患云云注須依疾病各恐被某鬼神妄祟所害與放火水燒流鬼賊衆把劔入門大呌三五聲師子云云同前之言次中元下部周將軍一人身長九十六丈赤幘通天大冠帶劔執節把符領兵三千萬衆往某州縣云云同前言辭即捻訣注訣在左手第一指第一節急捻之將三將軍陳飛天而去滿天蔽日到彼殺毒行病鬼賊如金鎖流珠中篇三元三將軍法圖行用思存之八自身及六親道友被人作口舌讒謗妄行謀害者以步天綱地紀各一遍訖即散步出存地闊各十五迹中元將軍禹步三遍訖捻彼人刀支注刀支捻少間不損前人若久久捻之十日五日彼人即困至死須看云就不得便妄損人慎之慎之一月半月間具前注即云為某事被某人作某口舌讒佞某身不安今請中部將軍一人集上部下部將軍各一人兵士各三千萬人為臣則玄解除凶人要妄作口舌相謀之事鎮猒勿令有發動之時急令彼人自伏匿自受災害口舌之事永去我身反自作害彼人某之身急急如律令即誦金鎖流珠躡地紀十八遍呪呪曰吾受天氣當為天地使云云十八遍呪總在地紀經中一一誦之訖捻訣注訣在左手第五指第三節文上從而上右邊捻口舌訣在第一指第二節及指甲下捻之九常自去身中三尸蟲令無妄白日過失及作身中疾病永得長生者可取中元庚申日步中元三將軍禹步三遍訖即誦十八篇呪呪訖服符符在一百五十將軍靈書中有之十則每年取中元甲子日步中元將軍禹步三遍訖服制魂魄符三道注一符上元一符中元一符下元訖誦飛步天綱五行呪呪是金木水火土五行相推七星煥煥天綱最威是也又誦地紀五行呪五行相推金木相伐水火相滅銅口鐵舌是也畢一日素食十一常以一年之中取中元日排鏡七面可為一尺八寸闊照身中神看有七魄以否若欠一鏡中神即謂之神不足即吞安魂鎮魄符訖履中元將軍禹步三遍訖誦地紀祝父母篇一遍注吾生於父母長在俗間云云安魂鎮魄符二道安魂符鎮魄符十二取中元甲子旬中取自身本命日書三符以帶之度九厄八難上中下等三元符上元符中元符下元符右五符並朱書書北符訖勑之曰天之所育地之所成某甲佩符符與身并仙人輔巳玉女衛形五色變化黃白赤黑青二十八宿合升紫庭神符却禍蒙福長生急急如律令注符並帶之用後男左女右十三常護身保家者以朝修行後存中上下三將軍出巡家及身訖存入心腎之中常以衛護謂之衛身濟人有時即存往某州縣鄉里圍繞某家宅舍驅除凶惡之衆鎮守某親之身此後聖君告天師十三條謂常存法也十四入山水火渡江河用法常未離家之前三日或雨日步中上下三元禹步各三遍訖即言臣則玄欲入某山渡某河海江恐有蛟龍虎狼惡賊所謀臣身伏乞過度災厄令不逢見見即與敵令勿損臣等身急急如律令即捻虎目賊刀支天師曰我受先師後聖君之教入山捻山王鬼刀支或捻虎狼目入江海捻海神目入兵捻衆人刀支渡江河海符二道勑曰弓弓逢逢河伯導前辟蛟龍萬惡自滅天帝明急急如律令入水入火符入山符夜行入山符以帶之勑曰恆山之隂太山之陽精魅不起毒蛇伏藏虎狼見我盡皆驚忙有姓李名耳猛虎見摧牙折齒毒蛇見者盤不起急急如律令捻都監訣十五欲得一身及一家無病常正朝歲日步三元將軍三等綱從中元起次上元次下元注為人屬中元故從中元起步綱訖捻都監訣及都鬼目及三師等訣訖誦地紀十八篇呪畢又誦天綱祝一十二篇訖便捻都監都心兩訣注大都監訣在左手橫文如人拳相似都心在左手第一指甲下急捻之是千變萬化之內訣也吞一符一年一身及家若干人總無病每一人吞一符即得一年無疾也正月一日服此符一道勑曰太上老君所生受使馳收縛精速去千里當吾者死視吾者亡急急如太上老君女青玄都律令十六常以六戊日戊子戊辰戊寅戊申戊戍戊午是以取六戊上土以為餅子長三寸二分厚三分隂乾數日即步中上下三元綱各三遍畢誦地紀祝十八篇畢繫此餅子并著兩腳心覆水如行地永渡江河避難得訣在左腳下海神河神等目以朱塗之其土餅子繫著地心地神目上即禁得一切江海河湖中行水如地也此法妙極祕之其上元之中唯中部法通人使神制鬼救民求仙入真妙極之一法在於中部上元下部將軍步綱圖次上元下部將軍一人姓徐名康身長五千萬丈領注金鎖流珠上無領字下五剛神功曹一人姓溫名舒注按流珠只言功不言人字言姓溫名舒言即合是一人而已百千萬重人赤衣應是兵士必非功曹也按後聖君告天師曰上元上部將軍一人五剛功曹九人主事功曹九千人上元中部將軍一人五剛功曹七人主事功曹七千人上元下部將軍一人五剛功曹五人主事功曹五千人兵士各百千萬重人並莫知其萬數也按此是後聖君授即是真數上元五剛功曹九人定上真中真下真上仙依此數也百千萬重訓多也人赤衣赤幘大將軍右手持玉陽之節腰帶龍淵莫耶之劔注按老君傳云斬邪之劔大羅天之上遊檢下入人身心中右賢中存思右眉天門中出具用依前上中部將軍用也後聖君授天師拔宅升天訣云此三元大將軍上元三部是也並天皇代前聖大道君封輔其上仙將軍之位也注其流珠云並是三皇向前太易之代非也中元三部即後聖君置也其下部徐將軍事修行用法一一依上部中部修用也大約下部主地水心行之事悉皆起念便是用法一一皆主地水神龍鬼之物也後聖君告方諸童君及諸大真言上元三部將軍步綱以正鎮三魂北斗步綱注是飛步天綱以定七魄注不論天綱地紀之法皆同制於魄七之法也夫人學仙道皆須先正三魂後制七魄令定是法之具入仙道之門功滿上升禹步之綱以治萬神萬神正定五藏堅牢法成身真故曰真人其行修下部步綱皆以下元甲子中本命日修行步三遍注三遍一從初起間兩迹上迹步上至十五迹是也即誦地紀十八篇祝一篇天綱祝十二篇一遍訖即捻都監訣少時即畢其別行用並依前用金銷流珠引卷之九
