front:
  text: 金鎖流珠引卷之二三同卷思二
  hash: sha256:349d6c3c5c4285a252c710454f23b1d37490045440e4260ad8edc9136feee033
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_002-001a, image: hfl/0631/0631-052.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注三歩九跡圖此圖老君授禹禹歩三歩九跡註禹躡前地紀順倒返三事訖即先兩足不論禹歩小大二事不用便履斗但依圖存用之右左右禹歩求長生剋災害等用之後聖君告天師初爲飛天綱躡地紀禹步翻爲九跡亦中斗數也順倒反三遍也註三遍履不如三綱三度作禹歩左右作之若急速欲之得力但三歩履舊綱左右各一遍男童左女童右註左右訖更須一重遍是三是代順倒反三遍也如若收凶惡行兵之法欲恐有災於身歩二十八宿之禹歩而出之百歩綱訖三十五日之内驗於水火註按老君告禹初授躡斗成後但禹歩耳二十八宿後聖授王君也先從北斗而起次東斗次南斗次西斗畢登中斗而不履真人星夫履北斗求請法捻甲子訣東斗捻甲寅訣南斗捻甲午訣西斗捻甲申訣中斗捻甲戌甲辰訣此是隨方斗訣也修行長生以朱墨塗司命訣目不者即五色絲縳之即歩綱三年成地真以至通司命來下與除死籍註甲子等金命人以丙午丁巳爲司命木人以庚申辛酉爲司命水人以戊辰巳未爲司命火人以壬子癸亥爲司命土人以甲寅乙卯爲司命修行用凡此歩綱三等畢即誦後九祝註祝訖存二十八宿於身如圖圖在金鎖第三中元圖中後十二祝三祝入前誦亦須列其名第一一行一過祝昔受玄師教我歩綱所求者得云云散行一轉綱外捻禁鬼訣及遊師訣第二行綱一過註祝歩斗祝曰五行相推云云歩斗二捻隨命配宫訣第三行綱行紀註歩斗二遍五行相推云云捻天關訣少時第四三歩向魁躡紀一過註歩三過倒行也祝曰昔受玄師教我躡紀歩綱云云捻都禁都師目第五三歩向魁躡紀一過註三過歩從第七星向魁星是也祝曰三五作緯中有經曰炁云云消災目金人災在火第六務魁一過剌躡凶惡魂鬼五行之災害身己者還擊註金木水火土金常畏火爲鬼故歩綱剋火求土爲當救之福却禍也祝用五行祝祝曰五行相推綱最持威云云捻鬼目註祝後添今日務魁萬事皆宜剌有圖上魂下鬼註此伐凶惡也不妄行若修長生即二爲三元註天地水中鬼下是五行剋我身者常以歩躡消之註爲五行要有王相衰厄若爲災害雖有其聲而無其形故能久行永得長生餘祝剌者皆同此解說左足躡魁星剌鬼左足又丁行存如坐至魓星向魒剌凶註捻凶鬼目及力支下用左手拳擊如重一十五斤上用右手註准上第七務魁一過刺躡還祝從綱頭歩第一星第二星註思左手劒剌五行相剋之凶等解災又上到四星止捉凶打七卷註拳重十五斤祝曰五行相推綱最持威六紀云云捻五行官相生我身訣并司命等二訣吉别用入兵爲人佐國任别存擊不得妄行小小者凶惡不得躡用天機第八歩綱一過躡紀還刺從第七星倒歩至𩵄第三星捉天殺惡鬼與我身不相宜者左拳右蹋蹋重二十五斤九拳十蹋蹋足祝曰五行相推綱最持威六紀云云捻左手第三指甲下三官天殺鬼目第九歩綱一過躡紀還刺左手把劒右手把頭刺惡鬼三尸欲謀殺我身者可存禹歩收捉得以刺耳九過左滕搥之七下即斬之祝曰五行相因剛最先嗔云云捻天鬼目左手第四指第二節右邉不正節心唯在右邉是也若治惡魂亦如之即可三剌耳三搥止註如過逆即任意第十左足躡綱至綱頭左右躡紀還註第九第十總須躡紀第九右脚躡紀紀第二星也第十左脚躡第四星消天災地災凶惡鬼左足躡第一星至綱頭坐第六星鬼在綱内第一星内刺之左刺九下右刺十下祝曰五行相推云云捻鬼目正中心左手第四指第二節此法第一能消口舌速於水火第十一右足躡綱至綱頭左右刺躡紀還迴身西面履魁星至綱頭左手把凶惡邪精頭右拳十下下有註十五斤重祝曰五託身三五之中云云訣左手第四指第一根節縳節當禹歩此綱三年天下邪病人以將符遥治之邪鬼自被符吏誅斬應時差愈註若欲追之以手遥指其方遥指帖社廟追來第十二註從魁裏散歩綱頭以左足登天關上丹元右轉向綱左躡紀還至魁左上陽明左右報擊此歩以收五行不宜我命者災衰天地水三官凶惡之鬼以右手倒懸左手爲拳拳十五下註下重十五斤擊鬼歩畢埋鬼天橋下存天橋星在北西存祝曰五行相推金木相伐水火相滅云云捻鬼刀支訣在流珠掌圖此祝及前十一祝甚能除家國祅祟并疾病厄有須消之從初祭告周帀先誦五祝及十二祝啓自滅應口除須履三台五星各三遍萬事無能害者即言功右初言魁頭擊祝事訖言功東向鳴鼔十二通口啓註案文亦得不必口啓臣則玄謹請天師女師云云文在流珠上卷中此法後聖授天師天師係代相傳付行之一年萬妖伏二年萬兵畏三年長生天下萬鬼千神皆自賔伏註有人雙修直至十四年有人行此法三四年通神驗後即不爲但飛天綱而巳要除災害驅使主兵使爲之速於水火之急也昔王君長雙修十年便昇天真若飛天綱躡地紀失一則萬無成事須先從地紀授後乃依法直到天綱三日三夜九時行道方始得周非人不傳此書欲傳師皆前試之以作嗔炁色惡言罵辱之不動心色乃可付授書寫金鎖流珠引卷之二
