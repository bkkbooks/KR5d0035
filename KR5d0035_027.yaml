front:
  text: 金鎖流珠引卷之二十九辭九
  hash: sha256:3dc62c523badeaa6b4ed8474b7df20bb5ce507a85e8d8bc091cdf419b2623f46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_027-001a, image: hfl/0636/0636-126.png}
body:
  text: 中華總真大仙宰王方平張道陵趙升王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注考召法師存思木官起屋救病法老君告救苦真人鄭仁安曰子為真人行者莫過救於重病之人也救一人病天地記為一功也夫人身者名為舍宅如屋相似故為欲救之理以呼存木官木官者五行之中有木官也假如甲子生人金命呼戊辰木官為上不得呼壬午木官起屋却害病人也來降與某病人起屋正屋其思如圖伐樹正屋修換梁柱如此三日萬病退差又曰夫人病重子為師欲救治但存思與他人正屋倒樹即有應驗病退也經云屋正身正屋邪身邪屋倒身倒又一云夫人身病屋左右足多樹其魂神飛散出身寄附其樹之上往往有人見有光明者是衰病人魂神也子為醫救之人先存木官斫倒宅左右樹存取此樹為木與病造屋於生氣地上是病人六甲行年生氣之地是又亦遊年上存生氣地起屋又修見住舊病屋三等屋若成正其病三魂守定但有一屋不正輒一魂不定若為醫師先明此法則有驗也病人即退其神却入身一夜蘿上仙入谷半苦即是神入身也覺白汗流是大退差之徵也老君曰授此法有二等一救人之病二者臣反君子逆父弟子不從師命者便與其病亦使木官云云用如前法相似老君曰夫為此法先躡地紀三遍散為禹步初九跡又却反反却回綱頭再發是也開為十二跡又反開為十五跡訖左右配衣圖中有左配衣法及有斗名右配衣法圖亦名四斗謂左右配衣流珠上卷第一步綱圖皆一左一右是也但檢用之即得也即存思木官起屋起治生倒屋倒治死二等任意為之訣在左手第四指中節捻之或以五色線縛之久長勑太上老君先天地生勑攝枯木花葉再生能治人病速即差平召攝魂魄令歸身形正屋正身早起立成急急如律令後聖君曰木官存下與病人起屋者有數亦有等級上為國王帝主治病起屋正屋四十萬人一方十萬人是也中有宰輔大臣四千人一方一千人是也下即五品至於萬民四百人一方一百人也共為正屋起屋伐木匠木握土開草草者俗寸殺氣也又為殃樹柱上梁架屋獲時存之立成屋成人差告命曰木官急急造屋屋成人福福人生成魂魄歸形疾病自差受福長生急急如律令捻還魂入神正魄訣訣在左手大指中節五色絲縛之二七日老君告羅真人曰羅文强殷時大夫甚能禁呪之術常與人物救災治病功滿三年白日上升此法數般用之一能治病二能辟惡三能治患害四能消口舌五能禁六能移七能敗此七數吉凶皆能為之也餘在師口中以口相傳祕而勿泄考召法師存思說身巡遊病家圖法老君告文强真人曰夫道士與人為師步禁疾病實不為易切須清身淨心一禁一呪皆是救百病功之為大此一法治病法師先思存巡遊病人家入病人門內直入户房內見病人牀上卧師即呼召存一陳野馬散吏兵把棒驅之踏殺作祟鬼賊驚呌奔走而散又存野猪大象師子來一一而並入房喫食作妖精野鬼奔走又存蛇蜈蚣等毒物捉捕作祟鬼賊精邪之物趂捉亡散而書決某鬼訣各有山鬼或精鬼或傷鬼魍魎邪精猴鼠魑魅精鬼也訣在流珠掌訣中法訣曰師先躡地紀三遍散為禹步三步九跡三遍配衣配衣訖左手把魒星指之七遍即存身著紫衣逺遊冠侍從將軍吏兵如法巡往某病人家某者某州縣鄉里某官人某百姓言百姓某巳染其病云云領吏兵以繩驅馬奔踏祟鬼流珠圖上不畫師子唯畫猪馬吏兵亦少按師云存師即得不必要晝之口訣云蛇蜈蚣禹鳥之猛禁之類食鬼治病用之立差也及師豫等獸奔突入宅中左右內外捉鬼祟食之其病即差無有不差者也天師曰吾授後聖口訣此法有三等用一救人病二能令惡人自病去不來害我三即破鬼神居止之處立即見消也昔有扁鵲常行此法以救治病者皆差往往如此十四年一旦太上大道君遣使下授以起死人之法忽能破腹治腸分别五藏䝞太子周順侯燕王次妃皆得從死因破腹治腸而再活皆得二十年三十年十年者又死鵲後七十九年在世往往與人治死而再生莫知其數後一日有風吏雷師前來迎以御前青龍白虎扶左右迎官數千騎引於南山而去不知起死法付授何人今世不見有行者又趙山山是漢武帝時為西河令妻孟氏號常真少而學父思此術得成也妻孟氏常性好道小年八九嵗時讀書識文字見父有此書常觀讀之熟後忽有人告疾者切以思心存身與往救之往往如此亦有得差者多後人知求者甚衆夫後知不許妻但聞人說有疾但以心念如此四十五年一旦太上後聖李君遣使授以六甲符文與孟氏書服之一十四年後忽去肉身逈飛上山不知所在考召法師存思說青龍白虎朱雀玄武鎮疾圖法老君授赤帝赤帝鄭仁安於西國受也驅使神靈告命符文曰世有四鎮大神能守鎮於人制御鬼祟衛人無夭傷可學道之人著功行如此之者功滿上升左有青龍之神本上天木星之神也好人長生性長護生生是人物生命也此神長好人物生成之氣制御死死是人物死者此神惡見之太上故符命命令護於世生人制死鬼故存鎮生人之宅偏去非橫口舌凶鬼咀人蠱毒扉此二字是非尸之字是也蛇蝎之物亦能辟伏不敢來為祟害也作此法常以每日夜以日兼夜日一度思之夜一度思之如此不逾存之三日應驗並差皆以先步存步者是步綱也存者是心存為綱步綱之法後聖君告尹真人言夫躡紀禹步以七年有功不必自身親步也即心存之如綱圖存身履紀紀綱過即得效如未有功效即須步綱躡紀之法地紀三遍禹步三步九跡配衣左右訖即存四等鎮守其病人及鎮護主人宅如此不逾一七日重病者退差不善重加此是老君言也言病者是忠良之人病與救之不善之人背逆之流用此法存念却即自生背道逆天之心病乃天與之今世人不知但怒怨鬼鬼實不能自為此害皆因假天地官之威即乘威而作祟也夫任仙官之位皆有威役使天西地祇九土萬國社神廟神官也此二等一等救治吉人一等徵伐惡逆之徒也皆以天之救徵也以子身受天之法帶天之文身是天官便行天令可執直其心取仁無親無偏黨之性無傍偷之欲清髙志逺志人之能久逺生生不退知進之人可授此法掌行天法悔救之訣非人不可妄傳罪及七代殃沒一身天師受後聖君訣在左手第四指第一節用五色絲線縛之莫令解之五日及夜鬼目盲人目青十日自消矣後聖君曰夫為道術之人須以真心無妄無欺無貪無嗔無癡如此之人乃可行持之法如心未真不直癡嗔貪妄不可行法勿效惡人須自身清直保得乃可為之今但行救人治病之道天地與子著功得仙道日近昔有道士黃盧子是葛越也常好行氣禁之術存四神及地神地軸神攝御江山如回手掌回山回山者一里之地開為千里江山千里江山攝為一里之地不難也縮地轉海法亦先經躡地紀六年長呼存四神及地神地軸等常帶地神地軸等籙即躡紀三遍散為禹步三遍又步絶地脉步三遍配天左右交擊綱三遍捻地心目大呌三聲即唱攝即地鎮四神及地神地軸神移山河江海變動闊狹逺近立成即不難亦加天地式相應少時出沒自由驗極之法此法有五等用之具口傳授金鎖流珠引卷之二十九
