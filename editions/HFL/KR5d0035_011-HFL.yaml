front:
  text: 金鎖流珠引卷之十一言一
  hash: sha256:8a7799c689430fe4b0d463a67505e91f7cda9c5ce14d24aa5560a115c93f7797
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_011-001a, image: hfl/0633/0633-004.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註說佩諸天隱諱太上老君曰諸天隱名真諱者皆是九天帝君祖諱祖名也常躡地紀飛天綱皆須帶佩於左肘後及九地隱諱隱名皆須同一袋帶之帶佩飛躡訖即誦十八篇呪依法捻遍訣便行大法也後聖君告天師張道陵曰卿欲修仙道之要訣須佩諸天大魔真名隱諱三元五星七星北斗二十八宿三十五星官六甲九州五岳四瀆八方萬國千山萬水真名及隱諱在身百靈不敢告言卿一生罪咎之書皆以至心畏敬卿身齊爲保舉卿名言隂功之數不言陽罪之過及司命司録亦如之也其度佩真諱自有文儀在金鎖流珠中篇說佩諸地隱諱老君曰本命日及六甲日佩帶修行爲上諸天言功保舉爲上仙所尊重諸真諱真名也昔黄帝得廣成君教佩此九地真諱經過之處神靈俱見拜送扶迎不敢爲患受驅使註昔髙丘子忽入山中遇一道士授與九州真諱及五岳名諱佩在身丘子食素一百日便常將此諱行往一日至咸陽日將己晚忽見四十九人著降衣玄冠來迎丘子丘子問何故答曰伏縁先生身上佩某乙上祖真言真諱真名姓某乙今受驅使今來迎見也恐此土地社廟不知故以先告報令知委也當直後帝常行躡紀得昇雲天又說西山趙芮向上七代佩天地之諱及名皆代代能驅使鬼神救人疾病累代著功前後得道者計三十餘人得長生或尸解之道或洞府之仙唯趙昇爲天仙白日拔宅俱隨身舉至孫芮甚能炁禁非法殺害鬼神太多所被謫仙令爲考召書吏註今之典名二千年後方得大仙註按九州地紀云西山古荆州地分即今西山名洪州是也拔宅上昇天宫太上老君曰吾受元始真言正法太上道君爲保舉制伏天魔地靈方始得身白白上昇唯一身而上遊謁諸天朝拜太上道君後方得朝元始天尊而不得拔宅上昇今余以志心精思撰述衆法經文祕訣及諸天隱文真言等得太上金籙之要衆文中撰出拔宅全家男女得道雞犬一時俱昇雲天從此之後始出拔宅註向前无拔宅流行時人不知將作藥成服得昇雲天俱家拔宅雞犬俱得同行拔宅上昇始於太上老君也註向前无拔宅流行今時得者往往有之皆是行此法計數十家也見在上天李王張許彭韓等數家俱以拔宅也李是後聖君於西域竺乾國化胡王成佛後拔廣慈道埸宅院一百餘間屋俱昇今紫微上宫後聖君舊宅是也後聖更添奴婢雞犬賜與俱昇註案此是後聖大慈大悲恩流賜言功功大積著多者便許及妻子子孫弟子奴婢雞犬同得俱昇拔宅正法老君告五帝註五帝是五方大帝君也前聖上清言素奏丹符後聖君告真文中五帝亦是若據前後聖人所說及天尊說經中言五帝是一等五大帝别无五帝位也自有真名姓於真丈及老君祕符敘上云是儒書所云五帝配位非正五帝之位也曰卿欲全家拔宅上昇天仙爲五方帝之位者先須變五星出五行竪五藏超五靈可以力攝五精驅役萬兵妻子俱仙奴婢宫闕居舍拔宅上昇天庭位號一方之帝統領羣靈日月星註日出皆照四方中央五帝之界皆有日月星三光俱照皆是五帝隨方統領者亦隨方屬於五帝天地水三官有魂魄有形註有魂魄有形曰精有炁无炁有聲无聲皆屬五帝之功生成含育之道是卿所行行令也法訣老君授訣於五帝及三皇萬仙人註老君先天地生始生爲道主代代傳教不絶前後傳者計有萬仙人巳上今畧筭且言萬舉身拔宅之法修行飛躡註飛天躡地紀一十四年欲功滿即以取春甲子日起呼甲子王文卿等六十人旬將與神將一十二人六甲玉女六十人六丁玉女六十人從官九百餘人註六甲録上有從官直符正數此三本不同故不再上兵士一百萬人存呼在身後身在前從宅西北乾上起面向南歩作禹歩行繞宅三帀註三帀夜靜无人知見行之即得亦不得言之更存出三元五德將軍八人各領兵註三將軍是中元唐葛周三將軍也兵士各三千萬人五德是青龍白虎朱雀玄武黄庭大將軍等五人是也存之如含弘圖隨配三元隨配兵士具前註逐方註五德將軍東方青龍將軍一人兵士八十一萬人西方白虎將軍一人兵士三十六萬人南方朱雀將軍一人兵士六十四萬人北方玄武將軍一人兵士二十五萬人中央黄庭將軍一人兵士一十二萬人各隨本屬官領兵士而來又請金鎖流珠中六紀將軍六人兵士各一十二萬人柱天將軍一千二百人註人主一日故一千二百日一周直柱天上也人各兵士一十二萬人各金鎖流珠光芒精銳兵馬衆三十六萬人等隨心應口而與臣則玄結此宅界方圓若干畝厚十丈百尺厚和屋舍與地俱昇急急如律令即捻天神地神訣註天神訣在左手第三指第三節是常以五色線縳之又以每到月生一日以朱墨塗之捻之地神訣在兩足下註左足下近心有文如魚相似是地神訣也常以欲歩綱日近三日向前以朱墨塗之即歩綱又須捻宅神及水神竈神訣訣在左手第四指第二節都宅神是都監月十二神亦捻都神目絳宫訣等訖即勑神曰東方甲乙寅卯辰支干五神將領吏兵八十一萬衆以禁歩拔此宅東方則玄宅外界入地十丈和土拔須上令得上隨身及家口男女雞犬同昇天庭急急如律令又南方丙丁己午未支干五神將領吏兵六十四萬衆以禁歩拔宅南方則玄宅外界入地十丈和土拔上令得上隨身及家口大小男女奴婢雞犬同昇天庭急急如律令又西方庚辛申酉戌支干五神將領吏兵三十六萬人衆以禁歩拔宅西方則玄宅外界入地十丈和土拔上令得上隨身及家口大小奴婢雞犬註見上古本无奴婢字見後聖君内傳中說拔宅有弟子男女及奴婢之字分明又見往往有弟子及有男女奴婢雞犬牛馬得隨上昇者甚多風所添之故向前東方勑未敢言之及從南方起終於四維四正四定等言之以傳志道之士非人勿傳同昇天庭急急如律令又北方壬癸亥子丑支干五神將領吏兵二十五萬人衆以禁歩拔此宅北方則玄宅外界入地十丈和土拔上令得上隨身及家口妻妾男女等註上古亦無妻妾男女字唯見後聖授天師拔宅法勑將吏有妻妾及男女字入在勑宅北方勑文中言妻妾三人及女四人并兒一人所以具於拔宅北方勑中以傳志人明知學道功多妻妾同昇上天宫仙真之位奴婢雞犬同昇天庭急急如律令又四維註寅申已亥是四維神也又一云是四孟神也又四正註子午卯酉是四正之名也又四定註辰戌丑未是四定也又一云四季是地上名四定以主人心也一定東南二定西北三定東北四定西南故稱四定經云一定之處必有大災配以屬土故以土星所臨之處皆有大災後聖君知故製拔宅神通法立名四定定之却禍除災災不敢州犯大道神通正定之力大拔宅三四一十二神之力共拔宅上昇雲天金闕帝晨後聖上道君七寳玄臺玉京上宫羅天大城之内空閑寳地之上十畝之内居宅得住宅佐轉後聖之宫身得爲小臣之數長生久視得事後聖乞如所願勑勒拔此住宅急急如律令又戊己六戊將軍六人六己將軍六人兵士各一十二萬人隨臣則玄歩禁拔宅上昇天仙同心併力與四方一十二神將獸士兵馬等俱拔此宅結界與人俱昇天庭金闕玉京之内急急如律令讀誦註讀須把卷即不如誦之大驗也老君曰夫欲拔宅昇天庭註庭是太上玉皇之庭謂之天庭也先呼存人門之神註人門申神也宅西南至西北申上神是猴頭人身白衣左手捉箭右手持弩名監兵守天西南角將兵百萬衆酉上神雞頭人身白衣左手捉箭右手持弩名子恩守天正西酉上將兵百萬衆戌上神狗頭人身白衣左手捉箭右手持弩名弓隆守天西北角將兵百萬衆西北至東北亥上神猪頭人身黒衣左手持鉤鑲名不臨守天西北角上將兵百萬衆子上神䑕頭人身黒衣左手持鉤鑲名執明守天正北上將兵百萬衆丑上神牛頭人身黒衣左手持鉤鑲名阿君守天東北角將兵百萬衆東北至東南寅上神虎頭人身青衣左手執鉾名孟章守天東北角將兵百萬衆卯上神兔頭人身青衣左手執鉾名門之守天正東將兵百萬衆辰上神龍頭人身青衣左手持鉾名天禽守天東南角將兵百萬衆東南至西南己上神蛇頭人身赤衣左手持㦸名寄房守天東南角將兵百萬衆午上神馬頭人身赤衣左手持㦸名陵光守天正南將兵百萬衆未上神羊頭人身赤衣左手持㦸名除君守天西南角將兵百萬衆左將軍從北斗南門出在左飛行中將軍從北斗南門出在前飛行右將軍從北斗南門出在右飛行右存呼三將軍名字隂呼訖註左將軍姓唐名宏右將軍姓葛名邕中將軍姓周名武三將字總在三將軍籙上記取案法只得書名於引書字於籙凡見數本无三將軍字所以不注又呼左青龍右白虎前朱雀後玄武當門師子中庭白鶴紫雲蓋宅即從地戸入註地户東南是門也宅中庭躡地紀三遍又飛天綱三遍訖即散爲大禹歩一十五跡訖配衣七斗成註前後法用配衣者皆一斗成或二斗成也令此拔宅之法大事須七斗成是金鎖流珠第二卷上是躡地紀之事是方始得七宿炁足即千神萬靈衛佐身形訖方轉天關指四方及中宫四維四正之正往往如此不逾三年宅隨身家口男女等上昇天仙轉天關指東界甲乙之郷木寅卯辰三將也人各百萬衆兵竪架此宅東方上堅牢土木下築鐵圍堅鋼東方仰堪隨臣則玄得上昇仙日及臣家口良賤雞犬得昇天仙人雞犬同得上昇天庭急急如律令次面南向轉天關指南界丙丁之郷火已午未三將也人各百萬衆兵竪架此宅南方上堅牢土木下築鐵圍堅鋼其南方仰堪隨臣則玄得上昇仙日及臣家口良賤雞犬得昇天仙人雞犬同得上昇天庭急急如律令次面西向轉天關指西界庚辛之郷金申酉戌三將也人各百萬衆兵竪架此宅西方上堅牢土木下築鐵圍堅鋼其西方仰堪隨臣則玄得上昇仙日及臣家口良賤雞犬得昇天仙人雞犬同得上昇天庭急急如律令次面比向轉天關指北界壬癸之鄉水亥子丑三將也人各百萬衆兵竪架此宅北方上堅牢土木下築鐵圍堅鋼其北方仰堪隨臣則玄得上昇仙日及臣家口良賤雞犬得昇天仙人雞犬同得上昇天庭急急如律令次向天門立仰面看中宫及上下轉天關指中宫及上下四季之郷土戊巳辰戍丑未六將註經云六紀將軍是也人各領一百萬衆都總六百萬衆皆屬九土之神兵以依九地神通之力甚能移山遏海拔宅功力甚大與四方支干神官獸士大將軍以同心併力拔宅浮空如等閑之事不足爲難易人各一百萬衆兵竪架此宅中宫上堅牢内堂三間東行廊西行廊廳門庫東西南北四院靜堂倉囷髙脚井竈中庭書堂奴婢住屋等若干間註天師一百二十間屋蜀張天師有一百二十間屋俱得拔昇金闕内城玉京東南空地六十四畝爲住宅佐玉京金闕後聖君爲左仙宰相位屋土木下築鐵圍竪其中宫屋宇大小瓦木堅牢内三間東行西行廊廳門庫東西南北四院靜堂倉囷髙脚仰堪隨臣則玄得上昇仙日及家口良賤房院雞栖馬廐舍屋總須隨同得上昇天庭急急如律令又勑四正卯酉子午四定辰戌丑未八卦乾坎艮震巽离坤兊守宅三將軍井竈五行六甲六丁一切諸神兵並隨臣則玄口勑隨口所使拔宅屋宇飛行同身上昇住止急急如律令便息更捻都監訣及天理地理訣或朱墨塗之訖便畢往往如此行用三年神常備宅身得昇舉宅便同行此功甚妙不可妄傳非人後聖君告玄洲二十九真及張天師曰卿起今巳後教有道心志好之人先著積隂功於人物註隂功具上引註中勿育隂毒之物多積隂德之行註隂功成而道功著子孫盛榮而拔宅隨身得昇舉勿生隂謀隂妬常行隂善隂力註力及於人物如此之道自覓人非人覓得其道昔苦行真人常力求財物施惠於人功德滿三千白日有神下與拔宅上昇雲天意況拔宅隂功著德感卿更修此綱呪之法攝感諸大神靈與人拔宅上昇也於人并以歩呪感攝天地大神與卿拔宅上昇天庭又告天師曰卿欲得宅及養育之物隨身仙駕上昇天仙但新建立屋宅周備開四門約如郡郷之宅註宅如觀相似新堅牢實新堅牢實者但依前歩躡綱訣之法功滿千日自得隨卿上昇天帝君卜吉地築基架樹於玉京之都常使天神護此宅不休又告天師曰夫人宅不安并有損失人口者以四孟日書五色石上作消災却害字各鎮五方註東方青石南方赤石西方白石北方黒石中宫黄石天子千斤諸候六百斤各重一百二十斤案鎮宅儀五品三百斤巳下一百二十斤各書作四字埋之入土定三尺是三等諸侯百姓一尺道士三尺是其本法尺寸也後若欲拔宅上昇此石不用移動此法是上界鎮宅之法祕之勿妄傳非人老君曰此法臨拔宅上昇修行法註此言是欲修行拔宅法歩呪臨行日夜是也時先存本師於前從者玉童玉女三元五德六甲八卦註八卦甲乙丙丁庚辛壬癸是八卦之神十二支千二十四炁神扶車御雲龍駕而來在身之前身在本師後令似金鎖流珠之圖往往如此三年師勑地神令地軸常巡住宅在左右卷攝諸災毒害之炁常令清靜安寧排神列位專候宅主上昇之日隨本師差使註按神仙正經有一人得道皆因本師弟子自合孝順於師常玄空知弟子心孝得道之日奏太上差使下迎於身引以朝謁諸官告尊卑拜數後始安告今詣某處受仙位上住下迎宅主此等將軍浮屋宅入五雲地軸地關卷浮地隨主上昇不難飛雲龍虎雀武師子鳳鶴立便輕舉在於須㬰老君授拔宅内綱訣圖此宅西從北向南五百六十歩此宅東從北向南五百六十歩令此不依此此是天師宅數方圓如此令人但任長短太小爲數也老君曰歩綱畢存土中中郎神一千二百手把劒身長六丈五尺一躑髙六十丈甚能有力助人拔宅歩綱訖捻訣訖存而到使之助神拔宅甚有靈驗助力甚疾上勢如風形圖在經中註在流珠中秋中元三將軍部中也金鎖流珠引卷之十一
