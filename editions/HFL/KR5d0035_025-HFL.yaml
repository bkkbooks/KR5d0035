front:
  text: 金鎖流珠引巻之二十七辭七
  hash: sha256:7d02096b43f0f3e3b79d780b3c5443d897e8db2e30780c9703886ece8d774d58
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_025-001a, image: hfl/0636/0636-072.png}
body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注志人學道縮地徃來之法入洞天法附太上老君曰夫學道精心切志求有應驗神通年嵗積多皆以有應有應之後即是神通神通之後勿用勿言以求至道之事能以慈心救濟人物用之不爲閑將戲弄逞世說我神通如此之人非志人也法曰先帶地軸神籙於左地軸籙是黃庭將軍符有三巻二十四將將甚能縮地脉縮千里爲五里或爲百歩之間萬里爲十里或爲五歩之間昔壷公先生能爲之費長房遇之因宿壷中一夜長來以經三年遂受此籙能縮地脉日行萬里之外不可能及其人也今人只知有縮地脉不知地脉亦屬北斗所管欲縮欲開皆自由也長房曰吾能開寸歩地爲千里江山千里江山攝爲寸歩地神通自在之故也如繫之於左訖即躡地紀順反覆倒再履如此五遍謂之金木水火土五行具也又散爲禹歩三歩九跡三遍即變十二歩二遍又爲十五歩二遍配衣轉天關指地捻訣訣在右手大指根也入掌中是都監訣下是及捻土神及地神刀支及地心刀支後聖君告天師曰常以庚寅辛卯戊辰已巳之日地辰刀支及地心刀支地心在左手大指對根節左邊常朱墨塗之欲使地神右手捻左手夬學未成前常記之朱墨封之三年忽一且使立到千里之外别刑縣者皆地神所移令到彼州縣者也徃徃有此事老君曰夫行禁炁移轉星宿斷江縮地皆是有信之人可以傳授非其人不得妄傳傳得便妄用用法又未全得神通且爲心之不平不直性麤惡急怱怱心毒妬而妄用者切只令知有更道傳授此人大須禁之蓋此是道家上法縮地徃來如廻指掌入洞天法後聖君告大王君曰夫地下主者有洞天之仙眞但能長生久視之道名曰不死之鄉官有三等之號一號洞天仙主二號司命三號司録是也子欲入於洞可三月九月中六庚日禹歩地紀先躡地紀後爲禹歩三歩九跡又踏十二歩又十五歩訖報配衣轉天關九度指洞門徃徃如此不逾三日或五日洞門怱然自開見有女人勿隨入也待王女前入計百十餘歩間方可入若男子出便隨入無妨配衣天關轉指開洞門人出直隨人直入女子令前入計百十歩即從後入此是女仙窟宅老君曰入洞須存日月照耀前行存野猪呉鳥師子白鶴青龍白虎玄武朱雀左手捻洞門訣右手朱墨塗洞天訣在左手地心小刀支是洞天訣右手掌中心近臂直文謂之地畢次名洞天訣欲入洞前三兩月間常朱墨塗之後到洞門進更右手捻之自開神出迎入洞天也入到洞門門爲之自開神迎子入功成名遂欲乗龍駕鶴乗風上天入地入水入石法老君曰仙人作法能召龍御乗控鶴安駕上天入地等常以壬辰日歩躡地紀三遍散爲禹歩癸亥日飛天綱三遍誦乗龍呪呪在飛歩綱中三遍訖散爲禹歩三遍配衣轉天關指東方青龍祖孟章姓孟名章是青龍將軍大約龍之初祖姓孟後有龍之子孫各以分姓以依於人姓名今亦有姓崔盧李鄭姜湯梁常之姓至晋朝有兩龍從于闐國來稱姓田石等住江南天台徃來住繼代龍孫前注也又指南方赤龍祖陵光姓陵名光世大約朱雀將軍種姓氏也後子孫攺張王趙章羊應之姓繼代赤龍孫又指西方自龍祖監兵姓監名兵大約白虎將軍種姓也後子孫姓白夏商夏仁文眞陳前袁之姓繼代白龍之孫又指北方黒龍祖執明姓執名明大約玄武將軍之種姓也後子孫攺姓留裴元劉皇甫官阮孔單仇鄧之姓繼代黑龍之孫又指中宫黄龍祖黃庭姓黄名庭大約黃庭將軍之種姓也子孫攺姓丁帶雷壞梅鄒池河歌羅和之姓繼代黄龍之孫也等繼代龍孫丁黃陳趙直日者來奔吾爲天官常入天門用汝乗御急赴吾存之思存天地天地爲吾晴吾思日月日月爲吾明吾思江海江海爲吾清吾遊天地日月靈山江上急作急召海龍須到急行吾更經過八表太極上清急急到急急如律令後聖君告天師乗龍訣凡乗龍駕鳳皆用天綱炁乗風乗雲乗煙乗塵乗霧乗野馬所用綱炁陽綱者爲天一天庭亦云天蓬炁取之法當知天一所居處推之法用如隂陽禁中法更無法也若欲之時向天一跪閉目鼻取天一炁並作紫雲遍身内二十四兼止尋天蓬炁九爲御者又欲天綱炁五行時伏龍雲㝷起即捻左手第四指第二節叩齒二十四通又營目閉炁爲之所法家之隨意使見此法時線作绳纒神都目時鉗封之以時神印印之時神者所謂正月登明二月河魁三月從魁四月傳送五月小吉六月勝先七月太乙八月天綱九月太衝十月功曹十一月大吉十二月神后等神所法家者立差唯乗龍駕鳳在足下龍鳳理爲法男子乗龍女子駕鳳時人也昔列子乗風法以此禁乗女子駕白鵠女媧駕鶴皆是此禁駕之若欲乗龍取天一炁九過以自覆取天罡炁及白虎炁各十一過叩齒亦然駕青龍捻都自取六庚上鐵大如小指長一寸四分隱於乗龍理上白線爲䋲纒之四十九帀封以白蜜印以白虎印及從魁印印之青龍立見任意乃乗矣事訖解之封印捻右手第一指第二節舒息七通其龍去矣諸世人不得不愼矣禁龍鳯雲鳥風煙塵霧等唯求仙絶代者爾乃得之自非清齋山居召至害人愼之駕鳯乗龍無有别法唯知五官日神有異及隱文别耳老君曰駕鳯法亦同乗龍勑呪唯攺言東方青鳯也五方勑請之與龍法相似訣别五方言之此鳯以女師乗也鳳訣在左脚下鳯文是圖云駕鳯之訣是也乗龍右脚下龍文是圖云乗龍目及文巳上二等訣法並在掌圖中但用桐木爲小龍鳯畫色成縛之本文理目上五色線也秦女弄玉乗鸞鳯而遊八方得蕭予之教法也訖躡紀三遍禹歩九跡配衣轉天關指東方天上青鳯來控御駕而乗上天周遊八方來徃不倦於仙府也畫地爲江河或爲衆山法老君曰夫志人修道道成因行人間遇惡人所追及有賊欲盜劫仙經符法秘訣靈藥者遥望見十里五里之內外者可以避入路邊躡紀三遍散爲禹歩三歩九跡訖配衣轉天關指歩之內化地爲江海過不得自身退藏藏後化爲平正之地案變彼賊衆之眼上古仙人徃徃有也有人直强而過溺水而死者多爲其天地直炁行行被炁干衝始要令似溺水死若據所殺者北斗中兵衆所殺也捻人刀支訣隨金木水火土訣東方人名木南火訣以五帝配老君曰若被惡人妄有追捕身者不可妄與追殺即當存如前歩躡紀配衣轉天關指草林木爲山山相連接便入此山中時隱藏避人散後出此山訖便變爲舊林木無山也追人莫知何靈異失山所在一生追之不得即休也變壷器盛天地六甲七星府天營出没隱見法太上老君太上者老君也是太上弟子故後衆仙尊號爲太上老君曰今人不知但作老君字不合除太上二字曰夫志人修六甲二等功成一等人間太上老君自服者六甲符又一等是靈飛六甲符也及躡紀飛歩三等功成更佩受三元五徳三元是三元法籙也五德是青龍白虎朱雀玄武黄庭法是自有三十六階志修道者學此法皆須以受籙具足自得通神可指小器之物以盛天地竒功至神之驗不可測之昔壷公先生教費長房爲之法籙具足自然通神變化不測可以能變一升之器可容天地如初造化自然之功也可以取春庚子日種小仙壷仙壷者似小甖子可容一升半者巧種取庚子日種於宅東南之方二月中有庚子日即得也種時不令女子見之女子種不令男子見之到八月堪實者留三五顆令實收取經云一根留二顆上三顆是中唯中上留之下不用不中爲法恐不多實故不留多耳子上色堅好者兩器先盛朱砂五兩一云六兩是正法也六十日次曽青一二兩入砂中六十日以䧺黃六十日次入上色輕墨二小鋌六十日次入雌黄二兩六十日次入銀泥二兩六十日次入金泥二兩六十日次入胡燕脂一兩六十日巳上八種物投入壷中各得六十日都計六八四十八緫得四百八十日巳上器盛之其朱砂盛得六十日便取書六甲二等符四百道投一壺器中兩器同向靖中東南柱壁上掛之著梓木版隔斷地炁勿令衝捐實器以甲子日起首歩躡歩者天綱躡者地紀故爲歩躡各三遍訖各誦祝取周周地紀十八祝天網二十九祝也呪訖散爲禹歩三遍三遍從九歩畢十五歩配衣轉關九度指二壷毎一壷皆九指指訖祝曰吾欲昇仙變汝盛天吾欲立治用汝盛地左營右營六甲七星左營管符右營主兵符兵俱會受六甲北斗之炁日數千日滿即通靈昔壺公先生口訣教長房滿與吾致神使靈神靈變化萬端扶吾上昇天庭急急如律令但逢甲日輙爲之五年大通神驗立取神仙此是太上受壼公口訣長房受得亦口傳余老君曰夫爲法者先起於心人若以心可忠能盛著天地作此法即成心若不平偏邪曲妬學得法術徒欲捐人又欲幻惑人不爲正直之道事有邪假身在天地之間尚被鬼神所殺不得壽終於天地何況欲將小器化成大羅天地此非即至心眞志神志聖造化功力不能得見此法況其欲行之得力也子若得見受者須以心寳重而法不負人天師受後聖君告命北斗九眞有二十四條正法使北斗君斗神夫人妃女等及斗兵斗官功曹使者依條受驅使變化厭制救拔出災度厄來生却死入水入火出兵隱形等無不成者得此門户使用速於水火其第十一條在北斗引第九上下兩巻中其一十三條在拔宅等向下兩祑二十巻中所管其中亦言說北斗之中甚多其北斗是天之使大道之橋律法門之路但天上人間皆須用北斗之法禁制即有慿太上老君曰天地之間有五斗眞人中斗爲首今人間呼爲北斗是也且中斗爲君有帝尊二星北斗爲臣有七后妃嬌女之位按此人間說所言亦有所憑以將中斗爲北斗者以古人之意未有賢逹所解所以執一爲定風今按天文圖云即疑知有别今按天師傳後聖君告有五斗君姓名號并言帝尊玉帝二星於二斗及流珠經言亦如此說即知飛歩者是中斗后妃嬌女者是北斗如是天神居位官髙恩重兼有妻子巡察之任分别以兩權也并後聖君授天師金鎖流珠祕隱不洩聖語不妄授人百姓無憑得識所以一名呼之今淸志學道須依此引行之即得有憑有驗法術及行鬼神畏敬受驅使說二十八宿二十八宿正引二十八宿引已解流珠中欠闕無法用者言之如有者不言從東方起右轉終於北方中宫不言也志人修求至道常行不言之教内以修治其身外救家及他人夫志士修道得此書并法法是流珠常行不言內常自依法修治其身令感内眞應法通神力堅錬魂外以救家及他人不修外律聲識形像之教令人輪轉墮於徃來人間因縁恩愛生死之道貴賤等級之教皆非正道志人須切知之請依道經之言但行不言之教處無爲之事自漸覺悟勤而修之白日昇舉老君曰東斗君者一人呉人也姓秦名除字千犯周前得道封爲東斗君管於東卿七官大宿及東野萬象星官管於東方角亢等七大宿官也但是七宿下生人有災厄及惡星宿相加相臨者依流珠上言語訣法行用陳告訖即躡地紀三遍散爲禹歩轉天關指東方十八指捻司命及東斗法訣訣在左手大指根急捻之訖誦一十八祝地紀一十八祝是七度行七度如此災消厄度疾病差愈此是言自行之天師曰志人常行之二十四年便爲仙人如或有親友有厄疾爲行之亦得行之一依自已法唯名别天師曰餘南西北斗一依東斗法歩祝行用唯其斗君名姓别有具列於後訣唯有一訣歩綱祝啓乞願臨時由人作辭及口啓元在其二十八宿名星圖具在流珠正經以意詳用即得次南斗君及七宿法老君曰南斗君姓唐名鹿字宣道太原人次西斗君七宿法西斗君姓劉名起字石嬰長安人也次北斗君七宿法北斗君姓陳名奉字百萬江夏人云云在流珠中右斗君四人星官二十八人皆受志人配使并乞願皆如心手相應無事切不得妄行却招反捐人也次司命法老君曰左司命一人也姓韓名思字元信長洛人也司録司罰佐命有三十六大貟官右司命姓張名獲邑字子良廣陽人也司録等亦有三十六大貟官也天師曰韓張二司命皆是漢髙帝之臣也老君曰得左右司命名可以六甲日躡地紀歩祝如前二十八宿法唯訣各隨命配爲司命訣捻之徃徃行之二年便獲長生出消災厄祕之法乆乆行修白日昇舉金鎖流珠引巻之二十七
