body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注太玄元炁所生三元引太玄註太玄上清等上清之始元炁之初元炁生大道大道生太一太一生三炁之色也玄黄元白始青此三炁之色三炁烟煴交通往復黄生赤青生黒此五色之炁也炁生色炁色相生三五无極炁色結形號之曰神神形有名標其位明有尊卑更相輔助治邪佑正藏身求仙出名呪印佐國衛家解罪布福護善誅惡皆成將吏兵馬前後世異立法不同簡略之時或從委曲之儀滋繁之日或宜省要之科是以道應抑引隱顯參差後學成真受命玄職姓名郷居隨世代出或无不可具載今記先師所傳者如左後聖君授道陵曰子欲修行先知始生始生禍福立有分明得福者王失福者衰又得禍者死失禍者生能除刑禍以辨始生假令甲子金命人元炁在辰辰巽之郷總也始生在巳成午未榮申王相酉酉爲福德休在戍廢在亥刑在子禍在火火元星木命人始生在亥成子丑榮寅王相印印爲福德休在辰廢在已刑在午禍在金金元星水命人始生申成酉戌榮亥王相子子爲福德休在丑廢在寅刑在卯禍在土土元星土命人同水命人用火命人始生在寅成卯辰榮巳王相午午爲福德休在未廢在申刑在酉禍在水水元星即身從五行始生亦從五行所滅卿能出刑福變入長生則成仙人往往如此四年名入地真仙也金命人熒惑惑火星爲禍星常欲禍金命人人知之以求辰爲福星常救止伏其禍禍自滅不敢行人得長生木命人太白白金星爲禍星常欲禍木命人人知之以求熒惑爲福星常救止伏其禍禍不敢行人得長生水命人鎮星土星也爲禍星常欲禍水命人人知之以求嵗爲福星常救止伏其禍禍不敢行人得長生火命人辰星水星也爲禍星常欲禍火命人人知之以求鎮爲福星常救止伏其禍禍不敢行人得長生土命人嵗星木星也爲禍星常欲禍土命人人知之以求太白爲福星常救止伏其禍禍不敢行人得長生夫修行之人常先履禹歩次北斗次中斗中斗名天綱也故飛歩次三台次五星即用金鎖流珠上卷第十二呪及飛天綱呪五遍及請於則玄身福嵗星君與則玄剋鎮星土炁不得妄行刑禍若刑禍於則玄身者嵗星君與青童君斬剋之急急如律令餘倣此五星靈書中自有行用五星符剋五行之刑禍度厄守元氣始生者父母也註父母金木命也配與己身相剋以符止剋今己身不相剋者以明始生假令母命金子命木母剋子子必不壽以符止剋之母子俱吉母命土子命木子剋母亦以五行符止剋之母子俱吉註餘皆倣此此例者言始生元炁不相刑剋修道大吉帶五行符剋鎮厄訖誦父母始生呪捻刑禍己身訣註假令金人火爲刑禍訣在五行掌訣中具載也祝曰吾生於父母長在俗間云云呪在金鎖流珠上卷中有兩呪呪訖歩始生禹歩一十二歩剋始生災厄每至本命日爲之歩綱訖又祝曰吾生於父母云云是後呪呪亦同一處也始生行之一年辟非二年金木不相剋水火不相害三年去死來生四年成地真與人解始生災禍厄二十年名昇天真位列諸天三五所元炁次列三五所生註三者天地人謂三才三元也三才各居一元故謂之三元註上元主天中元主人下元主地謂之曰三元將軍一元一人爲將主之吏兵一元合清三千萬衆人隨從也上古太上大道君受之於元始元始傳道君註道君出時天皇之世世人未有法律上元上部將軍一人出號曰姓唐名短神力勇猛化身長九千萬丈領兵帶劔執簡兵士九千萬衆主天上上極大羅三清之上註玉清上清太清是也上元中部註中部是上元中將軍主人身中一人之身亦同天同地以身配天配地一切俱備同也將軍一人姓李註因老君姓李自令攺姓李名拒身長七千萬丈領兵帶劔右手持㦸兵士七千萬衆上極三清中入人身上除天羅中除五行之災下消地禍唯李將軍甚能佐衛於人力能除諸天始生災厄註古人以金作長一寸戴以絳袋安頭上善於厄中救人也上元下部將軍一人姓東海古姓今後聖改姓徐註今用徐姓是也名康身長五千萬丈領兵帶劔右手持玉陽之節兵士五千萬衆上極上清中入人身善能治病消除諸天十方九地始生之處災厄刑禍五行金木水火相滅剋之害者能以道力消除之又有三元三功曹三人上元上部唐將軍下五剛神功曹一人姓姜名毒身長九百九十丈領兵百千萬重人朱衣赤幘手把金符帶劔在大羅之上上元中部李將軍下五剛神功曹一人姓張名季身長七百七十丈領兵百千萬重人赤幘右手持㦸腰帶劔在太極之中上元下部徐將軍下五剛神功曹一人姓温名舒身長五百五十丈領兵百千萬重人赤幘右手持玉陽之節腰帶劔註上極大羅之天天上天下及入人右腎之中已上三元功曹出入各從眉間天門中出入甚能令人得法得術叱喝鬼神虎豹毒蛇凶人毒龍精妖魅鬼等此說三元上部三將軍姓名也註上元上部將軍一人姓唐名短上元中部將軍一人姓李名拒上元下部將軍一人姓徐名康并三功曹是上元一部主天也中元三將軍始生上古人皇之代三大臣爲道隨人皇修行道成得中元三將軍註風安羅强天生是三人姓名也後周穆王三大臣替前三人風安等又有三人後任唐宏註爲諌議大夫即今之宰相也又爲司徒司空等官也葛雍註爲侍郎司常卿即今之太常卿也字文度周武註爲侍丞中即今之右丞同右相位也三人學道隨穆王修六甲三元九宫之法便去官穆王得洞府之仙隱遊王屋山託解尸而去莫能尋求遂各精修胎息服炁燒錬金丹而成服三服未得昇仙但得不死五百餘年在峩嵋太白等山中三人結盟志共尋求至人願得至道白日上昇雲天我等今知上界新有大道太平金闕玄元後聖玉皇帝上道君今共結至心願我等三人得佐爲臣至心常願與玉皇得行志要佐助玉皇下受道之人取千百億萬功功成我等三人豈敢言功勞常懷救度之心乞願上天太平金闕玄元後聖玉皇上道君聖恩遥見念發願之人行之三年果有所遇於太白山秦更始二年七月七日太平金闕玄元後聖玉皇上道君降于太白山註古名大圓白天山授唐宏等三人三五金鎖流珠經一十五卷躡歩天綱地紀之法各行修三年得地真註真是能行綱禁之法救人疾病者多太上後聖君大喜其道真心内情立即見再授行之十年再下授此引訣一十卷三人日夜修行二年果仙得朝後聖君補以充中元三大將軍之任主領三天正一之法以配斗爲衣衣斗履斗飛斗戴斗順斗倒斗反斗横斗低斗逆斗昻斗坐斗行斗卧斗註卧斗是安卧眼未閉前存斗如被蓋身周遍以隨月建所止之神斗魒亦同斗建指斗魒斗務斗魁斗剛斗柔斗隂斗陽斗邪斗正斗收斗捕斗誅斗註是歩斗誅鬼斬鬼之歩亦轉展舒星斗而斬之禁斗註存歩七星而禁凶惡作斗正形爲羅蓋務魁之獄禁繫鬼神而堅止下也含斗註含七星於心腹之内明照五藏弘斗註弘滿天地以去妖惡等法并以禹歩相添正行正一之法立能興動風雨天地順心太平金闕後聖玉皇上道君給兵三千萬衆隨正一三將軍籙及禹歩籙等二十四階多論歩綱禁法之事立能救濟之術功滿拔宅昇天如在洞府之間得籙使之如手應心神力立驗故能上可飛昇得在太平金闕聖君左右中部道將助衛宫殿追伏魔王攝録三官之用細能佐護受籙法修行綱歩之人人能精修心念感用妙在三圖註二圖一舍身二出用三含影等圖㫖以存思出入於心腎之中用即身長一寸從心腎中出漸漸長八十一丈領兵三千萬衆或收捕凶惡之衆或五蔵中病疾即從眉間入身長一寸心腎之中安鎮五蔵百脉也守之堅五藏註志人日夜精思唐將軍入在左腎葛將軍入在右腎周將軍八在心中鎮治五藏及百脉中除諸邪妖炁疾病之根元也此即後三元始生也註此是後聖君秦始皇時更始二年七月七日降於蜀太白山中元三將軍本太平後聖君所置也賜白日登仙將軍之位上天入地入水入火大能包天地之極細能入人身之中護正破邪如霜見日故能常通威於善行之人每執節於凶惡鬼神保身助國隨籙言功定志取仙在心不失故能堅剛於巳智慧生心須在中元同力度人註人行符役使將軍吏兵濟度危厄疾病唇齒山海毒蛇猛獸龍蛟風水之難皆與度之此功則以人神俱因符帖而獲功謂之同力謂之得度而令得度者生歡喜心知有道化謂之中元三將之功施惠也中元三將軍始生於人皇之世而以道感天賜授中元三將軍保衛人皇也後三將軍始置替者即後聖上道君請於太上大道君將下授張天師即言始於後聖君置也註按神仙太玄正經云中元三將軍三人上古人皇以前太上大道之主虚皇元始天尊賜授太一下爲主將領主太一之府後聖玉皇奏請下界合得道人替前三人此前人以昇天真之位下界三人即替三元之位後聖君請入下界名籙正一以佐護受道之身并諸結心用印掌訣隨符籙驅使今人授籙者能使結法歩綱存之立驗取道之子受道之後得訣依師行住坐卧長如坐忘結結捻訣也印存想如圖一年无病能立去惡救人二年辟兵惡鬼猛獸見伏三年去死籍四年𥙷正一地真五年神通神力无比手指凶惡皆自伏心不可妄行行須是損己之害者已避而不得者須捻其本訣而隂思斗衣於身斗魒於乎指之勑中元三將軍領兵各三千萬人衆水火獅子毒蛇而一一擊之必自心伏死不犯於己若不伏者捻凶惡刀支再使斬剌應手吐血而死隂誦五行呪金木相伐水火相滅云云此是自隂而慎之勿行道人不得已而行之又告使訣在左手大指第二節近左取之註近左是當節須近左邊是也但是三元三部九將軍緫管於第二節也上元正心中及下元在左常存用之出如圖左右男女男左手是訣女右手是也常以存用不惑不妄註不幻惑於心不妄惑加於忠良也立取天真邪毒註邪魔王妖氣也毒蛇龍鬼獸也畏敬惠施註志道之人常以符術濟惠貧病困乏慈力度人厄難行惠恩德教授賢人是也通神目長堅身廣成子授黄帝曰帝欲求真莫過堅身帝欲堅身莫過通神神通之後註欲得見神者有六等一授籙法二清心寳祕莫泄非人三得真經真師傳付四得綱紀具足五須得此引修行志人入門見道六既見門户修行事得訣所用無失錯此六等修行之法唯訣爲一不得此訣五事俱用不通今丗人得授籙法極於上清兼聲教修齋念道香火不絶清心不退全前四等事俱修老一生者至多不見有一人得者皆須求明師兼傳引訣印等方始神通既得神通未得道得道須是明師再訣得度心神心神不起妄想忘加備人物只可度道得道白日拔宅上昇者亦多至如天師許遜王長尹子兄弟上古三皇之徒皆拔都城宅而去皆莫不因此上中下三元九將軍五德六紀等將軍及七星九精五斗衆星但天地水三官合金鎖流珠一十五卷中所部者衆神衆真仙靈將軍吏兵極通之法即得白日而上昇或拔宅俱去也昔周時西國胡神成道者是太上老君爲務成子之時教胡王再託身綱訣之法得爲右玄真人師事大平金闕玄元後聖玉皇帝上道君者亦因此法訣得度平等心不非不妄之德子名地理力可千夫三子地皇五子地王等兄弟三人有力勇猛精進智慧强人无名君故封爲下元三大仙官將軍之位領兵衛護得度法籙之人註後聖今替三人故取以姓應前將軍名爲號今下元三將軍姓李姓黄姓王應前三人名也今下元三將軍之始生也人學道不知上中下三元大將軍始生之因萬无一人得成道也而令見道劫億以滿註滿前三將軍得替後李黄王人後聖君封爲三將軍替前位始生也前人遷昇天真後替依前部領衛護有志修行之士并主下元人地水中惡人神龍鬼精祟妖等不正道生行註夫有炁之物皆好生而畏死常欲取生遒而行其中有凶惡之徒妄行妖祟以禽獸蛇龍之物皆須誅剪滅絶不論人神龍鬼之物皆依法行律誅滅即此上中下三元九大將軍行軍之令令有六條一降伏天魔二制止凶人不行邪道不逆君師三常護法與法救人疾厄貧乏四攝龍鬼精妖不爲妄祟妄者誅之五感通志心求道之人貴賤男女註大道不問貴人賤人但有道性志心傳學得法籙修行便與言功當令九等將軍保護此等人身家永无魔難之厄永令無厄難厄難皆與度脫六常衛護至人行住坐卧身家无有外魔所惑并急疾關奏章表啓告允達上聞令合天心言功賞善无失科儀功滿扶志道之人與依功白日上昇拔宅神通神仙得者上住三清上中下三元九等將軍各加遷太清太極大真仙上品各依三皇丗三元大將軍遷替品位註言遷者得遷仙真品位也替者各替三得受此真人右位也至令釋門中隱呼爲佛結印之法即言心印是此圖言引書捻訣是也度心平等註心得度平等非身受度衣服之是无益之事也不疾不害註真心无妄无疾无妬自是真人也不慾註慾愛物入意者得之則喜愛物心思者不得則嗔不嗔註真人之性愛慾得之本有失之與不得心念本無真心定性无嗔故名之真人也能行修三等註堅身一通神二度心是三真人常行三等身自含神註身神自備如含影之圖弘使則繫代如含弘圖之用无不應用之萬事皆通註真人心起念念物便得惡凶自消也天地水三官俱與同心註夫修至道成真人用心慈弘濟度之恩同於天地水三官生成制止萬物之功化也下元三將軍始生上古地皇之代九王子註九王子三母生之也隨父母學道老君時號五靈大道君或號太上无極先生或號無名君註按老君内傳云太上老君先天地生姓李名元字文始天王盤古以前號曰元始天尊虚皇大道君盤古之丗號曰太上道君天皇之丗號髙上老君地皇之丗號曰無名君人皇之丗號曰常存君始置上中下三元九大將軍皆是後聖君前後應號所度封補將軍之位與大道將引後學道之士見并力保巳救人疾病教度有性之人也與地皇說地内經十四篇註正是此金籙書論吞日吐月之法及正履斗衣星食炁之理地皇行之十四年滿得道九子亦行之而封爲將軍地皇修行十四年白日上昇於清微天號曰仙卿九子隨父王修行一十五年亦白日拔宅上昇天宫其長註將軍之位衛護行而不絶者也太上老君元勑曰大道生一一生二二生三即此之始上元主天象註象日月星宿官屬城字宫闕河源雲霞雨雪霜炁之類也中元主人物註物神龍鬼精猛獸靈禽之屬等物下元主地水中註水中龍蛟魚鱗甲物之類也千精萬靈皆下元三將所主也以正道給兵各三十萬衆湧身長九丈或三丈赤幘大冠或黄幘大冠身甲劒主制地官却除厄病死之籍注上生名則玄欲使也捻下元訣註下元三將訣亦左邊更向外一文左是也一云指甲下佩下元籙圖及鬼㦸籙圖歩地紀及禹歩三歩九跡之要誦五行相剋呪一十八首每一月之中三爲之自得消災却禍去死來生入兵入水入火入病入山逺行經過之處有凶人惡鬼毒蛇猛獸妖惡精物皆自歸伏不生毒害心也即身得長生計功成真註即前一年辟非二年辟兵是也老君曰上元辟天魔制天官度星宿飛天綱佩於頭中前聖有告命上元將軍命詞北斗九精九真七星命詞曰上元唐卿法主上清日月星宿輪轉无停三元北斗本无住形天除魔將道炁清明宿運則玄命合長生與卿躡星魂魄俱行俱行乗龍太一來迎恭詣華宫後聖君城佐輔後聖同爲仙卿畢飛天綱註按未歩前是也後聖君告命三官北斗符符在金鎖流珠飛天綱篇中有符又在大有太丹隱書中兩處有又有中元辟人魔制陽官兵災厄及金木水火土天地羅網口舌之徒凶惡人鬼等衆災有七魄三魂命詞呪註呪在太上隱書及金鎖流珠上卷中金木相剋水火相滅是也後聖君告命九精鎮身飛歩天綱躡地紀符九符註在太丹隱書中又下元辟地魔制止隂官不清我身修行之人三魂七魄隨則玄身俱躡天地紀綱千迴萬轉變現成真出入江山神靈拜送皆存下元三將軍引領三部兵衆驅御雷公風雲叱咤清前蕩後百用百中千謀千成人鬼畏敬龍獸受使坐卧常存萬无不允祕之後聖君告天師曰上元中元下元各有三將軍小畫真身形如籙形帶佩註上元安頭上冠中之中中无繫之在左肘後下无右肘後便存之從袋中出頭上肘後左右如中下二元存用二圖中相似出陣也上元如含弘等圖即行用也若不用時坐卧如含影圖求長生即禹歩註禹歩不論日月閑即爲之及家有人疾病口舌即代爲之亦不逾三兩日自消多遍速於水火之急祕之勿傳非人有災厄即禹歩能消萬災禹歩訖即呪註呪有兩呪一呪消災求長生呪在金鎖流珠第一卷中十八首盡誦一呪勑隂官六宫呪在後具勑隂官六宫呪亦後聖君告授呪曰吾是太上弟子下統六天六天之宫是吾所部不但所部乃太上之所主吾知六天宫門名是故長生敢有犯者太上斬汝此呪不論禹歩但每日修行了出靜戸外心誦之一二遍非常辟災害護身家中有信敬人誦之益命不死太上老君告太極真人註太極真人夏禹也曰卿傳正教下仙皆知其始生始滅天仙上品中品之流亦未能得度生滅卿今聽取一一與吾教授合仙之人令度生滅夫下界人物不論貴賤皆從三五始生註三是三元五是五行夫人皆從三五始生即授王相之炁亦從三五所滅者即逢休廢之炁而滅亦從三五所滅註反身皆受三元之炁五行始生即有金木水火土之屬也而即轉輪嵗建身有盛衰三元之炁王而致來福星衛祐三炁若衰即禍來剋已金木相剋水火相刑即身出災福不出也能知三五禹歩之宗門即入長生不死之道此法妙祕不傳非人妄傳師退仙階弟子被考三元主生運炁天地註上元主天象下元主地水通人註人通天地人亦象三元註且三元有九將軍法天原地通人人有九孔通出納三元炁也人是五行始成亦是五行所刑刑滅也能解五行註解是金鎖流珠上卷十八呪及禹歩地紀也能解天地人中三元五行相剋刑禍之災次即流珠中飛歩天綱呪云金木水火土五行相推七星煥煥天綱最威云云行之一年便不死立取長生此後聖君告王君右此三元流珠引五行别卷傳說金鎖流珠引卷之五
