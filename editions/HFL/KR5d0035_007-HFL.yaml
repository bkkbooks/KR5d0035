front:
  text: 金鎖流珠引卷之七思六
  hash: sha256:fdda85ec15c35799a62b2faa77b1bd5aee521a43d523b92f4828deea541434c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_007-001a, image: hfl/0632/0632-050.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註說中篇上部轉身存用圖諸道士若心修道讀經念真朝暮朝禮上香或一日三時或一日六時或一日兩時之者如此用心或十年二十年三十年或畢一生皆无所得老病枯滅或即絶穀棲山燒丹鍊藥年數深逺都无神靈何以憑託如此之子滅度至多若不得門有何可據若憑於齋戒清髙絶妻棄子者又衆不論道𥼶此子更多總无一人得延生延命長生人世何況覓於昇雲駕龍上爲真人今𥼶氏典云今生修來生所有所受不可爲憑註佛經云今生修來生受者非也我大道猶不許起念要國王大臣之心恐要永固其身何必捨今生驕富之心欲求來生重報此言妄極不可信爲須求受至道之門修行至道之要今生而見爲道君臣豈不全於身心在道今道在此身心俱修取不敗壤之體豈不妙也此說因縁下敎註佛經多說因縁此下人及无知女子多說死生荅報之因誘於愚下布施不可上人奉行道說自然天生地育既天生地育水火而始成身長成人身乃至於老死亦是天地水火而始滅故生滅之本三界之中事事皆在自然非在修種註佛經重修種之言不受自然之敎但以直於身心在道道種因福亦在此身心萬行内修豈關外種註真人修身心不修土木塔廟真人鍊身心不錬金石事事在自然之教也故上真用法訣不出一身之内弘彌天地之間註舍弘圖之說也後聖君告西王母小女曰汝少讀書長大事人後數年見人讀老君經始學讀乃識文字既識文字如身中神名遍知否因聞說知神乃授此轉身幽思結心印訣之法註正是此流珠之内訣法也後大神通却教王母註母先但能長生乗龍行天地呼即可龍駕不能自攝龍鶴師子今起念雲龍滿天兵吏暗地母子俱得今號仙王也又再下授天師令以精思兼考召之法法成身受考召中正法之師此世天官亦同大郡守主之任身法不輕百日一思廵註巡檢世之妖神祟鬼精邪令不爲人祟十日一存用註用者思存用法觀丗界恐有惡精邪神龍鬼妄爲祟害於人及天地中常恐有毒炁濁亂於人物又恐日月不明星宿不行風雨不時神鬼欺人如此等事是其一其二即自理身常令三魂七魄俱正正炁常行精魄分明可以長生生之如圖日月分明星宿内照註存七星俱入五臓之内鎮守身神欲存出道父之形狀如圖也或在軍陣或在山草或作大禁之所住止閉炁一息禹步十二跡註此禹𡵯十二跡四步十二跡主十二支并十二月是太上老君授禹禹因傳世謂之禹歩左手持道父註父者陽也男以左手持忽起起訖便思存之如人頭戴蓮華冠紫服在左手中漸漸上頭心前如自身存長短自身存長九丈紫衣四邊兵將執戈㦸左青龍右白虎玄武朱雀羅列五雲容即石捻鬼目神目虎狼目惡人刀支目以朱塗之左右手相對於心前即叩齒三十六通開目而祝存身爲考召法師註今對奏請爲考召使名也昔太上老君堯舜時爲務猶子往西國二百五十年内化明王達利爲佛使无極子爲考召法師彼號曰觀音理世人疾病无夭傷之人也兵將左右羅列如圖註圖在金鎖流珠經中如法巡遊於丗界口中吐大風雲彌滿天地行道之命也捻訣呪曰天明明地靈靈吾爲考召主先天地始生巡爲天地使立爲天地兵禍惡逢自滅福德見自生非但禁虎狼兼亦攝五兵神龍不敢神妖邪不敢靈指山山爲崩指水水爲竭指石石走轉指日日爲明吾身行坐衛從有三百六十萬兵隨吾手指指則風火雷電立即自生急急如律令呪畢捻訣註訣在左手第一指都監及遊鬼目遊鬼目在四指第一節太上老君授十二跡禹歩於黄帝註廣成子時授帝也堯舜之代授禹禹傳丗人也老君曰夫求長生之道皆須歩綱捻訣并及救人制鬼伏神龍虎豹之法瘟毒疫癘之處五兵之中皆能獨身逈出亦能禁制亦能令衆兵出害此法微妙不可得聞見聞見者得通神神人衛護得此法皆須是明師先傳經法籙後乃經三年兩年後方始傳此法訣此法訣皆以口傳授一一依科法度不得一時三卷五卷併傳皆別言他事破除傳日即三事兩事作口訣一一傳是依前聖後聖之科便喜前聖後聖大道君至尊之心知不妄洩師弟俱得真仙豈非師之不妄傳弟子志能請授夫修求至道皆以傾心頓首謹信再求不可言言求師即分付如此丗上凡師以順人情妄傳輕洩道法註上古大仙傳經法籙畢令修求三千日外方可傳引要法訣風今以見志人修求命在旦夕所以奏請教戒并以觀試三事五事得過心志不移志求長生願得濟丗不泄非人遇人乃許便口傳授本不傳於文字爲其志道之人皆有健忘之疾記錄不習地府因此奏天曹上帝道君及後聖君知恐真人聖師下口口傳弟子不得仙罪責及三官將是天地水三官所害而死不是其人妄却口訣修奉无路所以不得仙於是前聖老君便令掌法訣真人光妙音撰習引訣引入道門於此結習一十五卷付授穆天子及諸聖人修求之門盛世知有後聖君又勑王方平撰述三十卷傳授諸天及洞天或有出丗得傳者張天師張沖虚李延年李少君李八百李景祐李法舟李常仙李仲甫茅盈兄弟三人元少康真无子名仙韋仲寛朱少陽欒巳東方朔尹喜徐甲徐察徐廻是甲子介象李不極等數百人皆習此道而一一得爲真人自相繼習爲道講録十五卷從上古盤古之代結習繼代至於今時也之罪註昔黄盧子葛越在少室山中忽有一志心求道者不遇師忽遇越求越爲師越許之遂還家得金帛頓求受之越吿卿早死罪也夫道法先傳籙法後授靈書法訣卿太急速罪及吾身遂不與授此人而去後果有神人下告越卿甚能用道心无有輕洩也太上老君告黃帝曰幽思轉身告命萬神註吿命萬神者是身轉綱紀之步一十二跡是也以告身中萬神三魂七魄五蔵百脉千筋萬靈之神令正定各主所司行生布炁興法動禁與天地神隂陽之神日月星象神合成一體往往如此於甲子日或六甲日一年通靈使兵二年去千毒攝萬兵三年而仙道成子但行心之處行住坐卧常存本師无不通靈合通天地自得成真本命爲首註本命日常行思存如圖一年便通神神鬼畏敬一年之後使天地萬神皆應心口无不如意嵗嵗言功行之一年加五靈二年法備爲真人也三年四年上清漸親上感玉女中遇神人下攝萬靈无不追身行此之法无不成真後聖君告上元真人李方期曰卿欲言功受考召註考召法治一人病差是一功三千人是三千功欲得通神幽幽靜也思轉身註步綱之跡事須轉身古人言之轉身即今之步綱是也欲得成真步躡速頻如此行修上界天真再吿言卿若行道功勤稍熟身有故不得行心存行之不絶即得亦如身行步之法驗靈其一也註上古仙人皆是心存之夫人行法精久心自存記入心作念便是即不爲難也長存行之子孫相係功加六親金鎖流珠引卷之七
