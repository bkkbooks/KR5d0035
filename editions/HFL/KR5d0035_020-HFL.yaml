front:
  text: 金鎖流珠引卷之二十二辭二
  hash: sha256:a427351734a1a000490671152d50517872b62c458a6264649a84b328451f6f19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_020-001a, image: hfl/0635/0635-024.png}
body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注醮七星二十八宿法餅果十一盤餅子須新潔果子取棗栗時新酒罇杓各二杯四十五鹿脯四十五楪今併脯安果柈香爐三具鹽豉各一柈燈八盞各安纂上三台三盤九杯一燈九兩脯作一楪茶十片熟十四盞席八領銀錢二千二百貫或只醮即不用小經案一面安置訖即解穢如法歩至壇如常法起平立先叩齒一十二通小醮若三十六通著大醮次發爐太上玄元五靈老若當召功曹使者左右龍虎君捧香使者三一正神速上關啓三天玄元太上老君臣今正爾燒香列案設醮行道願得太上十方正眞生炁來降臣身中爲人醮即某人臣等所啓速達逕御至眞旡極玉皇上帝几前畢乃平坐次三上酒次讀醮儀次思存見將軍吏兵一半從天門西北來赴醮筵座一半從額間出赴醮泰玄都云云臣則云今於某處奉設醮禮謹上請北斗七星尊神君再拜謹請貪狼陽明星尊神君謹請巨門隂精星尊神君謹請禄存眞人星尊神君謹請末囬玄冥星尊神君謹請廉貞丹元星尊神君謹請武曲北極星尊神君謹請破軍天關星尊神君謹請三台星神君謹請東方七宿角亢氐房心尾箕星官謹請北方七宿斗牛女虚危室壁星官謹請西方七宿奎婁胃昴畢觜參星官謹請南方七宿井鬼柳星張翼軫星官所請星宿神官及司命君司録君解厄君解刑君消災君散禍君具官來下臨饗醮禮臣某稽首再拜因伏席思請神降在座上三上酒上香次長跪曰臣某謹上啓北斗七星眞人府君尊神及諸星官臣某肉人庸微叨預道炁得居榮禄乆積歳年今年若干歳某月某日生本命胎炁不知善惡行年支干不測吉凶幸蒙冥祐以至今日但爲形神衰弊疹疾侵染魂魄不寧夢寐虚妄或前身宿釁今身以來積値凶害之氣多處刑殺之中致有四殺兼并五刑交集三丘五墓天年歳殺懸尸六害孤辰寡宿九宫八卦絶命刑禍天羅所纒地網所繞深恐身命不能保全自非玄恩拯拔莫之得免臣某歸心至誠啓祈恩福輙營醮禮仰希照納伏惟七星北斗斗中眞人及某所屬某等星尊神歆納薄禮昭允誠請臣某稽首再拜三上酒上香臣某謹上啓北斗星君一切尊神臣某如爲人醮即稱彼人名立身以來心跡愆過或違禮敎或多傷殺爲四司所糾三官所罰書記罪名日加深重因今醮謝輙乞哀原伏惟北斗七星尊神二十八宿三十五星官司命君司録君解厄君解刑君消災君散禍君一切諸神君爲某上消天災下滅地禍調理隂陽攺易凶咎解除年命厄㑹三五刑尅非災橫禍官私口舌惡人凶鬼乞蒙道炁常保貞吉臣某稽首再拜三上酒上香臣某謹上啓斗星天宿闔座威靈臣凡愚不閑儀軌陳詞諠雜犯忤威靈千罪萬過並希矜恕唯乞長生乆視臣某乙謹稽首再拜奉送伏席思神忽然上昇次讀内神呪曰臣設醮事訖向所出臣身中將吏功曹使者一切諸官君各從衆妙門而入在左還左在右還右各還宫室纒身繞骨彌綸天地經衛百脉無令錯互須召復出一如故事次起把取章函誦復爐呪三香官使者左右龍虎君侍香諸靈官當令臣此設醮之所自然生金液丹碧芝英衆眞百靈交㑹在此香火爐前當令臣學道得道求仙得仙舉家受福天下蒙恩十方仙童王女侍衞香煙傳奏所言徑詣至眞无極玉皇大天帝御前然四散酒食即手把取簡起退歩還從東南角出先右脚著履揖辭壇次呪曰出隂入陽萬事開通關啓事竟各備仙宫訖任意東西當房宅内十二之神門丞戸尉宅舎將軍井竈之神普同歆饗與臣羅列鎭守房宅使災不過門疫不過戸邪精鬼賊莫敢當向大道盟威正一祕法事在不輕若守鎭有功興福助善三㑹吉日同章舉遷不得懈怠依法彈糾一如天師律令散酒食如忽有急切及疾病事須祈解不可待本命即用此日注此不冩已有在醮本命儀第二卷同雜使天關助國安家護身出災度厄救人濟物衆法太上老君曰夫志人凡志人學道常以切心謹愼師事於師視師顔色常恐師不敎妙用之法訣得訣志若穿石不移習不休轉尚年深至誠不退謂之志心取道道不負人今人有口無心用心不眞非道無神修學志道生明驅使七星北斗之法法以助國安家護身救人濟物通神是以萬兵不能執百鬼不能欺千災自滅萬禍敢爲入水入火不溺不燒驚畏之地莫測心皆預知通靈通神成仙無疑所願皆得志人不爲夫志人心切慕道不爲諸法除救人疾病之外不行後聖君曰大道之使者莫過於中斗也下界人呼爲北斗是有九星不見二星常在斗中一星名帝尊是天地罰惡記善萬星之主經云中斗九星二星不見一星主天地之星使應大道名曰帝尊但九野中星除五行六甲大星之外總是帝尊一星君差爲使所主使也甚要執權一星是名玉帝主天地之間星宿天神地祗人神龍鬼精邪姦祅皆是此星君所部主也有善功於天地人物盡主也有善功於天地人物此星君勑天關使者關奏上啓玉皇上帝道君以善功立數遷階進品禄非獨長生仙人世之官將人民皆所主也若有凶惡祅逆之罪亦主之即令天關使隨罪輕重貶殺之也天關者上將也一星名玉帝君上主關奏啓太上无極大道玉皇帝大道君也故衆官呼爲玉帝星君主前注說老君曰夫欲轉天關伐凶逆助國安人之法先帶入兵虎符入靖室中以躡地紀順倒反三遍飛天綱三遍順倒反三遍也訖下綱散爲禹歩三歩九跡又反爲十二歩又再爲十五歩足下綱配衣左手把出軍符轉天關九指有逆國賊之方賊衆大呼其賊名近則呼聲小及人多亦如之即呪曰惡逆某乙爲賊逆君妄集妖群盜劫財物損殺平人太上不許大惡大瞋令勑消轉斗關津三度九指殺滅某賊群一切禁制口令傳臣命臣行法轉斗攝殺急急如律令捻刀支訣訣隨五方筭東來木人刀支云云一日之中三度指不逾百日自敗此法甚驗妙音黃石公用敎太公姜子牙用之甚驗太公後不傳此法有訣訣在後注中老君曰人者是五行所生六甲始運有盛衰盛則南斗所主衰則北斗所主南斗六星故曰六甲北斗七星故曰七宿南斗主生北斗主死故曰生死屬二斗所管也若人犯惡非違便北斗所轉天指也人之衰盛皆屬二斗所察若造惡惡貫已滿天必誅之則南斗落名北斗斬形人造惡皆是北斗之所殺也今若有五惡反道背師反君背父如此之者天早自知更有志善之人爲國君爲師父収凶逆滅祅惡行正道安人物其功可大可乆太上喜之上補仙官同治十天之任位登上清太眞之位餘行用救身家約此行用用符術前法老君告司命𨽻君曰上古司命是𨽻君非後𨽻君也今韓君替是此君位也中斗與南斗北斗此三斗性直不愛無故十亂啓告求福反招其禍學道之人須内自知之爲上昔有志學之人郭聲子日夜燒香禮念北斗不絶如此一七年被北斗君追責之曰我北斗是糾察之官也正直行法一日一夜廻廵九天若有星宿有罪有善我皆先知然始奏於上帝帝頻勑天使仙官聽察糾司恐行不正偏黨之事我等九司常懼罪及於已汝是何人如許凡愚夜夜燒香公天啓於我等求覓何物令我九星之衆交見不安今見上動五行下驚二十八宿總來問我此人無事妄以淫亂天司糾察何不前殺而後奏我縁汝是凡下不曉之故不是故行毒心所有聲子再拜謝之聲子死罪之有餘將以燒香供養斗君求覓功德及長生之福不知反招其罪但以拜謝死不敢辭仁恐罪及於上仙北斗上眞君曰此是汝招罪有三一入妄無故無疾病厄難求告天關令轉關使者瞋責何人何物二常燒香遥禮北斗斗君恐被辰星所糾糾舉我即入通人私受之罪三北斗女星君是女性以沉重靜而清潔難犯犯觸枉殺子身及北斗帝尊君玉帝君此二星性直難犯今且放汝歸輒更勿爲聲子得放再活早死經五日親友問故都更不言後書於醮七星及二十八宿文儀中令後人不爲如有急難被賊圍宅縣官口舌及病重啓告啓告訖歩綱躡紀轉天關消之無妨甚有應驗速於水火後聖君告大王君曰中斗北斗有急難之心求救有應妄白禍生具前注說夫修至道心人先以助國濟人物以爲上如國不清有妖氣也人不安道不行行道不能如此用心即非志道心之人此亦是老君言也昔伏夏子是伏犧之小弟也學道得仙學在人間取小竹排以吹之學鳳聲今之笙也有仙人下看看訖告夏子曰汝有兵厄也夏子起再拜而請問出兵厄之法仙人曰汝可以龍廻龍廻是令躡地紀法之歩也虎跳是今之飛綱之歩也出陣心思破陣出引星即今之配衣也轉殺於指指之即今之轉天關是也而從基向壞基者即今之日月建地也壞者即今之日破地是也兵家筭孤虚之法相似此地甚有憑驗之極上古神人悉皆用也擊出得之子旣得出後以此法救急難有道之人老君曰道友及内親被賊圍繞欲伐殺者如有計救得者可以於行中躡地紀之勢順倒反三遍訖配衣轉天關九度指之又把入兵符指也捻賊某命人刀支刀支者東來木人刀支南來火人刀支西來金人刀支北來水人刀支四季上來者土人刀支辰戌丑未爲四季夫捻刀支以當手自捻訖又以隨色塗之木刀支以金白色塗之金刀支以火赤色塗之水刀支以土黄色塗之火刀支以水黒色塗之土刀支以木青色塗之訖更取出兵符遥指之九度須㬰賊心自退解圍而去不損彼反親若不肯解圍去者隂軍擊之自相反相誅相害而死盡此法微妙祕要非人勿令見示後聖君告天師曰此法入軍入軍助國救人出軍救友及巳身也有符虎王符也以金銅爲之方二寸或一寸半令本師度勑後錦袋盛之永不得人見唯得四人見一本師保舉師如保舉師遥𠑽保舉度時不見後亦永不得見二則君受臣臣受君三父受子子受父得見四則夫妻得看餘人永不得看但是道友内親欲帶治病但重重封之與病人帶之病立差若病人偷看病即立發發直至死也出軍出軍者自身領兵被圍衆破彼陣出須繫符左肘有符白虎破强陣符也亦金銅爲之方一寸半行用法訣同前符注皆以金銅鑄繫之左肘入軍符左出軍符右右肘并式禁制加臨相助必獲巳勝彼崩敗如山大驗非人勿令見視老君曰昔西胡有大國王好道吾令學胡仙攺號爲佛佛是仙之别名也胡呼爲佛四天國不伏各擁强兵四十萬人來圍遶此國城數重中王乞解放不肯此王正心思存吾於空中見念吾求救吾以躡地紀散輝禹歩轉關指之三度即走出軍一符往胡王案上胡王見帶符左手肘後開國門與戰與此王戰者皆自仰倒兵衆大敗被城中兵殺之須㬰之間天地大瞋雷風震天動地白雨連殺四天軍軍及王各散走歸國不失其位故知符力之聖者莫過於此愼勿令非人見視見視彼此被考天大威之即死事非輕小愼之愼之言赤章助國伐賊法太上老君曰救者助國之功救國之難國王帝主差大臣攻伐逆賊却被賊圍者夫是掌法志道之人與國救之上赤章使天兵轉天關救之速於水火之急得國强賊退兩不損傷爲上若彼賊强梁不伏奏上天公今呼天公爲玉皇上帝書言罪此是爲天施功功大天不伐躡敎之罪著爲救人之隂功也安養人物此天大喜與計隂功後聖言攺書爲赤章章奏反臣章言泰玄都云云上言謹按文書某州縣某人云云言某乙爲某事反今國命某臣云云某乙爲將將綂兵若干萬兵馬往某州界伐某賊衆若干千萬恐彼衆强逆壯麤勃故殺平人應當拒敵兇强不受収伏今某却被所圍在某城營中不得出恐命被誅立在須㬰求臣救命臣上請天兵伏願下九天大威神兵大將軍九人兵士九十萬人一合下與臣籙兵九千萬人攝九地社廟神兵九千萬衆隂中布陣行立聞臣某乙陽兵發角打鼓即聲中發兵助伐彼賊其衆兇媨之徒一時令崩如山傾倒粉碎一云石碎砂崩鹿走歸伏開路與某將軍兵衆出生又請白虎符將吏一萬九千人能伏衆兵威動天震地力可拔山竭海與臣某助某將軍擊伐某賊云云後聖君吿天師曰卿須以意想他是反君主即可如非不可愼之勿妄下此兵權罪及卿巳老君曰大道無不可用心即行但以人心自以量測可否不得妄爲夫與志親志道友之人欲上此章即須前量上章人身及已身無過乃可與上如上章人有過傍人似無過亦不得及巳更有過此是二人自告天言罪損身立即須臾弟子反師師却奏靈官章此章本在大章儀中具載今更再書於此引中主降伏弟子及俗惡人孤恩負道却奏靈官請解章使復病如初章雜章儀有此更不冩已具其目發符檄制止三官中凶惡爲祟害人物等法天地水三官之中有凶惡凶人神龍鬼精妖等是老君曰吿天頭禁師羅文能强姓羅文名能强曰夫人者三才之數除天地之外以人爲貴萬物之尊莫不以重某身而安養其性當思道法常衞身命存師想道存金籙之師金籙師即金鎖流珠度師是也想金籙之道金籙後聖攺爲金鎖流珠是也上古眞人重金籙之符尊金符度師也出金籙之神兵咄叱鬼神走檄符常救命此即是吾弟子也是道玄孫符檄衞已衞人取功甚易後當得道爲上等眞人不從聲聲是經誦聲讃修齋念道歎道之聲是也像像是立尊殿容像宫觀神廟之屬皆爲像教也能得老君曰聲像是人間之善以訓小童蒙小人之初門令其小兒心起志善善中漸以長成即知有道故名聲像起善心之敎敎而精學乆而無所獲爲心不及若能弃有爲之言反心更入至道修行不言之敎進服隂功精而行即得入無爲之德而成道吾道皆行隂德潛著隂功功滿道成吾此道輪轉年劫數滿皆以因師見遇得受此書受後勿妄傳非人世有賢達信金玉而傳老君告善行眞人言曰如志人傳志敎人賢無信以將心爲信志苦好樂便與傳之而師共弟子衆辦信供乃曰告天而付授之勿絶上天之道也賢而無財師弟共辦而傳不可無信不傳不可有財寳非賢達人受財妄傳師弟俱死被天責泄露天寳之罪也愼之愼之金鎖流珠引卷之二十二
