front:
  text: 金鎖流珠引卷之十八言八
  hash: sha256:a99a9a14b56a64799da504d2a539e4dac8bd32f49038ac6179da4f2c9350c447
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_016-001a, image: hfl/0634/0634-089.png}
body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註六甲隂功下第四條隂功老君曰夫學道之士於世修行之功道法精能符力成就忽有百姓及官人被時行瘟毒瘴氣疾病染者死傷可以捻瘟鬼目禹歩九跡三歩配天關指某方某方是病人居處三度然後與符帖一一救之立差其家有十人三人四人五人見染頓重欲死者與符吞之立差未病者帶一符令共一牀坐卧炁不相染易永令病者得差不死未病者不相染易一家有十人得十功一家二十人得二十功此符法隂功之大也祕之勿妄傳非人言功十條此條要驗并後聖君授章於六甲及六甲夫人章在流珠上篇後聖君告天師道陵六甲之中十條言功治除瘟鬼救人條其功甚大卿可自身及弟子觀世人中有被者急與治之世人甚畏此疾卿能救之萬民喜歡皆言功力微妙可以聞於上天一生身障之罪應言消滅可寳而祕勿傳非人昔張天師未行此術之前中國人民往彼故師求治往彼者皆滅門非呪術小小力之所能及也註昔西國胡人師第三人入中國呪此鬼此鬼不伏行炁衝殺其師第三人具流珠中篇具述不復重耳其瘟鬼訣目在左手第四指第三節瘟鬼訣目節上右邊欲近指甲是瘟鬼刀支註捻鬼目鬼自伏走去捻鬼刀支鬼三日而死大驗昔左慈字元放江東人善禁鬼魏文帝聞之詔禁瘟鬼鬼知來哭而相謂曰江東左君以銅爪捻我目我當去耳不去欲以刀剌我當即死大哭而俱去三日之内宫中病者差不病者永健不相染易也太上老君授八蠻籙中有治鬼符吏存之如圖符瘟鬼自走不走即死大驗能助隂功第五條隂功老君曰夫志心之人學道本以慈心濟拯人物爲本制邪結正爲心若有邪正炁不行不降如能行符藥治邪妖之精不干正且之心邪者亦與一符兩符與吞正之如有久染邪疾纏綿昏沈之者十年五年此是老精鬼魅狐貍䑕獺之精以符帖追斬之无妨救一人是一功誅一精是二功誅之法以躡地紀飛天綱各一遍散九跡禹歩一遍配衣七星轉天關而指某郷里某人家三六九指即存中下元六將軍往彼人宅上放水放火領兵三千萬衆出如圖到彼如中元三將軍在流珠經圖中存到門捉鬼收誅之大呌遶宅往往如此三度思存其精自死疾病便差此隂功亦可爲大世人敬愛第六條隂功修行之人功力巳備坐救千里可能以符救人征伐帶之於人身上辟去刀劔不傷害己者可取六甲日呼六甲之神歩禹歩三歩九跡以配衣手指之三下即給行軍火符與帶永不被賊傷害此身也如若是大將軍求欲爲國殺滅彼賊衆即與之萬勝神符與帶之能使刀劔不能傷害欲令帶符軍强爲國者可以歩地紀九遍天綱三遍散禹歩九跡三遍十二跡三遍十五跡三遍訖配衣轉天關指之法望彼賊之方指之九過捻彼方人刀支註看賊在東方木人刀支西方金人刀支南方火人刀支北方水人刀支四季土人刀支一云亦隨方配金水木火土用之亦得此兩法同前并隨方用水灑之彼衆自敗此法要祕不可妄行前聖君出此法者所以救有道之子難并助有道之國難不可輕用非子之命立在須㬰前聖君又告雄黄赤色者書大劫二符符在立法中故不具又書入軍符及六甲隂符六通帶之入兵萬不傷一符在流珠中外篇兵法中第七條隂功天久雨不晴百姓頻被災潦傷損州縣郷里人物漂損者可以夜於隱宻之室躡地紀三遍飛天綱三遍訖散爲禹歩九跡至十二跡十五跡配衣轉天關三指黒雲暗處三度訖便出符牒彼社廟限某日某時晴即晴捻龍目註目在左手第一指第二節上左邊近爪甲邊急捻之也第八條隂功天久不雨亢龍所爲百姓種植焦枯田苖焦死若此的非天命令旱者註天令旱不可妄爲損龍之命上天賜龍罪應時天誅也前帖土地龍神所爲不肯行雨者即夜於中庭无人之處歩地紀天綱各三遍散爲禹歩三歩九跡三遍配衣轉天關三指深水之溪潭註潭中計合有龍有神靈水府之即即得當時應驗雨下速於水火之急也平旦書直日符及九龍水符連牒牒土地社廟註古无城隍今事須先言城隍神官及地界社廟水府靈官與直日神官集衆令便畫時下雨急急如律令所由神官速畫時下雨約限若干日内通潤百川應口手之驗老君曰吾授此法於世流行以與修行志道之人出世救人以著大功救得一天下人物皆得安心喜樂者也不可思議承此功德進益仙階此第八條中一切聖真皆久以留心志學學得此法積功易滿是逕門得道也後聖君授告龍符三道二道是六甲籙中直日神之符註在六甲籙中用檢取一符正告龍符以依法行之速於水火告龍符右使龍訣在左手第二指第一節是也太上老君曰夫人學道之驗者未能知此使神役龍伏鬼之法去道漸逺不可妄行其道佐佑人身吾見今時學道之人唯以聲像爲道註風見上古无爲之教今正入有爲今人聞聲耳目俱䖍誠見像心神俱起信誠歸心雖一時起善不合道源與道倶乖徒修造彌天積山之功身老自敗而散故上智之人不以聲像爲教故是小人嘻哢之功徒行於世也以識性爲德註老君此言訓學者言當今之人以强作知識之性真名有爲德之心不是无爲之德性也終老一生虚以困苦求修如此之人世間論萬无一成吾常歎此故留隂功之條有十此條爲上昔舜帝時天旱一百日帝命羣臣乞雨五十日日中曝人以渇乏死者甚多廣遍九州山熱草死石同火炭不可立人忽有二仙人因行之次歎曰此等何人爲此苦熱中作樂何也對曰請乞雨降仙人曰雨是龍行豈關人請官人對曰請龍下降乞行雨也仙人曰子見龍識否曰識子既道識龍龍在何處不請行雨於是官吏一時下拜請示龍仙人忽爾以手指一人脚龍行虎歩註手指是轉天關也脚爲龍虎行歩即今之禹歩行三遍訖叱叱何不行雨是時龍走起拜拜訖曰天不許行雨一百八十日某早兩度潜行救人皆被地府欲奏此度不敢行行即被奏奏聞上帝必天符下誅龍身仙人即覓紙筆書天符帖帖社廟神官與龍同行雨當時社廟神龍領得符帖應時行雨雨限一日内限足註按限一日内足此法太辛苦龍神急切行雨須以狂風白雨吹拔樹木此仙本意潜行雨須令急速恐天禁雨潜行取遍罪任責龍如上帝不責龍即得命如責龍恐損也此時不責爲是仙人慈悲救一切世界人之故不責龍罪却得賞社廟及龍神八部江海水府靈官衆得遷階訖來一一謝此仙人今若得此道但限三日五日内雨足却爲大功神龍人俱喜依限雨足須遷賞其功効決在法師以量功舉可賞酒樂後有三㑹日別表醮言功註有一法不醮但上言功章狀此不可也其三㑹日是大醮日合設將軍吏兵之日如世天子命諸侯臣案領三軍相似每年事須春冬二時設不可不爲不爲違國之命今此三元籙總取三元日醮并與一狀與言功即得不必要須奏章事事恐煩上帝道君第九條隂功太上老君告方諸男真王方平韓非正女真李夫人王夫人紫微夫人等七十二大真人曰夫世有志人修行隂功其大者莫過救人濟貧喜神理墓修墳註理墓者昔黄帝因巡於太山路有埋屍被水衝地以崩裂中有數千露曝屍骨帝見命以衆民一一與收板隔地以髙山取不植之地深孔而埋之築土髙三尺名之曰墳也因此之後世人以學黄帝此埋葬法四斤大板隔四邊土一斤大板當上蓋之此是造塜之法也乃至令人以棺器爲板槨轉加新竒號曰墓後夢中有一千餘人來見謝言曰陛下治人有道治鬼有德令臣某等約有一千七百餘人伏蒙陛下賜天恩爲屋蓋著得免某等曝露屍骨某等昨日已上天曹通辭言蒙陛下賜恩移埋屍骨之功天曹與爲倍功之數從此之後四十五年白日上昇雲天當爲上等真仙也後果如所言獲感通神註黄帝本章出從立塜深埋死人之法教世世人學之後以功彌滿世界神鬼喜歡人死之後或有精魂强智者得爲天神地神社神稷神不强者爲鬼鬼中亦有上中下三等之號上等鬼以福祐人善行報人之德中等鬼不以福祐人亦不以禍加人如此二等早得託生於人天之報名善鬼太上喜念之不令受道法籙之人所損恐其鬼失生天之路下等鬼常以行禍害祟人行疾病於人世太上後聖二君大嗔責之常令受道之人以法訣收而誅之一被道科之後鬼魂入北帝幽獄繫連年不決斷縱得決斷不得人身託生唯淮天科以託生爲毒蟲蛇蝎之類百死十生不復人身人龍慶賀百川靈獸獻上瑞圖四海龍鱗進於珠玉豈非帝行隂功之德感通也又老君告苦行真人郭晉卿等曰卿行苦行救人莫過種福果熟於後人賜寳賜薪給於見乏如此之功可大可驗得道也又以燒錬銅鐵而作假色金銀須薄取半直註半直真金十貫一兩假色者本是銅鐵而一兩可於半中取半則二千五百價一兩而上亦屈於本人不可妄爲而此法是前聖後聖教有道之士爲之者供自身衣粮及家口等并以布帛作衣服於路詐作遺失之衣服將布施貧病之人以求隂德之福昔有數真人爲此之行給身家之用兼救貧病此亦爲大功不可妄惑於世稱爲真金重計珍寳髙價誑惑世人之忠平者如此之罪甚深不可更覓隂功之報慎之註昔隂長生假金錢故作遺失以救貧乏往往如此以獲隂功也今人妄以將此道誑惑平人云燒得此金爲藥天下竒絶堪爲仙藥豈有仙人行此於世且仙人皆受輕身之法可以意量肯食金石之藥輕身飛騰甚失見也第十條隂功雜言真人行隂功及師弟行隂功之德金鎖流珠引卷之十八
