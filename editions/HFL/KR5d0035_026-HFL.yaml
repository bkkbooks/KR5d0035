front:
  text: 金鎖流珠引巻之二十八辭八
  hash: sha256:8debd0ab6fcdac0c63a1dfe4873570a014ba318c19ecf51c2a9ee2c310aed91c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_026-001a, image: hfl/0636/0636-098.png}
body:
  text: 中華總真大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注考召法師說廵遊圖法太上老君告无極眞人定光曰姓眞名定光按葛玄傳云有三眞人下授付玄經不知是此眞人眞定光否恐同名不姓眞定光六國時得道是秦人歩躡上昇爲左无極眞人夫行歩躡之道要須以常行考召之法救人物著功於天下人物丗界之中即名修求眞人之行也夫以爲考召法師之法先須存五德者五德青龍白虎朱雀玄武黃庭是五德將軍也昔老君出此法先有三元後有五德今按金鎖流珠圖畫五德無三元不知其三元將軍别出三等圖上元含弘圖餘中元自有一圖下元亦自有一圖而用併歸一圖則含弘圖是也三元而更有六甲六甲是六丁六甲玉女眞官也六紀十二神官之屬六戎八蠻皆一一如法存使如經文出廵人丗禁止凶頑祟祅邪精之害害於人物者依科法責之發遣如不肯者按法而訣禁訣禁不肯伏者歩斗歩斗是躡地紀之法在後奏章表而誅之訖牒社廟而禁斷若干年由法師口處分年月日也仍給彼人符牒即依年限也夫欲行此歩斗之法先於淨室中躡紀三遍散爲禹歩一十五歩配衣指所往之處州縣鄉里某病人之家及拔宅亦用之如圖風曰仙人皆常思存此圖用登天朝眞或拔宅常存用須思本師於前自身在師之後勿思於師前後聖君曰夫志心求道須毎十日一思存遊巡丗界國土之中領將軍吏兵行數十里之外如大將軍行軍布陣相似亦存攝御前軍前軍者是上元將軍唐中元將軍葛左右而行朱雀將軍居中行導引如法把㦸旌斾幡赤色周將軍及五德將軍在後圍遶數帀與玄武六紀將軍合爲數陣飛空而行五雲飛飛旌旗赫赫蓋天滿地不可當敵又本師前領也引導衝滅兇頑妖精思復軍復軍回合衞我正眞之炁志人之身亦救未曉之人身家災害助國安邦濟救危厄兩兵相伐彼北俱散志人長廵即救得難以著隂功功滿昇仙也此徑妙之甚得須祕之勿妄傳非人老君曰金籙圖但有五德將軍而無三元者爲是外出五行内鎭三元三元鎭内隨從後東西在其内防鎭自身恐惡鬼所祟害巳身也天師傳後聖君受道功小力微未能救人且自防身内鎭三元之神自有上中下圖圖在舍弘正一是也上元在含弘中元下元在正一别圖五行救人三元衛身六甲捉鬼六甲直符兵馬隨日逐時與追捕惡鬼七斗呼神一切神皆是北斗使追捉立到也此則天之使臣即北斗是也但一日一夜一周天廵檢天地萬神與六甲而同於天地也二此法畫玉女貴妃是前引導考召法師是也六甲合有六玉女北斗有七貴妃嬌女也自古金籙圖有書之今即是金鎖流珠上篇畫玉女貴妃於前引導師於前是也以古故尊於法師此巡遊之圖陣不是爲一而弘之有萬端或以與國王帝主貴人等治病或以救度災衰或以救彼人兵難或云路有劫賊猛獸或有水火相隔或有瘟黃疫病相染或有兇人惡鬼隂謀内祟或道釋之子法訣相侵或呪詛祭祀相反令心迷意倒或以因官假力相害或辭言狀語相訴鬼神妄申章表如此等種種之災害並以廵檢與人允直之先允自身家次即他人此法至妙至微不可妄行妄傳愼之老君曰有前種種之事欲救者須以毎日存一廵遊彼家萬毒自消千神百鬼自滅災厄度脫初欲廵之時先入一淨室中躡地紀三遍散爲禹歩三歩九跡吐氣爲紫雲先蓋身遍訖次即往彼蓋彼人屋宅周帀及彼人身或兵陣種種使之皆驗應立在須㬰蓋萬物皆應成也即捻左都監右都監次即遊師訣及三師訣訖即配衣七斗成七斗七星俱在身手把魒星遥指之三下即誦地紀五首呪後聖敎授天師口訣有大事總誦地紀呪十九首呪爲上無不應驗如意也指之三度萬事立消滅即求事得成害事消滅不相染害於己及他人之己呪曰太上傳敎後聖流行天師親受九千萬兵廵察十方市炁三淸神無凶黨鬼無妖精人鬼各居不得有爭行禍者死行福者生禍福吾知隨手分明左指三滅右指四傾勿犯吾道吾道甚平有罪無赦無罪自寧天賜吾法令吾按行莫犯吾威威猛七星飲汝血食汝精一切但平等吾道不令刑一切心毒害吾道令斬刑急急如律令呪訖便行思之如圖圖有三等如圖圖在流珠上篇第三歩網配衣拳打之是也一等又有三五三元將軍配衣圖是二又中元下元圖及上元合弘圖是三等法思存行用者眞也老君曰夫爲考召法師巡遊天下十方丗界救度人物常行平等爲國治身家救人濟物著功於天地之間行德仁聞玉京之上者功滿上帝使仙迎上補爲大仙眞之位白日上昇天宫昔有人皇常行隂德於人善敬天地水火四等不伏闕又以毎日思身自廵遊天下檢校人物不平不允之事抱屈之徒願令得達入夢中見我我與之申屈常以心願如此以一十四年百姓有不平之事抱屈之人皆各自夢見人皇斷之夢覺各自知罪彼此兩自責已數千萬人往往如此功滿太上與之長壽爲人皇壽一萬八千歳後昇玄丘之仙宫昔有術士欒巴善思存巡遊丗界救濟人物制神伏鬼數十年於人人知生與之立廟數郡郡中忽有災郡人祭巴災皆自消散也非巴身之通神存思感應也又是巴常行此法鬼神畏敬皆先預知自伏退散即知此法通神妙極老君曽降蜀郡告巴曰此法一能救人立功二能得鬼神畏敬三能立取仙道四能入兵不傷五能入水火入瘟病皆不相染六能去一切口舌官私災害七能立禁斷一切蛇虎猛毒之蟲獸能以伏心不敢損傷人甚驗也夫作考召之法先須於明師邊受本經籙本經籙金鎖流珠是也自有經圖如法三元五行是也一本云無三元將軍只有五行將軍之圖有六甲七星玉女圖其三元將軍各自有圖所以畫出上元三將軍即在含弘圖中其含弘圖中日月三元五行六甲七星八卦九宫雷霆兩師風伯盡皆一一畫具足也訖三年後方可受此引書如未受切不得見此書此書是天地之元始炁結而成文眞人冩之初是天書後儒方近改定儒書即丗人有知此法求仙也辟毒降魔以興道敎周秦之後前漢之中即足多人修行此法丗足術士相反遂被仙人隱祕不傳前仙者上昇後得祕絶丗闕其七百年後晉初方有左左元放是江東人也許許遜是秦人今蜀中旌陽縣也繼代稱仙於江西洪吉之源出弟子一十人皆稱仙人學此廵遊救人濟丗著功修道相繼一一上昇後十一人中更不傳弟子後絶仙人百年後齊初方傳弟子葛玄玄行丗之後鄭思逺二代又無人可繼學者皆稱器器大斗之器曰碩如儒家所稱也得者而無一合喻丗絶仙人也老君告尹先生曰廵遊法志心求用無不神通一念便行物無能礙上通天下通地中通人妙通神故能却鬼救人百用百中千邪敢親昔廣成君敎黃帝能用得獲天眞玄女授黃帝用此廵遊之法九年法成滅鬼威神行道變法伏牛乗馬安人樊氏夫人是夢遊感得神仙方平王君也遊廵朝謁者萬神天師巡遊仙樂連天眞人廵遊救度群生太上廵遊萬帝來迎後聖廵遊諸天俱迎來朝萬聖制伏百靈安養群生者矣考召法師存思說召延壽六星君名圖法老君曰延壽六星君者南斗六星君也從東向西飛來師存思之面向東存來下也又存一十二眞人從西向東飛來師回面向南左右顧視之又存思左司命右司録掌籍掌筭俱到悉乗飛龍鳯凰龍騎大車仙童玉女手把十絶靈旛散花鬱轉鬱轉蓋病人牀上散諸香花致病人身上付諸骨節藥散藥司命録籍責主人守宅三將軍竈戸并井神先亡辭别序病根源上天人北宫中救命法師存身爲太上老君含眞帶瞋相邈不失身坐千葉蓮花之上端嚴似瞋責守宅三將軍何得鬼祟入宅作祟於忠良謹愼之人火急令取病人魂魄來問司命青宅神及地界社廟土地神官名山洞府水司何神管此間何神判此地住處司命致令鬼賊害人今仰火急檢某病人年命壽數文按上并便令此病限若干曰差仰速報待憑救治此法仍書牒帖等帖宅神守宅三將軍井竈龍神千神萬靈用此法兼帖廟社便作符檄古人謂之符檄即今之帖是也又一云檄者罵勑之辭令鬼祟敬畏而去不肯去檄令社廟與守宅三將軍門戸井竈之神同心併力而收禁與帖檄直符齊號令而斬之無罪也而制止之鬼祟病人給二七日或三七日無不差者後聖君告天師道陵曰夫人受生配命禄命者生命之身人受生之配屬禄者官品之位食禄之地是也皆有生死生死之害在於五行相刑尅之鬼賊相謀運也若先知此則從五行之中筭解制止之立即止如不肯者躡地紀配斗身衣収而斬之永絶此祟則人自便修行永得長生矣此法又上秩五行引中後聖又告尹眞人曰卿學道須知六甲日六甲甲子甲戌等六日也躡地紀三遍散爲禹歩三歩九跡後配衣存二景三元四時青龍白虎朱雀玄武號四時主春夏秋冬是也五行經云四時之神添黄庭將軍一神即號五行是也又云在天爲五星在地爲五形在人爲五行五行是五德太上封名號之也六甲直日神及玉女主君也七星八卦九宫七星是斗也八卦八方之地是九宫地亦及中宫人皇像以九州之號所明九宫之數則三元一元得三故曰三三如九皆不出五行九宫添中宫曰九數又云小九宫九州之地人皇之丗致亦名九宫此說小九之數今天地間八方中宫之九數大也故莊生云天有九野號曰九宫也含雷擊電如圖圖具含弘國中存用之夫衆法盡存用之折辟又捻司命六星等訣往往如此能救治身家及他方人疾病救死得生行此六年南斗延壽六星君及司命司録等下見身與子言救人治病之功迎子飛昇上清老君告帝曰爲此法者有九一修行除自身厄疾二爲家親治疾病三爲國王大臣治病各有等目品第所說上第一爲天子治病先思上元上部唐將軍次即上元中部李將軍次即上元下部徐將軍次即中元上部唐將軍此將軍姓唐是名閎與上元上部唐將軍相繼年數上元唐將軍名短天皇時人得道身長九千萬丈中元中部葛將軍穆王時人相去甚逺也次中元下部周將軍亦同穆王大臣也次即下元李黃王三將軍六國時人李將軍姓李名立志㑹稽山人秦時得道太上令知下元上將軍次即周遍思之如圖含弘是也即請延壽六星君六人并南斗中眞人一十二人次即北斗君九人次即司命君司録君掌籍掌筭君等五人次南斗注生官北斗落死官一時併到并從官吏兵等百千萬人言百千者萬萬大衆之數也倶到某國殿三十四席東七席南七西七北七中宫七八卦二日宫二月宫二餘九席七祖之位有四十九爲壇黄土布地地上鋪席席上用青色露席坐褥如法如法是具足之言自有别醮延壽六星君文儀以具醮文其醮文上已具用物及有數等定此中略說而不具足也訖存思延壽六星君及司命司録等作法依前法治病無不差者中等第二爲諸侯大臣治病即先呼存上元中部李將軍次中元中部葛將軍次下元中部黄將軍備具方即思延壽六星君司命君司録君等延命治病依歩呪無不差者下等第三爲州縣官長及百姓不問男女即先思上元丁部徐將軍次中元下部周將軍次下元下部王將軍備具即請延壽六星君及司命司録等降延度疾病救治生死便有徴驗立在須㬰夫治一切人病者但依此三等無不差者其符在三部雜符中隨病所名使主皆有驗四能入兵令人不見傷敗䕶已保衆用如前法符别出符在黄帝集靈記上巻中出此符也五能入水捉蛟龍水害魚鱗之𩔖用法以躡地紀七遍飛天綱七遍此飛天綱不於圖上飛歩但以存地上作歩似圖即得如若飛歩熟有功不必要歩綱但存之如圖亦得夫有急事心存手訣口念便行其神便應何要作歩看圖此是初學之人恐不應須親歩綱也昔有道術之士趙芮學紀綱法一十四年道成心便存使不用歩常行捻訣之道入水如地上行散爲禹歩九跡九遍主九江又變一十二歩主四海以六已土縛脚心上便得入水入水時捻六戊訣勑水神任意捉使總得六能使人入山草不迷毒蛇猛獸自伏并入火禁火皆不有傷損驗用依前法七能令人得入中仙長生不死之道可以本命日常存思南斗延壽六星君及司命司録君掌籍掌筭君降下如圖圖在金鎖流珠中篇内有用訖即躡紀飛綱紀地紀綱天綱也散歩配衣捻訣誦十九首呪訖又捻司命君訣訣在流珠下篇卷中也即誦呪呪十九首畢即止如此行之四年便任地仙八能令人得大仙大仙者天地中仙人也一云天仙地仙山中居止也九能令人乆乆行之得上眞仙人之位一云眞人上清太極大仙官之號爲眞人也昔上天眞大聖廣成子等數百眞人皆是躡紀飛綱衣斗思斗衣斗者北斗也思斗者南斗也北斗九星二星不見丗人見者七星也令以呼爲七星君不知有九星九精二君也南斗八星不見二星丗人見者六星今呼爲南斗六星君不知有八星八卦二君也一延壽君二司命君餘即掌籍掌筭君上生落死君是丗有人知此道長生不死立得仙人也不離心神乆而修行總成天仙金鎖流珠引卷之二十八
