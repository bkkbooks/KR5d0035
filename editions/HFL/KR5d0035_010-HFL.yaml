front:
  text: 金鎖流珠引卷之十思九
  hash: sha256:cdee17ed59a690ad6393f0c8e64aff32cd251d7a8bdde447aebab8572da555bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_010-001a, image: hfl/0632/0632-124.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注存誦中斗七星名法圖第一星名食狼字露神子二名魁三名陽明四名若爲五名神武六名玄樞七名天英八名恥符正名否留内名闕上屬歳星鎮應徐州也是天御史中丞西河人註此一星有九名多是古星官之位名又言御史中丞者亦如今國家有此官也北斗御史中丞即天曹官位子生人屬之也第二星名巨門字貞之二名𩲃三名喻見四名隂精五名敢武六名天根七名法提八名巳无内名上應太白星下應益州也是天大司馬南郷人註揚州之南霍山之側地生也丑亥生人屬之也第三星名禄存字子宜註一本無宜字也二名𩵄三名真人四名歷擊五名神剛六名天柱七名命機八名老鬼陽内名註內名者是真名也關上應熒惑星下應冀州是天少府九卿長沙人古長沙縣寅戌生人屬之也第四星名文曲字丗惠子二名䰢三名玄冥四名庚與五名天殺六名隼擊七名天脣八名索諾内名上應辰星下應荆州在天爲司徒光禄大夫㑹稽人一云吴中人卯酉生人屬之也第五星名廉貞字子衡二名魓三名丹元四名鄒收五名四王六名板王七名魚行八名樓張内名上應鎮星下應兖州在天爲大夫鴻臚卿益陽人辰申生人屬之也第六星名武曲字大車子二名𩳐三名北極四名度頭五名生門六名七名誅兔八名橐内名上應歳星下應揚州在天爲廷尉郷益陽人也此縣出兩大夫官上仙也已未生人屬之也第七星名破軍字大時賔二名魒註魒主指萬物攝殺之炁故天上地下人神龍鬼萬物被指七度疾二七度病三七度衰四七度死丗知之常存之自然通神存指凶惡鬼賊應時而伏止大驗也三名天關四名敢健五名金方六名執光七名天衝八名剌心内名上應太白星下應豫州在天爲領軍步兵註國家舊有歩兵官號也鄱陽人午生人屬之也右七星見主生民死鬼之事包指萬象巡察九天一日一夜周天一遍以管約天地水三官彈紏萬物下界人神龍鬼精邪萬物皆畏伏而不敢拒太平金闕帝君故示九等之名於天師付授有道之子令不迷惑老君曰七星見者主理生民萬物註言萬者天地之間但生死之物皆北斗七星官君主也上生落死事事皆由七星之宫不歷於别宫曹也莫不生死皆屬之故以有道心孝順師父之人可以口傳九名如非人不可妄傳殃及七祖非一身也第八星名太上真君一名同玉二名天樞三名戢應天蓬下應坎宫正鎮冀州在天爲外部隱形不出知水官之事第九星正是髙上玉皇帝註髙上玉皇帝者北斗九官之主也非大道太上玉皇帝此是天司紏察七政九宫中百司君官司吏萬兵髙上玉皇帝主判萬象星官内禁殺伐之事兼主人物皆總列屬也外察生死之時無不先知以奏大道太上玉皇帝知不得有非妄也内名二名天正三名攝提四名益隂事内不見人世人有見者益壽三百歳後聖君告玄洲二十九真人曰夫欲知其内道者先誦中斗九名註即令之北斗是也時人不識呼爲北斗是中斗也太上老君傳教亦呼爲中斗今求道之人但自知之不用教授凡愚之人即得除死籍上生名心存身著註心存尊帝二星之名入五蔵長日夜存誦之在心不休身著是一斗二斗成是著爲衣一十四載使入長生法訣授二十九真人法曰但以本命日及甲子日庚申日旦暮註白日午時爲上次巳時中申時下夜亥時爲上子時爲中丑時下存一斗二斗成法全至七斗魁𩲃𩵄䰢魓𩳐魒數足各誦呪遍訖更誦地紀天綱呪遍即畢得之一年无災二年不死三年得地仙四年入不死五年功力甚通天地救濟人物皆得應順心口六年神通長生自在之驗力不可妄爲之祕之吉泄之凶註此是太上後聖真言教授不可妄行也老君曰夫作一斗二斗成者各須先捻本訣然後存履使註使者存魁斗或時使左肩爲魁或爲𩲃心爲𩵄或手爲魁之使謂之履使存用歩成斗方有神驗可使使也乃從一斗至於七斗皆本文正訣捻之而用第一魁星文在左手第二指中節上第二𩲃星文在左手第二指第一節中上節是也第三𩵄星文在左手第三指第一節是第四䰢星文在左手第三指第二節中是也第五魓星文在左手第四指第二節是第六𩳐星文在左手第五指第二節是也第七魒星文在左手第五指第一節是也老君曰夫配衣成斗皆須前知有七星本訣即可存歩之於身身即通神欲使通神捻此訣遍七星文其斗中二尊帝神三妃二夫人二嬌女大君官遥以敬貴於子與子注上生名下落死籍後來至學之士謹節孝師供道齎金玉寳重之帛納師玄房寳座之下請受此訣後方始依流珠上存用之乃可進入仙階名書玉籙北斗之君官與司命司録度名青簡之書句落黒簿之曆此皆道力使攝文訣使使即得身心通於天地之神神力可用也若不知此訣依經存一百年存用无益一分也此法訣得之行用得知其元一年便通神使靈二年去死辟兵三年仙官矣一十四年要昇即昇要住即住太平金闕帝晨後聖君𥙷子爲世仙官必任去住此法祕之切勿傳非人直是七百年三傳一傳只三人過此師被大考師退仙階弟子盜行滅身殺族切禁後聖君告張天師曰夫欲行綱履衣北斗取成一二三四五六七用濟身助國安家救人急疾兵疫水火者先須知識手上文訣此便是得道之力也聞見凶惡之徒來註間者猶逺可得存一斗二斗見者立到不可更存斗成便以捻文急指之即走避之得无人之地稍寬即存斗成止殺之便捻一星二星之丈直到七星之文足心急配衣左手存魁魒止之立住自伏且休少時急去後到稍无人寛處捻訣存斗成更止之凶惡魔難之徒伏心而退不肯退而死此法大驗不可妄行慎之又告王君曰訣云一斗成收魄二斗收魂三斗收神四斗收身註罪重便信法得也五斗飲血飲血是禁訣之别名也六斗誅神是考責人魂魄别名也七斗止身註止之不住斬大約此是斬之别名又云志人常修行長存一斗成者定魄二斗成者鍊魂三斗成者調神註神是炁之精物形脉之神因炁而動四斗成治病五斗成去賊堅身六斗成神靈衛人七斗成道備通神行之七年上爲天真註名入天真之位未得上昇之法一十四年上昇天得雲龍鳳鶴笙歌鼓吹玉童玉女夫人衛兵千萬俱下迎或全家拔宅而去老君曰修至道之士欲使北斗司命取長生者法訣在手法經左肘註經是靈書之經法訣印式之要符文行用内祕之訣是短卷子錦袋盛繫肘後也其行綱歩在經圖註綱是天綱紀是地紀也老君曰修行之者常存斗不離身夜思斗在頭蓋身如被周遍白日思在額之上小形方寸之斗註白日思在額上懸之逐建時轉長一寸巳下輪之於天中之間印堂之側令鬼精見而常畏降伏毒心也不離於額祝曰額懸七星毒鬼奔驚敢有祟害反視斬形急急如律令說存使四斗法圖老君曰四斗圖者是一身之上存作四斗形也以舉左手額上如斗之勢曲仰如圖掌中仰託魁星左肘𩲃左肩下胷上爲𩵄心爲䰢直從左下左脚内隂視爲魓左膝爲𩳐左足内踝爲魒右亦如左邊筭相似各皆成斗之形又倒存亦如之筭註倒數即左足内踝爲魁向上筭取七星數足即此名四斗之法依圖用无失也又左手向上托魁星下至左足内踝爲魒星爲左斗成又右手向上托魁星下至右足内踝爲魒星爲右斗成此說前面一斗背後亦存如面前左右爲斗則有四斗成矣註老君法即呼前面爲陽斗背後爲隂斗左右有兩斗故曰四斗成此斗能去萬災此四斗能消四殺落滅凶惡災害兵甲鬼妖立能消消兵甲伏伏鬼妖之祟也經云七斗消天上災凶六曹祟鬼四斗消地下災殺太歳土官地獄四司祟鬼五斗能消五行金水木火土之災害也皆存斗而二等制伏凶惡凶惡具上秩注五兵瘟毒蛇蟲等獸訣在五刀支註五刀支金水木火土刀支具掌訣中說倚配衣存行法圖老君曰配衣者將斗爲衣如人著衣也亦有左右男子左註男左邊先起女右邊先起是男子起倚配衣法先是四斗成圖訖即捻訣註都監訣是也少時便存魁星存左肩下胷上註案圖在左肩下胷左邊近項是名胷脇頭又腋堂是其正名名左右脇堂𩲃星居心𩵄星居左足伏䑕䰢星居左手腕中魓星居左手掌中註申五指是大掌當好好乗取𩳐星居左足膝上魒星居左足内踝右邊女思之並同左邊思存呼用也此法男女常行之以辟凶殃災禍修行人要若欲收凶惡先用倚配衣也又修行人入山林深谷之中恐蛇虎者先存之爲上後聖君曰此法從三元將軍存使至七斗七斗至四斗四斗至倚配衣倚配衣至立配衣立配衣註此法同倚配衣也倚配衣面南立即男迴面向東女向西是也圖中有名而无𥁞應是同故不著本流珠中无也至眠配衣眠配衣至坐配衣坐了即存使擊捻凶惡刀支訣而自消後聖君再勑天師此法不得妄傳妄傳則招禍咎祕之真人也老君授此法與黄帝伐蚩尤與禹治水與周伐紂乃以伐惡救民令民爲善也老君常念其善惡不分故令人君人臣伐惡取善以安萬姓令行天道濟助國土及得身安修生有益註史書記歷代相承皆是天命天使神人下授兵法即此驅役引書云代代皆是老君下應號而出人口知其姓名有攺易不知身是一也而應時攺姓名也說立配衣存行法圖老君曰立配衣者立即成也案上古真人行用此書此圖兼掌訣受本師付受口訣修行精熟立思立念便是立成俱使應心順口无不得者說眠配衣存法圖老君告西山胡王達利曰我得天法教吾眠斗召兵百千億萬而下圍吾師而來攝汝過度災厄不被彼害吾師攝食吾師畏我天兵合當救得汝胡王怕急唯投老君老君一念卧斗少間百千億萬而下圍吾師兵馬吾師知老君意退而散去吾師註吾師是老君弟子故假變化形佐助化胡乃飛身從天下領天兵欲伐殺胡王兵衆胡王畏急乃投老君爲計急求生路奴㒒敢辭老君即申脚著床卧存四斗救之因此胡人大王伏而乞教道捨位從道以因眠斗之法罵胡王曰我之大衆有百萬人皆欲食汝眷屬爲飽今有上天大真仙尊與汝思眠斗之法以隔我天兵我以未能便食汝後日當下來食汝衆言訖當領神兵而去天上於是胡王以頭首叩地以石自搏乞大真仙尊教我王衆等作思眠斗之法於是老君遂作誡二百五十條誡胡王王依誡不違其吾師便不下經數月日胡王告徒衆此老道人甚有眠斗之法能斷絶得吾師不下吾徒衆故當合學於是胡王領徒衆禮老君二拜長跪前問請我徒衆非道士所䕶皆被天魔吾師殺食我今叩頭請受取此法以御此魔怪鬼賊侵食我等是時老君受與眠斗之法胡王精思不退更請進受道法後便得正成佛法皆因卧斗之法而獲隂仙註隂仙是佛也卧斗法右以左手蓋頭把魁𩲃居左肘𩵄居左胷胷左邊是也䰢居心魓居臍右手案臍註臍不合受星之炁故將右手以覆臍上存星居手背之上如法毎夜卧皆如之長存之長生不死也𩳐居左膝魒居左足内踝左右同思存又右同用用以左手魁同存用右肩爲𩲃𩵄同在胷䰢在心以次同用又外蓋身者左即從足魁星建向頭次排魁𩲃𩵄䰢魓𩳐魒七魒之頭也右即從頭魁星建至足註同前也說坐配衣存法圖老君曰坐配衣者以斗星左右筭存用也以坐合兩手存魁在左肩𩲃在兩手𩵄在左賢下一寸存在衣上是也䰢在左肘魓在膝上𩳐在左膝下三寸魒在右足外踝右筭存亦如是說使柱天力士擊敵凶惡圖太上老君曰世人學道在人中或於山林之下道路之上忽有凶惡盜賊等吏横爲身害者閉炁捻訣而兇敵之經云及其宅舍遥敵之其賊自伏而走此亦避之註爲其相避有慈悲之道故得伏而前避之彼若不伏即敵之至彼賊敗死爲止之驗也不伏敵之取上極而止註上極是敗死盡爲極曰先閉炁捻訣註訣是刀支訣名凶惡鬼賊刀支是存其彼凶鬼賊具前上袟中註宅舍作四斗收凶惡鬼魂魄令不得東西南北上下飛走自身作四斗配衣前註前者口後者後孔放炁便寫炁交手胷前作弓弩註男左肘爲弩右爲弓皆存之驗用張捧箭射之仍踰地三過叱叱凶惡賊即倒註經曰若展衣歩金鎖流珠引卷之十
