body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註存使周將軍法圖天師曰周將軍在後者爲卷之首何也太上老君言爲周將軍主人之心故人一身之中以心爲身神之王故令撰周將軍爲中元三將軍流珠卷之首若據正三元經即中元上部唐將軍爲首葛將軍第二周將軍第三今依太上勑排雖爲首而用之者須依三元正經所用也夫用法欲使中元要法訣者是老君口訣先躡紀五遍訖㪚爲禹歩三歩九跡訖配衣七斗思之如法畢便先思左腎中唐將軍一人從左腎中出初只長一寸漸長八十一丈領兵三千萬衆往某州縣郷里某人家有某事云云註此心中或言捉某祟鬼或凶人又捉鬼救病或有惡神鬼及縣官口舌之人見謀於我者種種思之得一在人意後用也後聖君告張天師曰本三元之法註上中下三元以主天地人也修道保護身家用以制凶惡註凶是人惡是鬼也不爲已崇并救他人一切之災厄亦得即躡紀三遍散爲禹歩三遍即配衣訖呪曰吾生於父母長在俗間云云呪在地紀經中前呪訣在左手第一指第二節老君曰周將軍者人之心神也人若學道通靈以起心念便行不必在於歩躡之道備具之法註備具足先躡紀次即禹歩次即配衣次即捻訣誦呪是其備具之法也第一修長生即須備具何也縁初學之人雖受法籙法籙具備註法籙具備從正一畢於五法上清也歩躡未感神通靈要須歩躡註歩是飛天綱躡是地紀也取通神感靈註昔劉綱妻樊氏歩綱躡紀一十四年潜行之不令夫知常以候夫不在家則爲之不論凶吉之日且其夫甞爲縣宰日有兩衙勾當縣事時妻輒爲之往往如此七年忽一旦有神人乗五色雲從者二十四人玉童玉女各四人下謂樊夫人曰汝功就力通可心念便得也有何所要夫人對曰要水住而不流要虎伏乗而不傷神人曰小事乃授夫人止水之法伏虎之符汝行之便驗矣汝更勤修行滿一十四年要昇則昇要住世則富貴後果夫妻俱昇天仙人也方則一念便得感應天地爲之感通如未得通神事須歩躡具備圖訣思神配衣呪誦行用亦存周將軍主在心心至則得通神一起念心皆自合願願善而无不應立在須㬰天師受訣圖有五等用之三將軍皆同一用一者自身在外修長生思存將軍來山林精舍道塲中遣惡人惡鬼存衛身令无患害二者或身在外思將軍歸本住道場檢校辟除人鬼患害三者思辟凶惡逆流四者存思與人治疾病急救遣截鬼祟應時得平差立限應心在於須㬰五者存念助國助君收捕凶賊及善道友被枉謀害巳上五事非志道之人不可妄令知見莫道妄傳殃及九祖非獨子身周將軍禹歩綱法經云不歩不使使之皆歩綱也如行之年月歲深自得通神感靈不必在歩綱躡紀使心念便是天地爲之紀綱神靈爲之走使昔禹皇妹飛仙娘註一云名見兄歩綱因而學之一年小疾除註一云百病除是定本洞中大仙所注言也相承本即小疾也二年身輕三年入軍辟兵四年名入仙籍五年通靈六年道術成七年能隱形八年履水行九年上朝中清封爲女聖仙姑如仙卿之位也皆按此圖爲法甚妙訣在左手第三指中節以五色絲縳之訖即配衣存使周將軍如圖存使兵吏師子猛火燒彼凶惡鬼賊之宅事事如圖思存使之神驗存使葛將軍法圖天師曰將軍是右部將軍使之爲第二何也太上老君言爲其周爲前部屬陽合居陽數即第一次即合隂數第二合其雙數之義也即言唐將軍居左亦屬陽數即第三也註據先師常先思唐將軍次即葛次即周今以周將軍爲第一是表心神之大也故於卷中爲第一以應上元神將之像人神將也若用即先是唐將軍居前即相呼有應驗之憑也又按三元肘後靈書云唐將軍爲第一又屬上元次即葛將軍第二屬隂數又屬中元次即周將軍第三又屬下元此兩說不同何也太上老君祕録枕中記云不用法術即依三元之法次唐將軍爲上即第一順天道數而行若修行及用諸法賞罰善惡遍行天下收録鬼神即周將軍居心屬下元爲人又且是下元之中即用周將軍居前爲第一逆行天道攻伐惡逆遷賞善道即可依流珠行用有驗之可憑也若依隂陽太一太醫神仙方云左爲腎右爲命門即可依此言也且唐將軍爲左腎之將軍葛將軍爲右腎之將軍葛將軍爲男子命門神唐將軍即是女子命門神也故以歩綱使法皆存爲第二之將各領三千萬兵以防護命門後從西方而逕衛臣則玄身訖即從右發陣行法領兵如圖訖即歩圖兵綱訖即又存使之如圖捻訣行用无不驗也歩綱註歩葛將軍禹歩法右脚爲先以象隂也常初起即如此勿令失錯此綱不同周唐等二將軍之法也後聖君告張天師曰歩綱書符吞之後即歩綱有上中下三符太上告命文令先歩三元綱後即配衣存使之昔有道士劉根常行此三元之歩後散爲九跡禹歩如此三年一切神鬼敬而受使力能移山河一旦被郡主註郡主古之太守官也追而欲害令使我白日見鬼我即放汝生命若不令我見鬼汝即爲鬼根大嗔以脚行中作綱歩向郡主㕔上借郡主按打之數下心存配衣在手以魒星指郡主本州縣郷里住處地界社廟及塜侯墓伯先追禁郡主某亡父母訖即以左手捻訣使三將軍往取郡主父母以繩縛手送從南門邊壁中入郡主見下牀迎拜罵郡主吾生汝身爲官不解與父母爲福祐於亡人何忽觸犯仙官令使追捉吾於此汝火急拜謝仙官放去汝得生命如不肯汝須立死郡主再拜謝根根即云汝去須㬰之間一時與根俱不見也此是三將軍禹歩之功也訣亦在左手中指中節是皆以初學人五色線縳一年存使唐將軍法圖老君告羅天師曰經中使存三將軍以唐將軍爲第一主上元皆是尋常修行用之即依上元爲先若有急難及心有事故用以擊伐先以心起即周將軍爲先起下元吾聞天尊言修吉善道起於上元救治人病起於中元攻伐惡逆起於下元其金鎖流珠本天尊太上等始置者皆爲天魔人神龍鬼障人修道不許道者修行成道故以立此流珠之經一百五十卷分爲三元一元各有五十卷五者主其五行之數註昔天等告太上道君每元五十卷一元皆管五行金木水火土之數以令學道之子身履流珠出五行去百邪通神靈上爲國中爲身下爲家志心修求无有不成也吾是太上老君也併略除繁取要爲九十一卷以令初學易爲暁悟其理得道成仙者皆五轉用之也夫使上元唐將軍擊正西方鬼賊先歩南方禹歩筭唐將軍起人左腎男子左腎屬木先歩木入火火即入金即剋伏彼人神龍鬼之災害賊祟註賊是人祟是鬼也即得應心順口消滅災害不生也若使唐將軍擊北方鬼賊註鬼祟鬼也賊人作賊也先歩東方入中宫土即擊北方凶惡災害應口自消若南方火郷有鬼賊來犯我我以歩東方入北方水郷轉出南方而擊伐之无不應心順口自消散滅絶也如中及四季註四季屬上辰戌丑未是也有鬼賊者但從東來直存擊伐備出訖更出无不如意之者此法非但存唐將軍葛周總存之共擊此說只論前後存出擊伐非獨一軍出三軍總出訖更出五德將軍佐助擊伐天魔事非輕小切須在心正直行大道无有闕失皆得隨口順心夫歩綱使大道吏兵三將軍爲先如大陣戰敵賊鬼皆須出九將軍非獨中元三將軍也上元下元皆須出佐助之如含弘圖大約是中元三將軍爲前使前出擊伐自是一部雄猛偏能救急難之事偏能理鬼神妄作妖怪治人五蔵伐惡舉善无偏无黨直猛行道之神將也後聖君更再除金鎖流珠繁重之處撰爲一十五卷兼添修正引三十卷引人入神仙流珠之門令後學之人稍易得道給授張道陵顯說用流珠中之事亦於後學法籙中爲寳非人不可妄傳老君授王君歩中元上部綱法併跡爲丁綱歩斗并散爲禹歩之法或爲正綱或爲丁歩之法金鎖流珠正經云使三五歩綱皆先存使唐將軍一人爲首領兵三千萬衆左手把金符右手弩力震筋捉凶惡鬼賊之勢甚雄大猛之狀吏兵斫凶惡鬼之宅迴面看中元下元將軍等號令令齊心一意急急齊到某凶惡鬼賊之宅各吐自然天火燒凶惡鬼賊之宅亦有自然獅子喫凶惡鬼賊魂神令不敢爲祟害害於人物及我等身又呼召唐將軍下自有三千萬吏兵速速到并與二將同心併力交陣左右圍遶鬼賊營域廟舍次副唐將軍者葛將軍一人身長七十二丈右手把㦸左手弩拳筋力震轉雄烈壯猛力勢崩山到來同唐將軍一心共併凶惡鬼賊屋宅及身亦吐自然天火獅子大蛇鐵色班文吏兵等凶烈毒猛手把刀劒同入凶惡鬼賊屋宅之中一一誅斬勿令脫漏一鬼一賊急急又獅子毒蛇咬喫鬼賊急急次副前後將軍周將軍主人心神故金鎖流珠録之爲首第一者主心之弘道使神也註此是老君言告玄洲二十四大真人修行歩躡天綱地紀之法一一皆得真仙從心使使將軍吏兵之功功而著積積滿三千深累成道皆心主之故主於一也誅鬼也今據後聖授張天師王君小童君等言即是周將軍爲前部或爲後部不合專使爲第一若修行求道長生即合唐將軍居前爲第一若欲求救疾病收捕凶惡即以周將軍前居爲第一亦可得矣若能通大道即用唐將軍爲第一周將軍左手把節右手震筋弩力走來捉凶惡鬼賊驅之即在後來即可足明是副唐將軍之行陣可爲第三今所解且依經引解指注用即依修行正典取爲第三但任流珠書爲第一自心使依次使用也註此是趙氏所添益言非老君正金口所說用老君告王君曰夫三元管四時註春夏秋冬是四時神入太一雷公六壬等式法用四時註天公之神管五行五行管六甲六甲管七星七星管八方註天上八方地下八卦乾坤兌巽艮震离坎是併中官即呼九官之位八方管九宫九官生十直即今十千十直生十二支皆起大道自然之炁呼之相應使之相助能一心志精至妙知之得三元五行所衛修求乆而不休獲得長生乆視之道吾昔授此道於神農神農但只解尋究三元而不知有六甲有百餘嵗而无衰老之容後得尸解之道吾知六甲力能守神治身通神三元能守人救人治身通真取真七星能攝鬼通靈立制邪精乆而修求註修者歩躡配衣之法求者是醮祭存呼呪術之道昔女仙樊夫人每至本命之日常行祭醮之法往往行之十年一旦北斗七星女天真下教以歩躡之道功滿白日上昇唯夫妻舊衣俱不將去邑人收葬之至今人傳劉樊舊衣之塜也立得長生皆須從三元而通七星相假始興行能知此即位仙卿祕之勿妄傳非人吾故從一起立二使三通四翻五服六御七指八存九應仙之法教子通神入真之道无不因三元將軍得通者耳一起初法一者元炁也在身之先生故名元炁爲一註身内神也在泥丸之中又太一是也一有二等一等身之外者天也太一之神一能使二二即地神也註在身即腎脾之神是也龍神之長曰地祇也一等身之内者心也正一之神能使二二即腎脾神也添左右腎註男左腎女右腎也曰三也法曰二能使三即唐葛周是也三能攝伏百靈醫治百病散解千災收滅萬毒註毒禍之類是也皆此法爲上一炁之功也一法先歩一字之綱主心註一者元炁腦神太一也入蔵主心後聖君謂王君曰一神入五行是也心起一念便是行法綱紀之理綱紀既行感攝百靈使之無有不成但以心生口聲禍福罪善起念便成古人尊一使之不動坐二使之不行投三使萬兵衛我長生餘惡不行也心使萬神三元爲首六甲爲併能使也註能用能使者使之依道不有損傷人物之事即爲之使使之有益也善功之著使之損者惡貫之盈不可妄也能用立通神靈可以長生此綱左行三市訖方始立綱歩也老君曰夫欲使三元將軍先存太一天一心一等神歩太一心一等綱配衣即勑依法存使之如將使兵也後聖君曰心一能存君告天師使於太一天一太一能使收攝百邪天一能使通達神仙心一能使註能使者忠直解用正心修行是也白日昇天註天師依言舉家得道歩太一法次歩太一綱先以左行三帀訖即立綱也老君曰夫欲歩太一綱使三將軍令應心口者常欲使之時先吞告命三宫符三道後可歩此綱使三將軍唐將軍爲首存使之捻訣註訣在左手第三指第二節欲使之時可以五色線縛之即行有驗後聖君告張道陵曰子欲求長生須作太一之行註太一綱也欲得不死存入天一綱裏註天一者正一三五歩綱是也正一之法存神歩躡之道也欲便飛仙心一起在衆法之前註心一存一身之内起在心也夫修至道之人先以心起念在衆一之前皆心作王既知心爲修行之主即用心行正法於太一之前即得正一之性與心一俱司天仙也常行心於三一不失身得神仙又告東海小童君曰本命日歩心一上元甲子日歩太一中元甲子日下元甲子日歩正一往往如此九年仙道成三一備矣又告西山老女生註一云香女生是也歩三元將軍元法寅時用上元唐將軍爲首午時午後用葛將軍爲首申時向後用周將軍爲首此老女毎五日一爲之七年反老爲少容三十許十年道成年可十八女子形貌也老君告黃帝註爲廣成子時教帝步上元上部綱也非中元唐將軍也上元自有上中下三部上元上部唐將軍中部李將軍下部徐將軍是也曰三元將軍統領五德而出五行知此之道可學長生帝因學之教帝從上元太一歩網法起於上元甲子日歩次即中元是取中元甲子日歩次即下元取下元甲子日歩上元歩太一中元歩正一下元歩心一上元太一唐將軍主領天官天曹官吏之事皆此神將管約之通於上元上部唐將軍也修道志人切欲得知也中元天一將軍主領地司五嶽四瀆北酆都神靈冥司之任管通於上元中部李將軍也修道之人不知被北冥之記録知之常行存三將軍擊伐皆以葛將軍爲首也下元心一將軍主水府及北方元極大荒之地四海九江千江萬瀆溪源湖濟之靈悉皆主領管約用以擊伐收管皆以周將軍爲首也上以應上元下部徐將軍也步天一註天一是正一盟威法之步也以綱常以與身勿傷骨亦先左脚前步歩畢都使三元得三十六部散三遍老君曰欲步正一者足未起而心存念正一之中三大將軍吏兵等畢以歩綱步綱畢即捻訣作於正法配衣七斗或四斗註俱有圖在於流珠之中也成以左右配衣如法隨意使用也老君授黃帝註帝時老君爲廣成子或爲无上先生或堯舜時爲務猶子也曰帝欲求真先求其修身法守神術去病註術今之符籙是也上古呼籙爲道術經文之事符堅體炁運津能行三者自得天真此是修三一之道後聖君曰三將者人身三元之神也又是人之三魂能以通神上神通天中神通地下神通水此三神名曰三將軍朱衣赤幘大冠手持器仗旌節或持刀劒能制鬼賊邪魅通真人若知其長存以步驅使令取仙道長生立能救人病差人知之令以辟害報人外謀及相害種種能知報人也老君曰奉道之人有小疾厄者常存三將軍早朝入左右腎及心中治身中疾病痛苦之處先呼吸入病痛之處然後閉炁隨左右心等將軍往痛處攻擊往往如此五日當自差退神驗更加納口閉炁存使炁隨將軍往痛疾之處同攻擊疾病三日内消差又忽有惡人哧口毒舌者當取壓口舌符下書名姓以式加臨訖使三將軍往擊之此人自伏心休彼更不相犯即休勿苦用心相伐又相損元益後聖君告天師曰道生於一一是心也記録道如記食道自合同心神便與此三神將同心力之通也兼授別訣令三將軍同心上元將軍訣存在心上中元將軍訣在心下一寸下元將軍訣在心正中是三訣也子但以存之如圖出一出一出又入如此長行之一十四年通神仙也老君曰上元三將軍在於額中元三將軍在於五藏心腎下元三將軍在於脾藏訣在手心應於捻左手大指第二節心應於額捻左手第三指中節應於脾存使七斗法圖老君告韓逍子註逍子是女仙也曰夫言一斗成者是魁星使也先步地紀天綱訖次即三將軍綱三綱訖即存斗使擊伐也經云先步後使北斗七星攝殺也此是第一成便迴手指物未即依口也須以久學習熟二者有功北斗與隨口所欲意用使指驗也夫一斗自有圖存想成用待想成訖祝曰一斗成三五併迴天覆地隨吾使令急急如律令二斗成者是𩲃星使也亦存一斗成畢即二斗成也世人存使之於身之上功成通靈身能威物保生赦濟攝殺无有不成此名二星之使威也二斗亦自有圖存想成用之應驗祝曰二斗成三五靈收攝鬼賊凶惡伏聽急急如律令三斗成者是𩵄星使也亦存二斗成畢即三斗成也存使之身漸威靈三曜流光一身之上赫烈斗之形三斗亦自有圖存想成指用之驗祝曰三斗成天地肅清斗隨我身見者奔驚急急如律令四斗成者是䰢星使也亦存三斗成畢次即四斗成也使之人赫然火周迴四斗如斗之形精鬼凶惡心死摧伏四斗亦自有圖存想成使之得驗也祝曰四斗成三五盈行周萬里風火无停殺滅鬼賊凶惡敢行急急如律令五斗成者是魓星使也亦存四斗成訖即五斗成也使之人光炁浮天如斗之形光照四方鬼賊凶惡自逺去百里百病自消魔邪伏滅五斗亦自有圖存想成使之有斗形真影照千里外鬼神降伏祝曰五斗成五行陳五金秋浮落滅木精註精鬼之衆也五木春茂剋伐土星五水流盪斷截火行五火興隆五金敢鳴五土淨鎮我與萬物俱生急急如律令六斗成者是𩳐星使也亦存五斗成訖即六斗成也使之人精光天地照曜八方鬼賊潜藏凶惡併跡身通靈炁性合真仙百鬼畏敬千神衛護六斗亦自有圖存想成使之應效祝曰六斗成三五俱行除惡併凶萬里流清我使六斗六甲倶併衞我身家盡得長生急急如律令七斗成者是魒星使也亦存六斗成訖即七斗成也使之周帀七星身帶七斗光照十方身同北斗妖凶自懾祥瑞隨人萬里肅清衛兵千萬亦自有圖故全七斗使之今備七星存使立驗應於心口如電照身通存斗成力使神靈久久如此存使身飛上清祝曰七斗成身與六甲併驅使三元迴轉五行位入神仙太一同行力制九天九土自清願家俱仙舉宅同生急急如律令老君曰六甲之精化爲七星七星變動監察萬靈註萬靈者謂人神龍獸精鬼等但是天地之内生育有靈通神之者曰靈也萬靈所畏北斗七星故以學道之人皆知有北斗七星而常存思戴履者降伏三官斷絶四司落滅死籍注上長生令我學者仙道自成故號斗成註一二三四五六七皆同之成也立其北斗是先天地之衆象成立以令紏察天地之内萬靈立使令其死生皆是北斗所主也故以人知學道者皆以存戴配著如人之衣衣之好惡長短之殊而蔽身一等周遍不失欲令萬靈畏敬而苟欲取其命長生也乃以隨功一二之斗其功深淺大小使成之力不失分毫初學之人須以日夜勤心記此之法思存勿失星名字常結記在心道不離心心亦不須離道兩不相離計功立取神仙也金鎖流珠引卷之六
