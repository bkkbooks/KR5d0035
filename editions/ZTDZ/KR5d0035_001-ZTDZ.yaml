front:
  text: 金鎖流珠引卷之一
  hash: sha256:db17fedb4d34c95279b5fbef4d1c184eec3cae02516049448425eb8b103b8ab7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_SJB_001-200357a, image: sjb/20/200357a.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註三五步綱引夫步綱者是强身健神壯魄之法也先從地紀堅勞其身壯健其神神炁自然鎮藏然後通天地感使神靈也註此法一能治其身二有餘力救治於人用之速於水火老君授太虛上靈飛晨中央黄老道君以作地紀形七斗註斗七星之形也從本生命五苦之地出長生註五苦者五運之所筭也假令金命人命在巳巳爲長生死在子墓在丑子丑爲五苦從五苦步出長生故曰出死入生木命人命在亥亥爲長生死在午墓在未午未爲五苦水命人命在申申爲長生死在卯墓在辰卯辰爲五苦火命人命在寅寅爲長生死在酉墓在戍酉戌爲五苦土命人與水命人同用其五苦命皆取死墓爲五苦取衰病爲八難九厄也上古真仙皆教人行此法此謂度五苦八難消九厄治百病師前引弟子登也後聖君引方諸大童君小童君出五苦入長生訖又從生入王相註金命人生於巳王在酉木命人生於亥王在卯水命人生於申王在子火命人生於寅王在午土命與水命同筭用之五姓皆不能相剋以消五行相害之災又告王張註王是總真張是天師一真曰夫人者身從五行始生亦從五行所滅吾知之早矣況知之晚亦被所刑害也皆先作禹歩躡地紀順倒返三等了誦五行祝消之一年消災矣註五行祝在金鎖流珠上卷第一中有五首先行東向鳴天鼔三十六通勑身如法發爈出官坐思頭太一府訖即立思存出吏兵如圖左右配衣七斗周匝哭配衣出官訖步綱歩綱畢即誦祝五首破五行相剋畢又歩綱五斗周畢誦十二首呪以剋支干等一十二神取長生消五行災言一年辟非二年辟兵三年辟鬼四年成地仙千害萬邪衆莫敢千自此巳往福慶无端致神使靈馭駕飛龍太極賜芝玉帝給童行之二七年爲上清真人註此說言金鎖上卷先行用後方便修行天綱飛步之法即得依前行後聖君言若單行天綱未必便辟非矣此法應須前行地紀後修行天綱即可有恧據此法若行天綱不行地紀都無通靈之應昔上古廣成君教黄帝飛行天綱試之三十年不通靈帝再求之方與金鎖流珠金籙第一論地紀修行之事一年之内用收鬼神无不如意二年滅蚩尤三年力可以搏虎豹二七年能分形變萬端二十八年上昇矣夫人雖天生地養種植皆地爲基向忽求之无地所立根源壇基便作天法如樓臺之无基可自得浮空而立也前聖後聖皆親降見引教弟子行事也註師引弟子登綱度五苦八難訖與即合弟子配著七斗如似衣謂之配也衣師與弟子左右配衣註男先從左發女先從右發第一斗陽明星註左手爲魁蓋頭左肘爲𩲃左肩爲𩵄心爲䰢右肩爲右魓肘爲𩳐右手爲魒是也一斗成子生人主之平倚舉手覆頭上註禁始止凶人惡鬼使右手指之隨禁捻訣訣在掌訣中行初配衣於身未用便繫指註閑即未用急時便即得連於水火第二隂精星註右手爲魁右肘爲𩲃右肩爲𩵄心爲䰢左肩爲魓左肘爲𩳐左手爲魒二斗成丑亥生人主之平倚舉右手覆頭上註禁蛇虎豹鬼物毒獸凶惡鬼神以用魒手把魒星一一指之如人前但轉手約身用之配星著斗之左右以著星忽急用便獲如閑未即用之爲上上便到七星用更速驗也第三真人大星註左手爲魁左肘爲𩲃左肩爲𩵄心爲䰢右肘爲魓右膝爲𩳐右足爲魒三斗成寅戌生人主之註主之或寅成生人行之或寅戌生人求長生或被人謀解之成加彼惡人鬼祟虎狼猛獸山鬼毒神妖怪之人鬼但來於東方寅西方戌地等至來者捻都監訣使第三真人星𦂕擊之皆自伏死如若有敵來者左手爲魁蓋頭右手爲魒指之自伏不伏被北斗飲血不逾旬日而自卒心痛而死道者慎勿爲之前二星用之亦與此星同也屈右手於前左手覆頭上便用之三五指註指之皆言叱言是也求長生筭禄品位行往兵甲利但向日日中時隐爲之彼自敗夫真人不受歩躡受配衣於身上用之甚驗但以修長生人夜卧存呼在左註女在右肩上令人神安穩不畏一切人鬼爲祟彼心自伏往往如此一年之中辟非矣註夫配夫一月日三爲之一年之後用之如神出没第四玄冥星註右手爲魁右肘爲𩲃右肩爲𩵄心爲䰢左胷爲膝魓左爲𩳐左足爲魒魒成指之四斗成卯酉生人主之註主之二用總得一自用修行請福禄壽治身災厄疾病二爲别人總得若行禁炁之法七星總須用百禁也屈左足於前右手覆頭上便用之三五法註法甚能禁止兵火之事及官病爲上餘用七星同第五丹元星註左足爲魁左滕爲𩲃左肘爲𩵄心爲䰢右肩爲魓右肘爲𩳐右手爲魒魒指妖精邪魅五斗成辰申生人主之註主之同第四星用之屈左足於前右手覆頭上用之同前第六北極星註右足爲魁右滕爲𩲃右肘爲𩵄心爲䰢左肩爲魓左肘爲𩳐左手爲魒魒指用禁制六斗成巳未生人主之註主用同前屈右足於前左手覆頭上用同前第七天關星註左手爲魁左肘爲𩲃左肩爲𩵄心爲䰢右肩爲魓右肘爲𩳐右手爲魒魒指用七斗成午生人主之註主之禁制一切惡人妖鬼千精萬邪千鬼萬神作祟礙之者皆悉用此星爲指制也諸星雖依次用之步星第數存用而禁制唯此天關之星獨能力制天地之中鬼祟人物兵官疾病之事萬端但行用之者速於水火夫七星有數種醮祭子須知之但能依科儀而祭祭有時春正月二月中用本命日秋七月八月中用本命日晴明祭醮除此不可亂祭醮返却招禍莫言求福者也又常行歩綱須以春秋二度醮常也註若行綱躡紀之人毎月修行須以毎年二度祭醮兼上錢財并酒晡麪食𩚳果時新之類祭之祭自有正文儀在流珠經中下品此是後聖君告天師北斗者是中斗也中斗九星下變爲九靈歩作九跡謂之星綱禹見鳥歩星綱轉石木取蛇食禹學之三年術成能覆九斗配星於足以足指物即轉不知手爲之後登剡山嶺之巔有神人謂之曰足履手指何以足履亦使足指王不見靈鳥足履觜指禹拜之而受後得道驅使神鬼蛟龍虎豹開決山川引理江河分别九州後登帝位方取道解易形變而昇太極註雖不得上清真人而在太極左太一之府掌下界之水旱禹受神人註是務猶子授禹言也言曰此看北斗者中斗天關星也註道家經言中斗大魁總監衆靈如是即中斗是也大金鎖流珠品云今看北斗是中斗也有人卒急官兵并疾患求之速於水火用之在人心手相應不離人手掌身心亦有所主之訣在掌圖中太上老君曰中斗主管四斗二十八宿星屬管也一日一夜周天一帀北斗畏敬而朝帝尊二大真星也其中斗第三星號真人星以管此天下求真仙之人所以修行學道之人故當合隨履不敢觸犯真人星恐有剋折人之名命也並有九星亦須歩綱時存念捻真人帝尊等三星之訣註訣在金鎖流珠掌中訣又在心中存見三真常以一月之中五度歩綱註綱亦有七星即不畫輔弼星也真人星位不合用避不蹋须履歩之丗號之曰躡地紀今此法須歩北斗七星除災度厄上生出死收攝凶人神鬼龍虎豹精妖祟毒蛇之𩔖天地大魔皆須用北斗就配衣收指之即止不用中斗也其北斗七星正名斗牛女虛危室壁是也而用法正名即呼配斗君也即呼魁𩲃𩵄䰢魓𩳐魒註縁人不知北斗正名所以呼陽明隂精非也此是中斗添益人年壽著功於人間隂與仙品與北斗同行之先從北斗修行次即中斗修之有功有厄求救救人速於水火驗也後聖君告總真曰卿與吾傳至真上教須是志人註非人不傳志人令心志傳說教授如是志心之人即教授此法分付令得真人修行勿令志人失功損命卿則非總真人之任也吾今一一傳卿卿須一一傳教志人志人修行莫過於此也傳授醮用註傳金鎖流珠正經之後醮祭以畢則依此法行之後毎日夜行用吾告𥙊以畢則註告命元勑配七宿之名於五斗君也但一斗當直便即封名魁𩲃𩵄䰢魓𩳐魒等位輪天衞人自得其真修行常如含影圖封位者任志人驅使註志人不以驅使七星蓋身如被衣之用不以存使魒關損煞物命日則靜處歩七星圖使魂魄俱與身同登也使身神常備體不散七星輝耀鬼神畏之含似含影出似舍弘其道自真天地敬衞神鬼從使天魔保迎三官奏功功滿白日昇仙真人也行住坐卧莫得離身註志人存七星不論晝夜常思念蓋身一年身神如星光明也一年象真註如此行法一年眼中神光變爲七星常盖頭上知者往往閉眼如見似七星之形長數寸在頭額上有時居胷上有時入五藏之中智人知之想像存思自成七星在身也天魔地精百鬼見而自伏經云一年辟非二年含真註一年行住坐卧常存告封七星不休七星降精入至身中轉輪周行如轉天故名含星真炁輪星真名入上清故能辟兵三年定真註志人行住坐卧常叩齒捻訣設在掌圖中名都監都師大道等三訣存七星不休三官畏於七星敢有留㝵又不敢令三人定志人善惡功過上奏天帝所以九㑹无文可憑善惡便注入真仙落除死籍又無殺傷怨對身長履躡天綱地紀无病堅固不死定魄制魂取真不退其心故名定真也四年地真註志人修行地紀又歩天綱行住坐卧不休兼服靈符六甲三皇如此之者得人中之真故名地仙真且如經言地仙但單行歩天綱或單行躡地紀即得地仙之位鬼神精祟不能干其一人身家親猶被惡神精妖所祟來能鎭一家何況於他人如此得地仙人之位但是天地神靈鬼精妖惡龍虎畏敬受使如奴非但一家一身能以符力救護他衆人居凶惡之地反爲福德之郷坐災禍之家消爲吉祥之宅神力既得如此不可妄行用如忠良太上後聖二君切不許輕洩慎之五年之後漸妙通神一七年註一七年行北斗七星也又一七年行中斗七星此二七等星太平金闕後聖玄元玉皇上道君勑符告封七星衞佐人身名位號魁𩲃𩵄䰢魓𩳐魒等仙品佐佑人令志人受者立能取仙真也如有上智志人辨知此二等同修則一十四年得天真之官白日上昇或舉家奉修則拔宅鷄犬猶得同去何況人口同昇五斗當直註五斗者東西南北各一斗也各七星并中十有五斗斗有一君七星官各有名在金鎖第二卷中後聖君勑封地紀天闕名七星魁𩲃等者皆衆斗君差星官依魁𩲃等位當直也假令春以東方君差角亢氐房心尾箕直中斗爲號魁𩲃等用禁指也夏南斗秋西斗冬北斗四季中四斗君主差所主北斗中斗也七斗配衣用以畢平坐魁頭向綱鳴鼔十五通註前七斗配衣亦有出官修行法具在前項須行出官畢然始配七斗衣後行用亦如之畢方始步祝解五行大害謹出臣註則玄等註是弟子妻子繼代孫即餘人不合身中三五功曹云云金鎖流珠上卷中舊亦有不似後聖君再添授全具故赤書也出官了即立先存手把景星先舉左足祝曰三五舉足作萬神諾三五成萬神并三五行隱影形入青雲便行事握固閉炁戴天柱一過若消災厄急用左銜劒禹歩歩祝三五首註三遍誦五首速於水火其災自消第一祝吾受天地炁當爲天地使云云在流珠上卷中舊老君授第二祝註後聖君下再授天師吾生於父母云云流珠在上卷中第三祝註太上道君教老君老君授於夏禹禹反之出乾坤祝吾生於父母云云第四祝註禹翻太上老君第祝辤一句得乾尊耀靈四字天降成成去災賜求長祝常修行用此法賜禹禹誦行之得道乾尊耀靈註此四字禹言巛註坤字天演出順内營二儀交泰六合利貞配天享永寧肅清應感玄黄上衣下裳震登艮興成離明巽王兊生虎歩龍翔天門地戸人鬼行衞吾身者昊天旻蒼今日禹步上應綱鬼神賔伏下辟不祥所求如願萬靈无敢當叱咄註則玄一云是吾身中五苦八難九厄百病千災萬禍凶人惡鬼圖謀口舌天羅地綱皆伏魁綱之下無動無作急急如新出老君律令第五祝註禹歩禳災求願祝常用修長生乾元重覆坤大厚載云云流珠上卷中後聖告天師曰五首祝若但消災至三尊辟非二首止便步綱收災禍人鬼他自伏休註計通前八首便歩綱綱是北斗女虛中斗順倒反三又禹歩三即止又須捻人鬼力支註支訣也三日災散事休即勿捻訣若求長生乃可悉用後九首祝註金鎖流珠上卷前後發廬出官祝啓天師常以甲子日收災害又云有災害病即行用不在甲子晦朔庚申一月三旬旬行一日註天師一旬二日修長生與中斗同修行又庚申本命六甲日註甲子甲戌甲申甲午甲辰甲寅日也修行之前修北斗後中斗别自有經在流珠中篇註金鎖經上篇四卷是其流珠中篇五卷是也謂太微天帝飛歩天綱註用此音綱紀之字不用此剛字本歩㓻即是此字禹因理水登山剛歩法成禹用之不方用躡地㓻法術此字即是經後聖君授故名大丹隱書上古謂玉籙後聖君攺爲流珠金籙攺爲金鎖别名曰太上隱書註今人有不識之者第六北斗㓻圖圖七星无輔弼星也從斗第一星起男左足前登右足至牛星註是北斗星名二十八宿之數也次女星註皆順天道轉左足常令前發女即右足常令前發是次虛次危次室次壁星也七星周遍以左轉身一帀隂祝來生去死又禍去福生註此是順行也又倒行一遍倒行從第七星向第一星是也又返行註從第一星向第七星是也即分爲禹歩求真次即禹歩是禹演天綱地紀出爲禹歩求真禁百物人神龍物鬼精蟲獸蛇毒之怪等伏而勿殺拒而不伏者誅之其理有併五斗作三歩九跡或三十五跡大禹歩有一十五跡是此二等禹歩去災出厄求仙入真之内訣矣註道士只知有飛天綱之法而不知有地紀及禹步之法但用二七年不獲神而非之爲不神不聖之言非神仙之書且後聖君分明攺示三五金鎖流珠之書三者一象天地人二三元將軍上元中元下元三步綱有訣臨步之時五色絲縳訣訣在掌訣中若求長生捻司命目三官目若百禁捻某物目若敵兵捻天兵目大將軍目等用之金鎖流珠引卷之一
