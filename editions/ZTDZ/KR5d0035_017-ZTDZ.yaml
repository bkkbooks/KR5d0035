front:
  text: 金鎖流珠引卷之十九言九
  hash: sha256:84048de0580c5d786b904e0a31cbaf749a8358f745ce035b368f1b61dfa2b69c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_SJB_017-200444b, image: sjb/20/200444b.png}
body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註六甲隂功下之下老君告東來子曰註東來子是禹之子學道不行隂功唯行陽功功心巧好造樓於空野之地上像道家形影欲將此爲一生之德欲乗此功德圖身得道稱我造十萬餘功合得大仙一旦忽二冥使追赴太山門下被問何因造臺妄殺生命祭於川野之鬼牛猪羊驢數十頭疋而言汝也汝答承伏殺他我即出汝之罪若不伏即當禁身責問爲汝父理水有功今爲太極真人不可兒受殺生之罪我當爲汝減父之福以當救汝得放當歸世俗作隂功過度他生命即得成人百劫千生不復來覓命也來子應曰承伏畢推官果與諮太山君君放即還死經七日而活活後常以直心不害物命常以巳財帛贖合死者生命放之無限往往如此或以人禁繫鳥獸常行歡心令放或以施食及衣於禁獄之囚如此三十年間先殺者牛羊猪驢馬畜等總託生爲人永無怨對如此之小功著上感太上老君示見正說隂功行歩履天地綱紀之法施此六甲之功一旦忽通神威感天地驚動人物仙人也老君再降賜告大隂功卿立身先是好起樓臺殺生祭祀神鬼將此以欲治身求真具前注既因冥使告知今心知悔過今當正教子著隂功功之有十一則服六甲真符以治身疾二則真心不損不害不殺不傷不邪不淫註自有妻妾不合妄更侵淫他人也不妄不佞不盜去九等之惡爲九等之善一慈二孝三心有敬四身有禮五行仁德六少言語七不爲人之先巳雖大於彼人亦須先讓他爲先不損於巳之德也八不妄害鬼神九常懷學道得道後救度一切人物註昔嚴清常以燒炭賣與貧者減三錢四錢一秤或以見乏者與之一秤二秤如此三十餘年一旦有玉女下授十卷符籙六甲爲先令清跪受一一分付教以修行六甲符清對曰清不解書玉女曰猶解九等隂功何不讀書學書取識文字書但得成即得於是清便讀史書不識文字玉女教之不能書玉女教寫如此三年成書學滿腹問無不知聖也常行救治百姓疾病之功傳出弟子皆以治病爲事時號曰嚴君之道後聖君告天師曰卿爲師行教弟子行隂功者有二註一師須明弟子心二弟子孝於師一師先明弟子有心无心有信无信註今時多有弟子有口无心若此等之人切不得輕信傳事須信重他心不可頓辨得辨得即師亦无失即可具傳小法一階若是志心好樂仙道日夜思道樂真丹懇供辦師量事依科中一一減信以行隂功二弟子日夜知信心真直常隂念道孝師師亦感通常示見弟子弟子呼存行用立驗應於弟子心口所爲皆遂除三逆之外隨意所欲註一不逆君言二不逆父語三不逆師教此三條是天師注授王長趙昇語訣行告弟子又告天師曰夫與人隂啓至道至尊得達者是名心願啓善利人是名隂功而名行隂德天常善之後子孫繼代仕宦不絶註善啓救病拔度災厄但行善事凶惡不爲常心行濟國救人故名善事而功德成就白日昇仙也若啓願凶損物害人若啓至道至尊雖應終不大通行再啓得行害人損物是名隂謀而名行隂賊天常惡之後子孫必有疾絶註縱有子孫不絶亦足疾病无官無職而爲下民也吾此言再授卿知令卿須係代爲師而教後學勿爲惡願皆須常善言註聲教爲善言心行爲善願也善願爲上老君告北斗真公曰夫人行隂啓註啓善言善願願除妖辟惡口舌厄疾中有人鬼名不欲人聞者可以隂啓奏低小聲讀之勿令外人聞聞恐爲所說入一人之耳出百人之口不可令聞爲天曹未知人道妄傳以爲怨對神鬼所知恐於雲中及關天門三所爲勢力神鬼所截關奏不允達於太上御前諾下天曹下卿須急與關奏上玉皇若待地府二符俱來而被怨對怨炁及隂官地府故炁共爲所截不御達也卿須勿待隂陽二符註符吏也夫人以順事閑章表關奏之言音調聲律言語髙響欲人所知即集地府及法籙中吏兵衆差隂陽神六甲中二直符先啓北斗君北斗君轉啓關奏君方始達章於天師君老君時天師君號釋師佛呼帝釋是也後聖改此位爲天師姓張名陵天師君署訖只御達上太上御前中理恐爲天地水三官妄以前奏云某乙奏章有妄太上无極大道太上老君後聖玉皇上道君等二聖不與𠃔達順慎之所以置於隂啓奏關之科老君告妙行真人曰註妙行有八人正妙行姓真名定光夫人學知十等隂功於人物之者得此門長存行之不逾五六年間便得神道與通得通神之後唯以善救人物人物積受其恩漸聞天曹事與關奏太上太上喜之一一聽與御諾天司便注言功於仙籍功滿三千太上給以十直仙童十人註日得一人玉童二人玉女真官一人從官隨日人數直符二人十二直玉女十二人註日二玉女直一人與録隂功一人與外人物關奏行通啓章表之事聞天曹便轉與聞奏太上御前真官一人註甲子即王文卿乙丑龍季卿六甲中用周而復始无極於六甲中從官隨日人數當直以依日呼其名而使之應道存而所用无犯也註使應道即无所犯不應道使之即犯科律也直符二人註當行直日之符以救人物之疾害也當直修行六甲隂功之人輪轉無闕又無犯者註犯者妄行用害人物妄言惑人令以淫祀六甲隂功玉女六甲君北斗君大嗔惡之反以爲禍禍人此名狐假虎威之義惑人求財其罪兩及一爲惑人大罪二被惑人之心身本无厄疾妄於北斗所求即云有厄此妄天地之罪被轉天關之神嗔人婬祀因轉關之次便轉手指本生宿星此人便却招罪受病減筭注入邪道如寳有災厄修行亦須依北斗儀不得妄爲亦是有犯也一一計得隂功滿便仙也後聖君𠮷天師曰六甲之隂功可大功也夫天地聞萬神皆六甲君之部使也使之功理正直行於天地間人物慈心愛敬施法惠恩流福潤及於蒼生而稱善行用神靈有功不殺不害不妖不妄此名隂福流濟註或符術治病或決龍行兩千州萬郷濟潤邦國百姓歡泰人物俱安其功可大功也千州萬民歡泰功積山嶽非卿一身一家繼代得福仙也使之不依經師僞行妖妄令人淫祀天地星宿其罪反招減筭奪壽彼此俱被責罰夫正一之醮自有儀出三元註天師口訣告王長趙昇曰夫正一之法起自老君老君祕此法於天臺次經劫數嵗後再出號爲後聖君從天降下授吾兼賜授科儀三㑹醮酒供養如世之社㑹也如軍有設也皆須依時失時不可別日醮醮即失科也可爲天地三元一元得一日爲社㑹太上老君後聖君許以此日禮集三元五行六甲七星九靈九精二十八宿三十五官四十九官百二十官將等領天兵百千億萬領星萬像是此日降㑹歆饗皆以醉飽得福於身家并及下元五嶽四瀆社廟土地靈官得醉飽主人受福若非此日妄爲醮㑹或稱本命或稱甲子或言四時八節皆爲醮祭用燒錢財此入婬祀閑鬼野神妄來就食正一之神星宿之神都不來降唯身中籙神三將軍在身者得食在天地者不得來降食即大怒反損其身何更欲求福德卿爲吾之弟子慎勿爲此若不依永以失道反損身家慎之醮祭須依科行萬無不合天地水三官之神使令得道之力若不依永招非横即名隂災註災禍之別名昔有人常行婬祀得罪分明何更覓其功德卿須知之分明教授正一三元法籙弟子勿行婬妖妄惑世人但依六甲之功自然得道不失老君曰此名六甲中十隂功也修行之人得而寳祕勿泄但依此修奉自然得道六甲靈書陽功又有六甲靈書說陽功有十篇故書之十訣略記其名註太上老君傳中具說也一是廣起因縁集社衆造土木樓臺觀舍積功千萬謂之陽功不入隂數後聖君曰此人結集社衆造此功夫來生得爲仕身有財及髙堂舍居子孫富而无貴二修齋誦經功積萬遍此名陽功不入隂數君曰來生聦明耳目清正有善男女孝順有官三勸人行善令人布施捨財千萬此亦陽功不入隂數君曰來生爲人之長爲肉食人衆之首子孫繼代爲之四行心捨力廣造土木結架殿堂嚴列山路此亦陽功不入隂數君曰來生得爲男身有官職富有奴婢人力驅使二代不絶身反即更不如前生大道忌此心五鑄造鍾像功結神仙像現世人一時之善此亦陽功不入隂數君曰來生能歌唱亦得端正身而財食乏少六能讀呪辭閑妄呼誦揚聲髙呌叱罵鬼神雖救及人亦是陽功君告天師曰此功不得平出於身而雖救人爲叱罵多故來生少病而乏子孫七路川開井施水及漿此亦陽功雖施惠往人合隂言功爲往來云某乙造并君曰此人後代子孫受半隂功自身陽功託化爲善惠給急乏之人八因官借力救捘人罪亦爲陽功君曰來生得福或此生得報善陽功也九造建橋梁往來通濟亦爲陽功君曰來生常得往來人惠及十受結受戒清淨心神不以婚娶棲山髙上君曰來生得道无爲右此名十篇陽功不入隂數昔髙真上仙皆以行隂功隂德不比十行所爲昔仙祖聖君殷周之朝三爲柱史四爲宰輔事六十四天子七百五十一年而西過關往胡國按傳云有妻入十四人有子二百四人内傳云云化胡王爲佛仙後上昇爲太平金闕帝晨後聖玄元上道君繼代而行隂功積而爲隂德善教无爲之道不假棲止山林之人久久髙上過去今身來生受善報不失金鎖流珠引卷之十九
