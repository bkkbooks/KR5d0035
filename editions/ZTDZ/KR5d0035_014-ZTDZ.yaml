front:
  text: 金鎖流珠引卷之十六言六
  hash: sha256:1bf768578f683d8d8a9ddbbbb766e31da46c7c34caf304ce3028cb1902fb2bd9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_SJB_014-200432c, image: sjb/20/200432c.png}
body:
  text: 中華總眞大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注六甲隂功上六甲者五行之子也註道生元炁一生二隂陽是二生三三元是三生四四時是四生五五行是五行生六甲甲子甲戌甲申甲午甲辰甲寅是六甲生七星七星生九精九精生十干十干生十二支十二支生二十八宿二十八宿生三十五神官三十五神官生四十九星四十九星生六十四卦星六十四卦星生八十一極數星星數隂陽故之曰小數之極故號古法數極八十有一今此八十一生萬象周天不可知極之數也有三等上等符書入上元註號之老君六甲符今服者是也謂之老君内祕三符六甲籙丗人遇之者志心修行有功去百病來六神註一神六甲將軍二六甲直日人官三六甲玉童玉女四直日神從官五直符六符吏等六神也使捕邪撿精无不通靈學道歩躡无此不成如有志心好樂之人皆須先攻修服符安魂定魄鎮蔵固形永得長生之根元得道之門户關啓章奏无不呼存行用是告啓使者之首部領三官之主將也老君六甲符序云天地萬神皆六甲之部使也註大天地之中有千神萬靈千邪萬精皆六甲之所部録亦六甲之所使也所以世人知之故受六甲籙服六甲符帶六甲直神牌子所以言功深淺欲驅萬神助國救人上古修道之人无不從六甲得道註六甲是前聖老君後聖玉皇上道六皆將六甲爲首修行之門戸出入之徑路也中等六甲號曰靈飛管一千三百六十玉童二千四百四十玉女其老君祕符六甲有大將軍十一人從官千二百人玉童玉女符吏等九百七十人兵獸使等足可一十二萬人爲上等太上老君置爲天地六甲軍有六營營有四處一在人身後具有注靈飛爲中等入上清數五行六甲爲下等此名三等六甲也其三等六甲學道之人皆須修奉註上中二等毎日服之一十四年登仙下等六甲推身出厄筭衰王之事也後聖君告方諸童君夫人欲修身長生者先修服六甲神符前聖所祕重丗號之老君六甲祕符服之法每誦直官名呼符吏旬將及玉女名字呼之必誦前聖長生呪兩遍即吞符吞符三年即服靈飛六甲符同吞前吞老君六甲符訖次即吞靈飛六甲符符皆記神直官符吏玉女等名一一呼之師曰訣曰六甲神多有重名重姓不能一一記得以竹木爲小牌子書其神名將吏玉女名一一記之記帶行住坐皆記神名防急疾事呼喚驅使救人制鬼收邪去兵唇齒厄出牌子便呼之立應驗也唯夜卧若入女室即掛之安靜處壁上柱上即得莫掛安門户上門户神恐長使彼不安須以心記之應急驅使如手應心如心制口註上古大仙直心制口語有失錯之事也故心許即是口許未真此仙人之所行也呼喚立到須以記名姓及閑時長存之急呼喚時即徴驗也并及喫食飲酒之處先須心呼存直日旬將玉女等同臣則玄甘饗喫某食某飲酒果等常以日日存思之同甘食飲之後存用大驗善攝兵害伏天魔註昔山中道者李伯藥常修六甲之法服符在山中不出得五年一旦忽見一人著青衣乗豹送一小瓶子云是大丹伯藥汝合道成形神枯朽汝須服此大藥即得長生吾今故來授子之藥是真大還丹以金瓶子與李伯藥看瓶子是真金丹丸紫金色謂弟子言曰吾今得道仙使送太丹吾當受服而去丗上昇汝須依吾修行志心莫退必當亦應得此丹藥去丗之日來天上尋吾弟子韋祥未得對師言唯聞林中有似數百人聲相似其中亦有女人聲須㬰之間聞一人處分云捉來即有十餘人著朱衣捉乗豹使者拋頭著地化作老龍豹化作老虎杖二十下叱之曰李君學成功雖未成名早巳著仙籍安敢爲祟欲毒藥害命伯藥知其非真人即問其故甲申玉女對曰天魔毒鬼化作老龍虎以害君君若修六甲不勤必中毒而死須㬰之間龍虎毒總化爲鬼而死非六甲神之功伯藥不得救而被天魔進藥而死今具此記之行丗丗之人但不應不受不服他自收藥拜而自伏去更不敢犯人往往有此令人著功得道卿於諸教吿有心令先修功三元六甲久自通神此法微妙不可妄傳非人老君曰此法有六通神力一能通入大道之門善假道威伏神使鬼制滅精妖斬斷凶祟二能通天感使天神天龍誅魔伏祅收雲攝雨逆横祅惡之炁甚能攝除之三則通地感使地神地龍風雲雷公電師雨師風師吾獄四鎮註四鎮謂之四瀆水官之鎭山也九州千邦萬國土地山川神靈社廟城隍註城隍神是後聖君許地府置之蘇吴紀紀云吴王芮是左社右稷神官使令助國護身家濟人物四則通水感使水神水龍水中君官將軍靈吏魚鱗獸等令佐道護身助家國濟人物五則通感衛於人人能久修服使身家出於五行永除五苦八難九厄百病自消超出三界得入長生驅使天地水三官神靈立到分明六則能通感使七星北斗君神妃后女註北斗中有一正后三妃二夫人并二嬌女皆爲北斗之七君位號也等以主丗人之死簿丗人知之以多取六甲日作圖先步地紀次天綱次禹歩三等註三等主三元數也丗人歩綱以地紀爲上元仙人步綱以天綱爲上元也尹壽子曰丗人身未出三界步地紀爲先則爲上元仙人身出水火三界即步天綱爲先則爲上元且步綱法須終三等足謂之步綱數也謂之天地人是應出三界三災之法身入神仙長生不死之道有訣在流珠上引中註訣上引第一卷中丗人學道者可明此一條足知六甲六通得離水火三界之法去七宿之災害註夫丗人不論賁賤大小生則南斗所主王炁令早得生榮長年願人不死死則北斗所主衰炁令早得疾病病極而死後聖君大惡之故以前後易身出丗告命靈符祕法演金鎖流珠新名攺易金籙舊語明出天綱地紀歩躡之道以制伏北斗中六隂之神災害炁永出長生仙道得離北斗之下丗人遇者皆知修行行而有功北斗中六隂宫神君妃后嬌女等畏而受使使之爲衣隨手指轉天關攝天魔地祅皆伏此是後聖君大傳中言令人得道上昇雲天太上老君敘六甲祕符文曰吾服六甲符初先師令服授文爲之六十日始漸知一百二十日百病退二百四十日百病消除三百六十日玉女來侍衛魂魄往往夢中如見千日玉女當直日分直神直官註往往有靈瑞徴驗事不在言之限二千日行符神驗身入神仙直神如人往往來見但言之自當身不多見衝近人也註按此說老君不用人多言見於直符兵吏玉童玉女等恐丗人疑言相謗爲妖毀斥正真故以代代相授今正一心直入无爲之道无惑无邪无非无失得一者也三千日六甲玉女常多見身一十四年上昇天入揺光低昻北斗註夫人行歩綱得道須令登北斗後即上入天宫故北斗須迎此人故謂入摇光低昻北斗是也北斗爲低摇光之下迎老君曰若欲步七星六甲先成註爲人魂魄皆畏北斗故吞符服六甲能生於人故魂魄不畏北斗也故六甲能生於人故魂不畏常畏北斗所以代代聖人意取爲綱歩之一令魂魄不畏二伏北斗爲之衣使之如從僕敬之如兄妹欲歩九跡六甲先積註積服符修行積也皆六甲功也其六甲有三等軍亦有三等府院註府院如三軍營亦有三府也上等者上元太一府六甲軍也註在太極之中謂之天上六甲軍營府也有三官將以管將軍從官玉童玉女名具老君六甲祕符籙中兵士三百六十萬人衆以制隂陽五行之逆炁也故在上太一之府上真中宫中鎮河源下鎮人世使四時行令不失五行變化得時者也以太一使者主之一軍上鎮天宫制魔保舉得道之人太一使者每一年三奏太上道君及後聖君也天師曰今上等老君六甲一君佐衛在太平金闕後聖玉皇上道君殿左階下立註如世天子㑹立正朝之卿也亦有左右毎一年三大朝立仙真旗仗旌節命魔威神制鬼之心令以道威正肅天地人神龍鬼制魔保舉有道消伏𠍴遇也一年之中三朝㑹禮也註每年上元一㑹正月十五日是中元一㑹七月十五日是下元一會十月十五日是一年有此三日天地水三元五行六甲等神人真仙官兵將玉童玉女等皆一一隨天真大仙佐衛朝於玉皇上道君殿前明檢十天之内驅分左右㸃記有心前言成道之真人見在未來其數後檢生民十天之内善惡功遇俱一一奏聞玉皇玉皇面勑三官各令制伏惡今部生死託受廵内賢愚分判罪善允其平等列記十天勿令死心屈於生死丗界明付司命也中等靈飛六甲一軍佐衛在太平金闕後聖君玉皇上道君殿右階下立註俱同左㑹日月也下等隂陽六甲在人丗記配金木水火土得人之命相生相剋之候候吉凶而相匹配也註此言在丗人夫妻水火相刑相剋之事我行大道自消此相剋也右此三等六甲丗學之人知此三等六甲之法六功修服歩躡萬事應心自消隂速於水火隂取長生疾於歩躡註言隂取生長者言𩀱行服老君六甲符及靈飛六甲符功著更著更行步躡天綱地紀之功著疾成於歩躡是知上中二等修服之功一等以命運匹配相扶相生相順之功志人善行註下等別自有引在上卷中言五行立入長生第二等者靈飛六甲上元正一府也謂之靈飛六甲軍右營營中官將一同左府具註具官將兵士同於左老君六甲軍營官品人數是也唯玉女一旬十人直經籙且老君内符六甲一旬一人玉女直也旬將二人其靈飛六甲玉女即十人直而无神將當直經籙也但丗人學道之者悉不知有此六甲左右軍之法即去道漸逺不知從何門而入見道也此門前聖後聖皆因此門成道人總莫知唯丗有葛氏繼代總自知之爲其用不依道多作變術惑於丗人後聖君大惡之但與繼代不死之道而不得昇天任仙官之位風常念其修行尋求志要門戸之人盡皆不得門戸或有遇者又用之太多不依其理今故以舉籙注其大道之性以曉後生也官將兵士也而號曰靈飛六甲衛道右軍註軍天兵也師以太一君爲左天師君爲右各舉功過之事也金鎖流珠引卷之十六
