front:
  text: 金鎖流珠引卷之二十一辭一
  hash: sha256:883bb57a36543f233943ab95ce73d2df4e03f2a59b3d08e9882b9169b0be1ca8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_SJB_019-200450b, image: sjb/20/200450b.png}
body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注二十八宿旁通曆仰視命星明暗扶衰度厄法二月三月四月五月六月七月一日奎胃畢參鬼張二日婁昴觜井柳翼三日胃畢參鬼星軫四日昴觜井柳張角五日畢參鬼星翼亢六日觜井柳張軫氐七日參鬼星翼角房八日井柳張軫亢心九日鬼星翼角氐尾十日柳張軫亢房箕十一日星翼角氐心斗十二日張軫亢房尾女十三日翼角氐心箕虚十四日軫亢房尾斗危十五日角氐心箕女室十六日亢房尾斗虚壁十七日氐心箕女危奎十八日房尾斗虚室婁十九日心箕女危壁胃二十日尾斗虚室奎昴二十一日箕女危壁婁畢二十二日斗虚室奎胃觜二十三日女危壁婁昴參二十四日虚室奎胃畢井二十五日危壁婁昴觜鬼二十六日室奎胃畢參柳二十七日壁婁昴觜井星二十八日奎胃畢參鬼張二十九日婁昴觜井柳翼三十日胃畢參鬼星軫八月九月十月十一月十二月正月一日角氐心斗虚室二日亢房尾女危壁三日氐心箕虚室奎四日房尾斗危壁婁五日心箕女室奎胃六日尾斗虚壁婁昴七日箕女危奎胃畢八日斗虚室婁昴觜九日女危壁胃畢參十日虚室奎昴觜井十一日危壁婁畢參鬼十二日室奎胃觜井柳十三日壁婁昴參鬼星十四日奎胃畢井柳張十五日婁昴觜鬼星翼十六日胃畢參柳張軫十七日昴觜井星翼角十八日畢參鬼張軫元十九日觜井柳翼角氐二十日參鬼星軫元房二十一日井柳張角氐心二十二日鬼星翼元房尾二十三日柳張軫氐心箕二十四日星翼角房尾斗二十五日張軫元心箕女二十六日翼角氐尾十虚二十七日軫元房箕女危二十八日角氐心斗虚室二十九日元房尾女危壁三十日氐心箕虚室奎右具推一周年一十二月有三十日筭其所本身屬宿即從一日而始畢於三十日隨月而配之上古大眞太上老君受元始道君之教也文書謂之二十八宿經有一十二卷二百紙廣大卒難㝷究後聖君降南山大業十三年下降長安南山今名終南山告風有唐李氏之王天下也今撰略二十八宿經爲十二月三十日相配則行旁通示人筭配本星即視知哀盛令風旁通撰略併爲要訣敎以志人故因上聖所出旁通記也太上老君曰夫修長生人得知本生宿本生宿是生日所配者是也遊宿者生命所屬生地宿也假如本生星正當位是遊宿犯本宿甚惡有災甚凶遊宿較輕此二事盡須思候之明則身無災暗則身有災厄疾病須早向前依符法啓謝之即得消滅疾厄度達衰厄之事所在之處每至本命日夜晴明即夜非人行時潛看明淨者吉暗動者有災不見者大厄至即以躡地紀飛天綱各三遍散爲禹歩轉天關指有衰厄人鬼之鄉夫人所生皆有災厄之地假如金命人長生在巳沐浴在午冠帶未臨官申帝王酉衰戍病亥死子墓丑敗寅絶卯是也如五命總有災厄之鄉不論見宿不見但有衰即爲之耳即以自消滅常一月三度爲之即星明朗身則無憂厄災害自消滅夫學志道之人皆須先明此法乃可活得眞身若也不明衰厄之事致病而死此法能與人消災度厄去病救得六親道友之屬長視本宿星小暗不明或不見或使星被差爲使失位殺本宿星下生者一百八十人隨方也東方一百八十人西方一百三十六人南方一百六十四人北方一百二十五人中宮一千二百人何也中宫屬土土失位倍多諸方損人人應不知知者歩躡性法自出一身更救十人亦得但是二十人宿凡一宿下應有幾千億萬人在此星下生也若能歩躡出得百人天下不覺何況一身及親友三五人猶實能救得是人自不知公然受其冥使來進呼取死爲極痛哉逺天邊本宿下皆殺人千百夫修生活身人長以看本命位自星宿以知自身王衰之候此道甚要無故身不衰病又星明朗即不用爲歩躡并祭醮用者反招災禍於一家非獨一身老君徧令禁之并白衣不受反師道之人常令天關使者轉指其人本命者後聖君曰白衣不受金鎖流珠七星六甲引書等人并及罔師言罔師者口辭妄白師借經圖書畢冩不受或即受畢如不今師押署輕師稱已先有及稱别師邊受得如此之者故罔之罪不得其死何況更覓其道於身自不得其安誑道之人天地水三官自知必被三官上奏道祖下白天師祖師俱責此誑妄盜道之賊身身家全被天誅滅皆不得其死昔有張山子名初見小王夫人是阿母之女也有此書一心禮敬不曾失節如此以渉五年夫人念其志心即與關奏奏後書冩冩畢授受後不令夫人押署後行用躡履關斗甚得通神一千年間行不絶夫人見之不將爲過任行用忽一旦夫人於山房靖中見七人總衣五色衣稱天使我下勘張山子盜道之罪夫人曰他有何罪使者曰罔師盜道之罪夫人敎他於某乙邊書冩金鎖流珠登天綱躡地紀之法六式九符之經皆以財帛金銀納某乙某乙與奏名上仙訖然後冩書冩畢隨楚人葛越而同壇授受畢而去使者七人齊問夫人與署否夫人心思記得他忽去不令仙署使者曰只此便是罔師盜道之罪天令伐之夫人全得不署之力况他受了有心反師即罪傍累及夫人身被責退何一階更一百年在人間不得如今以是他自取其罪稱我是李司命仲甫不受此法我豈師於女子之下受法但是王侯之家皆此言也我等七人又往嵩高山勘問葛越對亦如夫人之言我等上奏後聖君君大嗔豈然當時下膝拜女人爲師今以反師是罔師盜道之罪令與之病又恐夫人與他署此經籙法以正圖即渉他罪累太上故令問夫人夫人對曰實不與署天使臨去之次云我是北斗君及二十八宿官之使也太平金關帝晨後聖玄元上道君告命差我下勘事非輕小夫人且得不押署俱之人助喜助喜言訖而去後不逾半年之間張山子居太白之山全家染瘟瘴病而死乃至雞犬馬牛亦被鬼之所殺故風於阿母小女內傳中㝷㝷求得撰出將敎世人世人愼勿此爲行心下負於師上罔於道而被天殺也何況更求其道道法無私不容人過大道無偏取人之無過大道無黨不今人相罔道法無欺不許輕師見前注具不再如此之罪學人愼之太上老君告上品四十九眞人曰此北斗君者爲四方宿之長也主管一十八宿事事皆北斗君先知之不許衆宿下主有不孝逆道背師反君不孝父母雖即一時來報而日月深罪重報即速於水火皆不得其死愼之愼之北斗二十八宿醮祭日月時法老君曰夫修道之人行醮祭五斗君法皆須依科儀行用月日時明眞科曰春正月有本命日秋七月有本命日冬十月中有本命日夜可更二時星月明朗以爲上如無即移歸屋下作壇黄土布地爲壇隨地闊狹長短曲直而爲之明數十燈照壇如月星之意也後聖君告天師曰卿欲祭醮道法籙中將軍吏兵仙靈官並太一二儀三元四時五行六甲七星二十八宿等皆於此春秋冬孟之月而取本命日或揀吉日與命相合利之日當以晴明爲上風雷雲雨星宿不見日者是凶卿前尅日定恐其夜風雨雲暗者以躡地紀順倒反三遍天網順倒反三遍訖散爲禹歩三歩九跡配衣斜指雲雨之處應時有開捻訣在火刀支左手第二指第三節右邊呪曰吾欲修行祭醮五斗三十五星某日是吾本命日即仰雲收雨靜風靖七曜朗明急急如律令須㬰即晴此法祕要勿妄傳其非人妄爲天地責罪罪及於師也日與命相冝利者爲上不利者凶不可用凡取日者一年之中取三本命日春正月秋七月冬十月此三月中得日爲上餘月爲之妄行不依科儀却被天地責罪後聖君曰若實有疾病人命若風燭者任覓吉日潛自身爲之祭醮如自身不能道友及師如無夫爲婦婦爲夫子爲父父爲子總得外人不得妄爲恐王皇知北斗君爲之得罪也北斗尊嚴及七宿官者是女身不得徃看視潛拜如看之者北斗君大惡之皆身受生考官中口舌短促筭命不得其死愼之如不能師弟父子任爲天師具撰一元中也本命日醮北斗及二十八宿儀圖述之於此書中金鎖流珠引卷之二十一
