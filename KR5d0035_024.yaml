front:
  text: 金鎻流珠引卷之二十六辭六
  hash: sha256:620cd87981dcc98c4899308d095f8bf7dcc569c1fb1d6b6859ce10b06987482e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_024-001a, image: hfl/0636/0636-046.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注爲國王帝主拜上大元辰千車五墓却死來生令疾病除差平安如願章法此是後聖李君授天師也太平金闕帝晨後聖玄元上道君告天師張道陵曰夫人命有長短生死皆天曹地府所配也乃下至百姓賤品亦屬於天曹地府何況人王帝主大人如有疾厄頓重即與上大元辰千車五墓出厄却疾病大章若如命迍知窮筭盡壽終命迍知窮者徃徃有也昔漢安二年七月五日帝遊於南山路見一老人奏帝曰陛下速歸此月十五日日中時追使的到追陛下陛下必不得返陛下速歸長安早覔李少君奏元辰千章五墓却死來生章必更得反中國若也不爲必當行也帝聞大驚轉行百步回視老人不見令使追㝷召至帝問卿是何人答云金星也李安期者大仙也唯此人奏得章感上帝恩重必得允餘人不可帝令使人迎㝷得十三日令奏大章二通畢帝十四日忽卒得病甚重去死分寸十五日追使作夢與帝帝更得九年天子適天符下云得李景玄奏少君一名玄子安期是也即上大元辰千車五墓却死來生大章即得益壽命添筭禄更受生得爲人王帝主也前注具說天師授得此章本三卷大約與老君本大同小異添益處甚多今世行後聖本廣者是老君告神農帝曰人生雖有本壽其中有不得壽者百中有八九十人是不得壽者何也人衰有厄厄者福少福多即過除衰厄外又有兇麤暴行自取其死命豈非由於人乎余之不死常以書章也表扶厄度衰保身護命命所能長因授書與神農神農作養生護命志頗有大道之性嘗藥救人書表度人之厄書神農古本有三卷一卷却死章二卷除祟章三卷時號之曰與天公書是也老君曰又授歩綱爲奏書法於神農神農行干雲之歩亦是躡地紀了即散爲禹步者是干雲也救自身亦得長壽後教弟子行救度之法係代相傳不絶綱步今奏此書須作法歩綱捻訣收羅天地水三官之獄㧞贖魂魄出了方始表奏上帝更乞年限即得更生度諸衰厄合死而亦更生李見者早數百人合死弟子久風身救之皆再得生命法曰先令出辭書書狀也考召法師得狀牒五嶽四瀆神官九州社廟社公等神令先救治奏啓當先使正上聞而後章奏救治即得允逹考召法師受書訖判帖社廟與同申奏令病且速退若干日退便即躡地紀三遍配衣轉天關常指病處宫殿之内即當時退待奏上帝過即病漸羌愈三日之内捻都監訣等并天心訣地心訣三訣是作法行禁壇上章訣在掌訣中天師曰天子奏章用信鎮物已上論千貰疋二十石並是别上章儀中此書並不更冩上章訖三日内合有告報此告報皆假託爲别言語告不依實言語何也爲天子之至尊故以天曹地府不作實言報恐人以妄說事未𠃔而人先知故以隱言隱語深義爲報言告不令凡下人知之此是天曹告報之法如此也爲諸侯三品五品等大官上大元辰千車五墓却死來生令疾病除羌平安如願章法百姓附圖法信物頓減十分取一分老君曰小國諸侯侫王也即今太守官是也侯有大小之位有重災厄疾病頓在牀枕者可與先作檄符書檄今之帖牒是也上古言檄符者唯有法一名印有三顆印言元始五靈章令後聖印云太上印是時都印更有時上天曹印即三天太上之印捉天狐祅獸及諸侯治病用此印及受青龍白虎朱崔玄武黃庭等五徳大將軍籙用此印楪身𥙷正炁仙官用也檄之彼鬼神不爲祟訖即勒限某日差損差損不用上書如不損即上書古呼章爲上天公書今改書爲章改天公爲太平金闕帝晨後聖玄元上道君一又云玉皇上帝不名爲天公之號也於上天公乞面勑三官更與添年益筭必得十年二十年便呪歩准前上品中躡地紀網祝准前用天子之法中祝步訣法一同用書章稍似不同也書文則别出不具於此引中不載其百姓在法師量其貧冨濟辨得者即於此件中十分取一分信如不得者量其辨得依力令辦不得有闕恐事不允逹爲國除蝗蟲災損食人種植香苖五榖使天火消之法老君曰此災非天之所爲是土地神靈不爲助祐福德致令災起可以丙寅丁卯吕於室内躡紀三遍五星從木上步畢於火星三遍配衣轉火星爲天關指符五道如此三遍訖臨分付前禹歩三歩九跡訖左手分付符令於種植處四角以竹竿標之髙一丈二尺蝗蟲災等漸漸自消除之此功甚大後聖君授蝗蟲災害訣訣在左手中指第二節符文五道在靈寳三部雜符中不再重書出此五道符本出上清都禁之中老君授與堯帝帝用之施功天下人民種植後即少有蟲蝗之災行世向堯帝之前九州毎年行此災一度也志人爲國及身家修道合用法噐等科律法老君禁誡科曰上等天仙道士合用九劒以佐衛天尊驅御九野剪截天魔一名等身劒二名紫煙朝尊儀佩劒三名制魂四名斬邪五名衛真六名衛神七名檢天八名檢仙九名檢身此是天仙道士合居之此名天寳之噐用以帶佩之中等神仙道士合用七劒一等身二朝尊三制魔四斬邪五衛身六衛神七檢天此七劒也下等考召道士合用六劒一等身二朝尊三制魔四斬邪五衛身六衛神此六劒主六甲一爲等身後五劒主金木水火土五行也此三等道士用劒又出後聖君内號老君正暦世記說餘等人間稱上法道士有道術濟世能助國安邦救治百姓者可用四劒一等身二等朝尊三制魔四斬邪是准法科餘等人間紫衣紫亦上法道士合用三劒一勑水二護身三斬邪巳上合三劔也絳衣道士合二劒一勑水解穢二斬邪有二劒絳衣道士中元四十九階籙下元八十一階足并一階天師法籙治職炁是絳衣道士也但依天師後聖君舊儀注說若從天師儀注後即被陶陛妄作儀注各言二十四階以主二十四炁之像又言其下元即此之例非是正一赤衣道士此即是碧衣道士亦未入黃衣之數按儀舊儀天師科也黄衣合賜二劒碧衣青衣合許一劒也此是風先師之言志人爲國及身家修道用式等給數科儀通濟法老君曰夫志人學道先須得通靈濟世之法驅神使鬼之應驗如口手相應也者莫妙於此法此法以符式兩行謂之天兵祝曰隂陽經云符是陽兵式是隂兵隂陽之法天下地上横行但无偏无黨道業立成白日昇仙得行雲停魂魄俱升屋宅俱行得爲天真徃徃有之張許分明張陵許遜是也俱用天地肅清此法訣俱行天地日月星爲之清明太一爲之下兵天地日月分明敢停風雲散消魔王奔迎此道㣲妙飛昇上清急急如律令此道是老君封式符勑符言也一云封式亦言之也老君曰式居有等給上等天仙道士合居一百二十式中等神仙道士合居八十一式下等考召道士上古考召法師上考召四君一君主考召一君主正一一君主心皆考召君都管三一者也今人不逹其義都改爲正一道士其三等總除之全失考召之號此是陶陸張三家自意識性之總說今後人根㝷莫知其大道之源失其志人之心門路忙忙夫性也合居三十六式後聖君告張天師曰卿爲天師須知三等用式前太上以排三等道士其君臣官人百姓末品今請天子同天仙道士用式數卿相同神仙道士數諸侯官人同考召道士數用之不失百姓防鬼去邪合居式六壬式也老君告羅文強曰天地之神皆六甲六式之部使也若能精思存用先尊本師師即不離左右教示於子百无不通也慎勿妄行爲功也志人爲國及身家修道傳法籙及救人物疾病合用太上前聖老君法印二十四窠法老君曰此印亦有三等天仙道士得居二十四印神仙道士一十五印考召道士一十二印以用印符引并檄禁文書行用又傳法籙印佩板等行用不絶過於公中之官印行用不絶老君告天帝君曰夫大道符印給有三等道士天仙道士號天官主通天上三十六宫一宫有二十四曹故居二十四印以判二十四曹君官司吏也後聖君制玉京玄都制令律曰天仙道士三十六髙上大臣之號有二天師號曰上宰上相又有三公九卿六尚書二僕射俱如世天子官也後聖再言曰世天子以承上天之教稱號上天之子故曰天之子而稱天子也即公臣官將與上天同貟數也老君曰天仙道士行上清玉皇之印次即元始之印是常行用者神仙道士行太上玉京之印亦六字也用之與天仙道士同而印字别也次即飛天九野之印考召道士上古號考召君今天曹四君是也行太上老君印三字印也主三元天地水三官授此印驅役收捕不義之鬼不正之神邪精妖炁不伏自作袄炁祟人以此印印符檄及書勑禁斷之如不肯伏符印勑而奏書而斬之次行三天太上之印六字印也主六甲此是考召道士有功於人神龍鬼即合行印傳法印牒印佩板及上清五法用之亦行大文牒牒上天曹即合用比符如單行小小考召文牒帖大符檄等用太上印也除此二印之外更有封檄賜符傳法别用者是印符符形如印非正法印名曰天賜方符也是人間考召及青衣碧衣道士得小勑字印及遂公印即是一字之符印也封符二印一印是單勑字一印是單封字是也名遂公印也使印令驗法躡地紀三遍散爲禹歩三歩九跡配衣轉天關於左手男左女右把印隨星印符上祝曰天靈靈地靈靈神印一下百鬼潜形急急如律令印畢便卦符符上又印即如此作法行之大驗矣如行之得三五年後自通神去永更不用歩綱配衣也但坐存轉天關隨印天關是北斗第七星隨印印符符自當驗志人修道恐災及身逃避及助國行水不没不溺法老君曰凡禁海神得水行无難履水若履地水隨心決流當以六戊日常躡地紀徃徃如此三年履水之道成矣夫躡地紀三遍散爲禹歩三歩九跡即配衣轉天關常召海神河神江神到問欲歩履水之事并禁水令逆流百種水術之法事事令海神爲之後教我履水術无難之法總得還須著功於躡之道不逾三年成陸大夫行躡地紀飛天綱之道常須先學出水火之要法然後始道成矣常須六戊日記之徃徃如此水神出見伏使扶水行六戊日行事法先取季月中戊寅日取六戊上土作泥麤細如小指長半寸待乾以黄線作绳縛於海神理上以黄蜜封之印以大吉印用成九已九息是也炁十一勿陳炁自覆天剛炁七加海神理上及所渡津濟立至與濟此法師口訣云先須躡紀及加式有功行之即得濟旡功臨時爲之必无應驗之能訣在兩足下海神目或渡河河神目渡江即江神目各各有目常取六戊土乾者當目上以黄線縛之渡一切江河皆如履地不沉不溺此法甚驗妙後聖君告天師張道陵曰此法履水徃來如地卿須傳授志人非人勿傳傳亦天伐伐殺毎有人物入即流溺忽有人得履之如地下人便因此水中徃來之處行非盗之事人捉之履而避人天即伐殺老君曰六戊土爲人形長二寸半木皮和泥木皮者𥿄也𥿄作筋此字音筋之義也令人多用故𥿄筋之泥筋具前注亦具戊日造黄色線縳於足下并捻六壬六癸等訣履水如地常徃來之處有水渉行過之津渡无妨不可行當今世人多以惡如嫉能是以須勿爲之甚佳是志人道者之性若妄爲必受此疾害而死爲極昔葛玄常爲之爲世人所疑呼爲聖人雖不被國之獲罪仍被地府所奏上天太上玉皇嗔謫退仙二階致只得不死之道猶之制旨令陸行五嶽不得妄輕虎豹何况更不見乗雲駕龍鶴鳯昇天學士須早知之爲上也金鎻流珠巻之二十六
