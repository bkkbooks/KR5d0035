front:
  text: 金鎖流珠引卷之二十三辭三
  hash: sha256:3b00eb124ae496be22d4fea9494035ce1670e54403ee945993362e79d725d265
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_021-001a, image: hfl/0635/0635-056.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注行符斷邪治病法太上老君告羅天師曰卿欲行隂功者莫過賜符救治邪病爲上救一人得十人之功也夫邪病之人皆入人家祟亂人物一人染患能亂入一村祟攪十人之家故得十人之功斬精鬼妖氣故氣命非爲罪亦著而爲功也後聖君告張天師曰卿與人治病病差祟除除祟有命斬之非罪却著爲功若不爲祟妄使檄符捉斬恐爲禍祟即非常正面之罪卿師弟繼代傳敎愼勿爲此吾道無救赦之科老君曰欲禁斷天狐使不爲人天祟者行得被祟人姓名訖便捻天妖目或天孤亦得天獸目有天虎天狗天牛天豹天狐等獸之目後聖君曰天獸麒麟師子綱風騎置十二塵世諭百六塵六脚之獸天虬天羊天猿等有三百六十名不可一一記也巳上獸皆有訣目刀支在流珠第七卷名掌訣是也訣支刀等一切獸皆被禁即斷不來注病於人人身中有此精妖注氣不散事須先與吞治邪病符二七日或三七四七日服符帶檄無不永差斷者此法大驗符檄在三部雜符中其精祟鬼有所知通神者即知退而不敢更來往注祟也如有癡頑凶逆不承道法之者可以躡地紀三遍順倒反飛天綱三遍散爲禹歩三歩九跡訖即變三歩九跡爲十二歩前其有圖在引上卷中配衣以左手九指天中魔王宫天使金銅龍符右手把招之九下此符化爲萬丈大龍往天曹魔宫捉天狐獸等來速如水火決杖經云天狐不用殺但決二十下縛送東海令水官掌十年或五年十五年二十年由考召法師處分科決禁繫此等天狐此狐犯禁其人之罪云云若干下縛送水官禁繫若干年後聖君告天師曰卿治百姓之疾常行禁止之事以量其輕重之罪斷之斷罪常以捨其鬼神勿令傷重重即令他失於本身何況更求託生人中爲人之身按因縁說生死經云夫鬼精之身早是不得意而以更行毒害祟人被人請師道以考召伏罪合誅勿示見斬此鬼身毒氣結聚不散被斬便化爲毒蛇千年方得不轉蛇身只得爲人中雞犬之屬由未得人身卿須以决非禁繫他他日月深乆自知退心悔責其巳求放作夢託言警戒令人知覓放得即求去他方世界受鬼年滿得託人中亦爲下人貧賤之身安得良人也卿須記吾此言愼勿妄行符檄又曰符者止是以假道之威力止靖斷精鬼不爲祟害於人物檄者罵也所以假道之威諫罵神鬼不令妄作妖禍卿須善行之行之善有功行之凶有罪老君告三十三天帝君度人經云有三十二天何以不同經說四方一方八帝四八三十二中天不數今老君并中天告即有三十三天帝君是其數也曰元始天尊有金符八萬四千道玉符亦同稱元皇上聖大道君太上大道君有金符一萬二千玉符同稱萬道之主太上老君有金符一萬二千玉符同稱虚皇大道玉晨帝君號曰前聖無上老君昇位號太平金闕玉晨後聖玄元上道君太平經云號玉皇上帝也又金闕玉京云無上老君姓李名耳字伯陽老君分身也紀云後身登上清道君之位鬢髮皓色素衣玉光位髙後聖尊號玉皇道中呼玉皇上帝俗中呼天翁上帝有金符一萬三千本合四千爲後聖君不受故尊元始天尊之位玉符同天帝君金符三千玉符同天師君金符三千玉符同以次小眞上仙只合居三百二百一百之者司命司録君三十六符考召正法師九州考召法師是正師之位居三十六符分巡各隨位封給符數不得輕泄後聖君告大王君曰正考召法師加一十三符并前二十六符都計四十九符也其符有名在拔宅下卷中分巡如給九符加以金銅造之帶以冶人重疾病出兵用之法中皆以重封錦袋盛之與人勿令人見視視即無神驗之力縁其符性直并又麤凶不欲人見其形見之所作神通騰空勇猛却損其病人准前病發不可能忍愼之愼之上清三景弟子可給七符五法靈寶可給六符正一盟威可給五符若法極三元六式爲世足法可准太上老君律計給三十六符後聖君法給四十九符授此各依仙官大小髙下等級不得妄受行天地不許昔仙葛玄本師受金符一十二道以木書作文用爲法術幻惑世人及取金銅符用印𥿄上作術用殺害鬼神及幻惑人物變化之事甚多也地府奏天曹天曹啓太上後聖大惡之退仙二階但與不死之道爲使道不眞無功於人實虚害鬼後學者愼勿爲此也出引用符治病護身鎭厭除害却禍消怪等事諸法用事皆須爲之老君曰夫有行道法之人世號曰道士尊師須得消其尊師二字學與官人百姓書符不給符引妄書妄給都不言其指歸社廟神官亦不知人受佩符信如此符檄爲精祅反欺爲社廟總不聞知若爲令朱墨及故紙耳豈能治得其疾病如此之人妄稱道士亦甚可嗟可歎痛哉耳前三五句是老君言後是羅天師所說符引言符若干道往某乙家治病限若干差訖報右仰社稷直符隨人送往訖報年月日時引考召某官法師某乙羅天師曰吾受老君口訣若與人符須有過止印署如法過止今之引是給訖即捻禁鬼訣躡地紀二遍呪三遍呪曰太上老君先天地生被照九炁罷廢群精社公等祟生無其形世人死者假易姓名不上鬼録合被誅刑聞我符牒到即變眞形但以汝是山鬼不得枉害疾病中傷道民某甲三魂七魄催遣急還佩其眞形形如太上急急如律令誦此呪訖其符甚驗疾病若是有鬼爲祟應口差愈即爲通靈道士方可求仙羅天師言見世有道士自身不能救治其疾病而猶服其藥何況更欲救治他人如此之流猶尚望覓其仙道笑痛之甚笑痛之甚治救病疾禁止鬼神追捉妖祟出牒等法太上老君金口科玉條正律曰律正邪制鬼伏神祐人金科有三百六十科正條有玉律三十卷一萬五千條制止神人龍鬼精魅妖邪之氣不正之鬼各條律科罰罪誅斬行禁不輕本玉條有一萬五千分爲六十卷今於六十卷中略出要行用者三十六要法於第九條中書出行用救人制鬼伏神出牒符條中出牒帖於三官中天神地袛等制止収捉勘問決斷罪善惡輕重之事以著功安祐生人制止鬼神不爲祟害第一術法爲國除凶惡凶人惡鬼也以發正牒某地界神頭首第一行云考召法師牒某嶽某神官云云須得兵神姓名號牒得甚郡國地主某人狀有某賊姓名等作某事於某云云一依陽官公事丈牒相似唯後件即言依法事須牒某社廟不言依檢事須云云且太上老君行法唯言法字也第二者収鬼神爲祟病人法此小鬼神即帖社廟及此人宅神禁之永斷即云考召法師帖某縣社稷今李天師先言添城隍神官右得百姓若官人等即云某官某乙狀云男女妻但病人姓名號某乙去某年月日得某病稍似有邪氣在身纒結不差某乙以百方治救差損今無處依投以䖍誠切心歸依大道救治禁止鬼賊之病差捐伏乞處分者考召法師今封奏上玉皇上帝請攺考召法師號爲考召正使天下鬼神具以知伏判云云判語盡即云依法事須差直日符官把帖追捉爲祟鬼賊科決云云罪重即言誅斬罪輕即言決杖収禁令病限若干日差訖報上者後云某年某月日時典趙芮帖趙芮是漢安帝時張天師弟子趙昇之子學道成能禁術萬端不以道用殺人常以將法於人中戯弄之用閑追鬼神誅斬雖溥救人疾病不以爲功常行誅害鬼神閑禁蛇蝎蟲蛟虎豹死者成群能禁河斷流枯樹生花葉履水如地結蘆葉爲船過江以載數十人而已其人在水中看船似船及人上涯側是蘆尊之葉至宣帝成帝三朝重之封爲碩侯以咸陽公主嫁之轉加雄用如此七十餘年天下鬼神被役使不停鬼神怨怒聞天太上後聖君大嗔追責退仙二階賜與不死之命罰一千五百年爲考召法師下書吏風奏請爲典者名目因此風再奏賜身歸中嶽修行名爲考召使使行法救人疾病急難災厄以補其殺物命之過後必得大仙今且被責年數未滿代代傳後學得道力勿妄行用愼之愼之風以常歎以上仙葛玄之流皆不免有此之過失也第三天下乆而不雨百姓種植田農枯損實有燋旱死者潛行法勑龍牒社廟遣行雨救之甚有功德老君曰天下乆不雨實有損傷者可以夜靜室中躡地紀三遍順倒反飛天綱三遍順倒反即散爲三歩九跡禹歩訖呪曰太上李老君在九重天上萬重綵雲之中騎麒麟有勑令下界大眞王喬出帖帖龍王差直月直日直時三龍吏等行雨呪訖即配衣歸右手爲天關指有龍溪潭中指訖使人將帖牒有近潭大廟即牒無大廟即作帖發遣龍行雨潭中龍應時下雨速於水火之相㓕有訣在掌訣中細看檢取本師口受第四天乆雨不晴淹浸種植此名天病神龍淫亂之故作法取晴老君曰夜靜室中無人見視之處躡地紀三遍即飛天綱三遍訖下綱散爲禹歩三歩九跡配衣左手爲天關指萬里雲氣九度訖呪曰太上李老君金口所勑今日某時遣晴即消冶天病天地清白日月照行訖下綱令書吏書帖直日符官把帖帖城隍社廟神共把帖勑龍王將吏風伯兩師令速収雲卷雨今日某時仰晴亦速於水火第五忽有大狂風吹折樹木倒落屋舎筭非天神天神行雖作風雨而無損傷也過者可作法収之便止老君曰告禁天大將軍趙伯禽曰趙伯禽是楚人能禁天上龍麟羊豹虎等太微帝作歩虚章云天獸三百名師子巨萬㝷諸獸禽鳯凰鵬翔金翅等皆一一禁捉下地上科決放令再上并及風雲雨雪霜露等令不生令便降生總得隨心應念立止大驗也夫天上有靈禽獸者正助天正氣道之念也此獸亦能佐道正氣而常衞護有道之人不可妄行禁制禁制即不能雄猛騰空雲路力便日衰夫獸物之能雄猛勇力被禁之後不能勇力雄猛騰空雲路便日漸衰因而死漸至困死妖獸妖禽不可不禁不禁下界作妖變怪祟人物人物不安故合可禁止之而若不爲妖祟不可妄有禁制禁制是反天也愼之後聖君曰龍有妖龍虎有妖虎天獸皆有妖怪之者可須禁之勿令爲妖祟害人物禁之法先須從地紀躡三遍即飛天綱三遍各從呪遍地紀十八呪天綱十二呪呪訖爲禹歩配衣轉天關而指之九下即發牒隨獸使相類之者捉之立到道場而隨罪責之呪訖散爲禹步配衣轉天關而指之九度差合𩔖使者把牒而追捉之到問罪科決却放勿得妄殺止狂風法老君曰先躡地紀三遍後飛天綱三遍誦呪隂呪不得髙令人耳聞聞則天龍神不伏也太上告命北斗七星天地之中大道正平神正無凶龍正無精鬼妖不得動不正不敢行何忽狂風吹動天庭樹木摧折屋舎倒傾太上捉汝符牒俱併縛汝凶神妖龍等輒不得風生急急如律令誦呪訖即散爲禹步前三歩九跡次即變爲十二跡次即變十五跡即配衣轉天關九度轉指之隂出牒差日神與式神兵馬領社稷神所由兵捉行風神龍鬼科決應時便止絶速於水火捻訣訣在左手第二指上第三第二等節捻之即止金鎖流珠引卷之二十三
