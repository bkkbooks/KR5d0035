front:
  text: 金鎖流珠引卷之四思三
  hash: sha256:cb6b7dcb780678eab010c93f5c02b4deb8241f29c0be97952d60850a6cc89550
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_004-001a, image: hfl/0631/0631-094.png}
body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注五等禮師引訣上奏章表安壇洗浴法註並金鎖流珠經自有一一具天師曰具注於後思五藏三神勑身衛靈呪發爐禮四方出官讀章復官等法陵並一一具出在金鎖流珠經中唯禮師具未盡其元禮師太上老君授黄帝禮師法別有科儀具用五等一奏章表禮師二歩綱禮師三考召治病禮師四行禁炁天地間萬物禮師五行兵入軍入山入水行往他國禮師第一奏章拜表禮師天師舊儀關奏典録曰治爲本受正一之師治版都功全具治炁分明註何謂分明夫天師治有二十四階正治官正炁總受得二十四治二十四生炁足者即是正一度師存禮三拜訖願師下二十四生炁入某身中當令某出官如章所請官將俱出出者嚴裝備衛某關啓允逹上言也謂之正一度師願領二十四治治中二十四生炁下降入臣身又領治中吏兵功曹使者俱入臣某身中即存之如見著紫衣芙蓉花冠如法簡劔領兵從西北而下禮三拜次籙師領三將軍功曹使者下存見著絳紈丹衣蓮花冠願師領功曹使者吏兵下降某身中禮三拜註如若治師兼授正一籙了即只存一師而已不用別存也訖即依拜章表訣捻之即上香是具足法後聖君告天師曰若欲奏章拜表先言太玄都正一平炁係太上陽平治左平炁云云卿所傳吾此治與弟子弟子若奏章即云係天師陽平治左平炁云云即存治師爲尊師冠劔紫衣依前項思存訖即行法事係代靈驗第二歩綱躡紀禮師玉京飛歩祕籙曰夫欲躡地紀飛天綱變禹歩等綱禁之法先存綱頭大度師註樊夫人作綱紀論曰綱頭師名大禁師若受此飛歩之法須是通靈威動感天地鬼神畏敬徳行沈重行用不泄如此之師可師爲綱頭大禁師於此師受法弟子後修行思存此師一年往往夢見教法二年之内弟子通神靈感動天地驅使社廟無不如意依口順言妾師羅文强受金鎖流珠經一十五卷籙法正一靈寳三百六十階地紀天綱天綱之圖後修行不經二年感應神靈天地知妾身願求皆通降應事足多李惠舉註今但隨本師名小聲呼之尊師來乗九色飛雲仙衣紫服冠簡帶劔從天而降禮三拜註或心禮或真禮訖願師得仙位極上清上真人弟子註則玄同得仙相繼代代不絶於今後身無凶災永去疾厄得入長生身家安穩人口无他敢負師恩乞垂靈祐謹啓即捻三師訣註訣左手第四指第一節上徧向左邊是行事日五色絲縛之捻訣畢註經云五色絲縛之訖更須捻五色絲上然後念一呪呪畢即行法事此呪是後聖君祕不傳世人一字萬金不傳念後聖君授赤松子呪註令萬金不妄傳一字祕之太平之號今出是時天地相傳皆因大師元始初得天地結爲元始傳授道君先知故稱太上老君保持係代盤古天皇受之人皇地皇第自相師變生五帝六甲十千十二支開明日月星宿璇璣七政交備正授伏義神農黄帝世代家宜因藏務猶註務猶子蔵不傳五千年堯舜之代傳西胡西胡爲王作師盛千五百嵗千五百嵗後更始興盛道也化出西馳註出西化胡王作佛一千五百年註年滿令歸中國也令正合歸金闕後聖代代爲師教臣誦呪捻目誦之註此後聖授尹真人爲師相傳正呪曰註此呪是元始天尊結集諸天之炁以爲真言呪代代以稱師授之然後即行綱有之憑驗三天離蒼天神赤天光七天羅昊天明青天姓八天耀皇天珠禹餘天吞九天鬱龍天蘇王天玄上不至天俗大羅天林玄天茂右十五文言我八十一門赤女母水門可註已上是後聖君授玄洲二十八真人一時同誦思存師七年之内二十八人俱一時同昇玄洲爲真人此是隂陽五行之内訣諱也又是北斗内真妃女之隱名也後聖君非常寳祕之非人切不可妄傳引敘其十一字在金鎖流珠上第二卷末時人見不知作何行用須以此引開解方可知也更有北斗中真人名諱二字名呼之即存師在面前三歩小言啓師發心歩綱願師教示臣歩躡地紀飛入天綱求生得生求貴得貴求疾差愈所求皆得所願皆合學道成仙舉家受福内外霑恩弟子敢負師恩再拜閉炁三息唱斗中真人名訖行事斗中真人名閣又府君名間三呼之捻北斗訣便歩綱也第三考召法安壇禮師法正一考召儀曰夫考召法是考鬼召神也事大不小須以清淨安壇立纂建獄開門引繩繫壇及獄壇開四門禁歩結界以青香案明燈夜一更三㸃及可結界勑水禁壇禹歩居心丁字遶外噀水壇中訖即西立存三元考召正一法師李尊師紫衣飄飄冠劔紫雲飛飛皆從西北而來繞壇三帀即與臣禁壇領陽兵往天曹人間共臣身中籙兵同心併力爲某家或收惡鬼或某事云云又周尊師領隂兵助某身中入地獄中及水中某家墓中捉祟害某家鬼賊來到壇中勘問所由關啓聞奏註一云又奏用此文奏追捉臣行法依天科行天心正一之法願賜陽師隂師註如无陽師即自身存作代本師身訖即捻天師訣目合天師降真炁一下身中佐臣身行兵布炁放水放火放師子發遣三元九天將軍與臣同心併力共擊破某山某廟某賊凶囚宅惡鬼營侣悉令砂崩瓦碎火燒水蕩捉取精祟腰斬令得疾病差愈某事即遂云云任於此下添作辭亦得即行考召事註夫考召思存師於身之前領兵士者三元總九將軍五德將軍五人兵馬百千萬人羅列圍繞彼人屋宅及自用即備自屋宅門戸把捉每一門差一十六人把一門八人列門一邊把刀刄向地一一立駐刀一如行軍布列行陣把捉營門戸相似嚴勑訖即存見本師乗九色雲或師子從東而來與弟子領兵廵前件人門戸上下結界禁呪追捉符牒事事須秉尊師於空中放出光明湧出兵士羅海截地繞天撿獄與臣拔出某親表某人三魂七魄若是女人云十四魄三魂得離鬼庭之中附著本身令疾病即時差愈捻三師訣訣在左手第五指第一節是也本師訣第二節是天師訣第三節是本師召天師門下助兵訣後聖君告天師曰夫係代思存本師其本師解此法即可思存有靈驗如不解此法只明相傳繼符録經法即不用存思之來不益行法不成禁物不伏反其禍不可妄行忌之忌之思師出兵一一如法具前注即思存二十八宿羅列於身上次九將軍吏兵三元備具如法具含弘圖註圖中三元兵將具足即捻三元將軍訣註訣在左手大指第一節心是訖即向按邊坐儀讀文召神鬼上考問作祟之者名字判付獄收禁後上赤章請天兵誅斬鬼祟令疾病速差及某事速遂云云即答恩効訖辭師註有辭在行兵法中此不具重出耳後聖君告天師曰此考召法有六種通於人第一能與人治邪注疾病收捉祟妖誅斬第二能與人勘天曹地府年命長短貧富貴賤第三能與人禁斷公私𡨚對相害第四能與人夫妻男女生命相剋者令不相剋永世相宜出得金木之災水火之害從順无礙第五能與人解除公私呪詛𡨚鬼害神生人死鬼圖謀口舌之害皆能消之彼此无害第六能除天地災害風雨不時四炁不正毒龍凶鬼淫水淫旱瘟毒鬼炁若非正天行者此法能除之又再言吿天師此六等考召法是太上大道君結習天地真正炁爲符籙經法約有三元正籙一千三百八十一階足即合爲考召大法師開文武部置左右推巡官判官副考召法師如此者是大道妙上救人濟物之大法能受能行不欺不妄立取上真此法功滿三千白日拔宅家口雞犬共得昇天註言功三千有二等是開文武之義也一等文法以學金鎖流珠躡地紀飛天綱散禹歩捻真訣年年月月爲之不休行隂德除聲色口不妄宣心不妄傳内修隂德或服六甲符文并帶五符歩五行辨真僞隱閉少言不惑人物令廣造土木宫殿聲雜鍾鼓此色能除之但守心内修按書歩躡并𦙀符存正真妙法二七年太上大道君前聖虚皇與太平金闕帝晨後聖玄元玉皇上道君三天尊遣使下迎白日上昇文仙真官謂之文理法一等武法是老君先授即行考召六等救濟人物疾病功滿三千人物命亦三千萬度疾病人知道并及於有功者得以歡心潤益三千人此謂之功衆總滿三千白日昇天此文法一等唯得一身而去不得拔宅上昇若一文一武俱行即拔宅家口雞犬同得上昇爲上天仙王之位第四行禁炁天地間萬物禮師壷公先生禁炁籙敘云禁天師李伯陽註老君字也禁地師羅文强禁綱師即壷玄藏此三人是結習綱禁之主首也學禁之人先須思存此三人從空而來雲蓋寳光圓合於項紫衣九雲手捻都禁之訣存見面前三歩之内心禮三拜若炁入處正禮九拜三人一人三拜畢即依本訣行禁某事某物甚有靈驗註其訣依本禁各捻之捻行禁炁三師訣在左手第四指第一節又在第五指第一節文捻訣訖禹歩三遍作禁呪註呪各隨禁某事行用後聖君告天師曰夫欲知禁天地萬物師名當又別註應是相替代也禁天師姓趙名伯琴禁地師尹傳之禁鬼師黄天生禁人師張突陵並新補並須相共前師同存心禮而後行百禁皆通神天師係代須有何必只是前人而存禮總須三拜第五行兵入軍入山入水行往他國有驚怕恐失身之事卒急禮師相救之法註此救身家不得妄傳非人必反損於師黄帝得玄女兵機急要録曰夫從軍入兵不傷者妾有九天隱閉之法帝可授之於妾後忽要用思妾爲師領兵衛出九天之上離九厄之中隱身而去萬騎無追註從此兵法使式式有九天之上九厄之中有九地之下虚空之中八陣之内八陣之外五行之内五兵之外足可筭取其九天之上思本二式師十二式師三十六式師在九厄之中與出萬里之兵九圖八陣之中得隱身而去也此法甚妙難明須是先師一一面㸃示猶恐不得行帝授之後果逢五十九戰七戰蚩尤等皆大敗帝隱思本師玄女轉雷公太一六壬之式蓋身而出萬兵兵不能見得見帝身身出九天之上註九天之上自有式經具載不復出逈離災害也令學道之人雖無主兵之事然且得道力忽蒙上帝恩盼念見賜天符作十萬之陣救百萬之衆忽應命合先思式書師著紈丹衣執節持式飛空而來保衛弟子身出九天之上願師而降領將軍吏兵註將軍中元下元有六將軍式中主兵將軍六人思見各領兵五萬衆隨師而下圍身三帀又更遶身三帀隱身於九天之上急急如律令百千萬衆師李某與弟子爲大將軍保舉師爲副將軍即思存綱頭大禁師註授金鎖流珠師是綱頭大禁師李惠舉乗雲而來駕五色獅子手把天式紫衣到面前三歩心禮三拜次禮保舉式師各三拜心禮訖捻三師式訣註訣在左手第五指第一節右邊懷中取式蓋頭上走馬突圍而出入軍陣不傷符五道一入兵不傷符二令彼兵大將感畏敬不被損傷符三戰難賊符四出將令強敵符五令衆軍安心强力能戰雄猛所求如意符天上術入兵保不傷符第一卷内符並朱書右入兵敵十萬人書彼將名符下以太衝加月建天帝印封符不被損傷符第二右天上術入兵保大將感彼軍衆畏敬戰難賊符第三右天上術入兵戰難賊出將令强敵符第四右天上術出將令强敵令各軍安心强力符第五右天上術令衆軍心安力强已前五符並皆是師一一書甲子日授與弟子弟子後因入軍用思存本師即自一一通靈朱書使用皆大驗如神出没不可妄傳天師在西蜀與鬼神戰二十八交戰每陣皆思存後聖君在前鬼神望見後聖君便大敗倒戈後伏死敢有拒敵老君告左右先生曰卿學道須長存思本師行法法術早得成道上帝遥喜賜得神通出離三界水火土常六甲日及本命日立存本師如見在虚空中五雲之上飄風仙從三元註三元將軍九人各領功曹吏兵百千萬人五德註青龍白虎朱雀玄武黄庭大將軍各一人兵士各隨方萬數驅御皆本師所使東方八十一萬人西方三十六萬人南方六十四萬人北方二十五萬人中央十二萬人此是天師告王真人之言六紀註紀有六人人各兵馬一十二萬人柱天大將軍一十二人註人各兵士三萬六千人六甲中干支將軍二十四人註人各兵士六萬人官將一千八百人直符使者三萬六千人玉童一千四百人玉女二千四百人皆隨師從弟子入兵不驚兵士不傷神官祐護入陣皆强急急如天曹太一道君律令右件將軍吏兵百千億萬衆隨師李周沖虚註李是法師周是籙師等行法救弟子出此兵陣破擊彼衆逆黨令如山崩地裂傾没海水大風揚波走浪衝破衆弟子軍衆心雄力壯保得全强彼須大敗急急如太一尊神律令即捻都監訣三師訣遊師三訣註都監在左手第一指第一節遊師在第二節捻之三訣訖即禹歩三遍了即動鼓爲陣看取去就而戰便保无他守固更爲上老君告十方真人曰註十方真人蔚那臺鄭仁善勝淨加徐來勒等是十方真人之號有十人經文呼爲十方天尊是也此十人從盤古三皇已來至於今代唯十人而爲十方天尊之位不退不遷鎮於十方之地卿爲十方之師鎮於十方世界勸善度人正傳道法不得傳其非人非揚正教改易邪用翻師易典妄說是非如是之人切不得傳度妄傳得罪師弟俱破如有此輩吾當與卿懴悔令彼此无罪於是西南方真人善勝啓曰臣下有一弟子真淨能爲人古雅能言美用唇口或臣又見曽於世師上經法道士路子真受上經上法周備雖未通靈而且極法臣即授與金籙玉籙上經註是金鎻流珠上經三元五行正一之法也上古謂之金籙玉籙金真飛歩名也并引四十餘卷授與初受之時寫書未畢臣令且寫寫畢即一時以署師名并保師名而淨能與書隂暗註古人謂隂謀爲隂暗相知也相知代署作父真王靖名稱我是繼代祖父文書不令臣署如此之罪其復如何伏願天尊賜臣大慈大悲之恩見捨妄洩之過老君告曰卿罪猶可貸淨能罪多不可見捨此名自反心神謀道背師之罪罪大於不孝父母天地自責不久即亡身敗家註後十年身家俱滅豈非天責也吾此恩弘捨小小非謗及授世代善經教法相繼聲教者即可度脫其罪而況是金籙玉籙引法皆解脫大道内心印訣躡履天地斗服星註一名配衣迴天轉地綱紀天關此是正真之道其罪科律无捨卿亦退仙一階五十年爲下界人師治病三千人功而補其患後果被退仙一階爲扁鵲先生善醫病三千人滿復其本位爲師之人及思存師之人切須精慎故授此盟爲存師思師之訣令其師弟各自謹節心思其報告註夫爲師授弟子未可盡一受其道内言祕要之訣事須再奏天曹校勘可不給付天曹報云得過可責保舉狀任付亦未可便授亦須更三試五試事事過者乃可授之不然前授經法籙三等且令備行若也精䖍身心不退敬奉道師即可授訣然其口訣不可全兩卷三卷傳付道要事須祕惜漸漸授與以喜天心上帝遥敬重此師弟專志之心後聖君告尹喜曰爲師甚難弟子不易彼此難易故爲難易註爲人心不同多有反敗師道又以師傳不真滅落符文斷截前後訣要所用不通師弟子俱得其罪慎之許傳文以三試試之得過可先傳經法籙三等又且試三年五年志心不退及可給與靈書内引引入道門即得繼代思師存道行用有靈驗也修身助國救民註夫道志之人常行救濟之心每尊師道之教而若尊重即代代聖驗威靈通神相承不絶思存有神有靈若也告命不行違逆道師思存救急甚難有其驗效制鬼理神上賢志道依此逕訣以爲師弟位入仙真註老君說師志心與弟子志心奏授正引法訣正度弟子弟子志心奉道孝師思存用後即立驗也後聖君告諸初修爲真者四十九真人註四十九真人初學真人行是徐甲施存孔方外揚真李子期李八百劉根張漸成吕經問周上和王登魏華存樊真瑛二人是女真李少君李少綱王子年韓元信張少真石帆公秦交黄泰等四十九人係代相承師道也曰夫爲正受法籙靈書正引訣㫖要弟子者在於思師存師也若行往離家百歩外或二百三百歩不論逺近但是所到之處未坐前皆存綱頭大禁師乗雲龍及從兵將至心拜三過願師得真仙王昇度上天登髙位爲我註今仙皆不稱我此非禮今稱臣某是其正禮開度五道註後聖言三道八難今張天師改爲五苦八難相承未敢全用也五苦八難名入仙籙永成真人身家長蒙降賜道恩道力祐護敢負師道之恩畢叩齒二十四通捻三師訣此法甚妙行之一年百病離身千神保衛二年之内身家人口永以平和三年驅使通靈天地感應心口四年仙人也但以心懷正直无黨无偏五年之内永爲仙人二七年欲昇即昇欲住即住人間求仕宦亦得也金鎻流珠引卷之四
