front:
  text: 金鎖流珠引卷之二十五辭五
  hash: sha256:187a2882b05749e9951964fe159220a0131de4a905f4a680402afb10b25caafb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_023-001a, image: hfl/0636/0636-004.png}
body:
  text: 中華總真大仙宰主方平張道陵趙升王長司命李仲甫茅盈許玉斧等係代選述中華仙人李淳風注表奏請補考召法中靈仙職大遷舉賞三元六甲七星九天二十八宿三十五神官五嶽九州社廟法老君曰夫天地中萬神皆有主領官屬大道儀律禁制分明賞罰俱行人神俱有功者賞有過者責名曰考召所主所部條約科令也科曰若有考召法師奏一弟子堪補考召法中官吏者將軍言功五百仙靈官言功四百功曹六甲將吏玉童玉女直符官吏各言功三百諸籙吏兵各言功二百左社右稷大廟小廟大社小社各言功一百有具在考召儀中選奏章中具此故不載於卷中遷𥙷自有文儀也州國郡府州地多水火疾病災害不安作符章鎮厭法太上老君告羅法師曰世有郡國之地多災害人物不安卿可與安之但以四孟日四孟日寅申已亥等是也躡地紀飛天綱各三遍散大禹步十五跡左手捻都監訣右手把符符牒向前書了即作此法敕符牒令使跪受將去按後聖君敕天師步綱時切不欲見步綱了喚使人向前跪受之符牒前往後與作書書表上鎮尅厭制章二通得正并二十八道符往符目在鎮宅儀中上古一十二符近張天師二十四符風添二符家主州縣主帶鎮身家母亦一符即授符二十八道往一十二符鎮安宅十二神上十二符帖門戶上及後門竈上井上貼四符家主家母等帶之其災害疾病三年之內即永無也更須一度鎮之即六年無災災不起更一度准前鎮之即永百年無災害起右儀云高真上聖云良宅三鎮永即無災此法先在太玄金鎖流珠正一經中趙芮書出引中用行救濟人物同國郡府州破山魈鬼及妖精鬼作𥚢亂者遙與收斷禁止法老君教太極真人徐法師曰卿若為國主府郡之主作此法禁斷當以前書符牒及帖訖便躡紀三遍散三步九跡禹步即捻都監訣及山鬼目刀支等訣山鬼目在左手第五指第二節右邊急捻之刀支等五指第三節上急捻之訖敕符牒符在三部雜符之中分付時呪曰乾尊耀靈坤順內榮云云又敕曰月建某神日某神則玄啓好日良辰六會喜會宿天倉則玄澡浴清齊燒衆寶香供養諸天大聖皇帝老君北斗七星二十八宿乾坎艮震巽離坤兊八史神人盡觀弟子某乙至心珍重敬受神符謹請東方青帝神符音治角執縛惡鬼付牢拷南方赤帝神符音治徴執縳惡鬼付牢裏西方白帝神符音治商執縛惡鬼付鑊湯北方黑帝神符音治羽執縳惡鬼鑊中煮中央黃帝神符音治宫執縛惡鬼付鑊中五方惡鬼盡皆攝一切精邪悉以除從今巳後願某州縣鄉里某乙合宅大小並興隆榖粟盈倉綾羅滿庫千災萬禍逺送他方惡鬼凶人作口舌之徒並皆消滅叱咄急急如太上女青玄都鬼律令又呪曰太上老君先天地生被照九氣罷廢群精社公等祟本無真形丗人死者假易姓名不上鬼録合被誅形聞我符牒到即變其真形但以汝是山鬼及龜蟬等不得枉害祟亂并作疾病中傷道民某甲三魂七魄催遣急還佩其真形形如太上急急如律令太極真人曰勑符帖即云今日當直官某神直其神假如今日是甲子即云王文卿從官一十八人符吏天季二人須把符帖行下事允不允事須告報急急如律令又如太上老君律令日速把符牒往彼與廟社城隍同心併力出兵收捕勘責云云云者即有事須言盡得允謝事須允逹訖報上考召院者考召法師身家常自厭鎮口舌法老君告徐法師及羅法師曰卿為考召之法常發心助國安邦救治百姓事須目厭鎮口舌天地水三官之中多有𡜍鬼妬神常令人心性凶粗不依道理即致令身家足染人唇齒常每年五月五日輒書帶一符一年之中永絶并正月一日吞一符心不起口舌夫口舌皆起於心性中生如心性不生外亦不起如心無性靜不曾妄妬𡜍於人人强為已之口舌者可以八月一日五日於靜室中躡地紀三遍不用飛天網但地紀禹步訖即散禹步三步九跡又重一十二步又轉一十五步即呼彼作唇齒人名小呼之此人妄作某乙身之口舌羅列千言萬語某乙禁止令即便止止即吾巳不肯止者死急急如律令誦地紀一十八呪從吾受天地氣當為天地使云云直到金木相伐水火相滅銅口鐵舌等十八呪畢也永斷不發若不伏更發即便誦呪彼自凶敗至死後聖君告天師曰此法大驗不可妄行須是真實即可為之太上老君不許妄為之作害平人身得罪退仙夫人被自妄無故為口舌者先且止之三度止之不止即可為此法為官人及百姓厭鎮口舌法太上老君曰夫為考召法師者以清淨身心清淨者身心清淨也性不食肉娶妻育子也但以心常直不偏不邪不貪不欲不妬不𡜍不憎不愛不侵不奪不爭不競不淫不濫也後聖君告張天師曰常以忠直無偏無黨不受偏囑偏求之人可行此法身心正直不生淫盜天師曰此兩字難明伏請開解告曉聾俗君曰自巳有妻妾不妄淫他人妻妾子自有經法籙須受莫以冒法盜法比之大惡之罪慎之至道不為若有志士精心學道并為官清化妄被妬𡜍之人非謗毀斥讒佞口舌來去不止者可以與書符三道帶之彼人自休符在三部雜符中檢書得不具此中如不休以六壬雷公式等共封之有法在式經中式經中有符印如法行用一依之甚驗於水火之速也封式訖於淨室中躡地紀三遍飛天綱三遍散為禹步三步九跡配衣轉天關遙指之呪曰五行相推金木相伐水火相滅云云誦三遍訖呪訖捻訣訣在左手第一指甲下捻彼人合口速於水火此法神驗祕之為官人百姓斷內外注祟鬼賊妄為蟲蠱殺人不止法太上老君曰丗人不論貴賤皆有注祟內外死亡為鬼入人宅妄求生人魂魄代死遂作注祟祟家中生人以兄弟或父子相注如此者往往有之丗人呼為墓李尊師慧舉口訣云即今祟家疾也不絶可以求生替死者為此死鬼被蛀蟲咬死魂魄亦被蟲蛀所侵食如人被蟲蝑等所咬不安恓惶至甚所以求替代道士若有法術斷得此疾其功甚大天地為之歡心令子得道救得一家獲一百功功謂之陽人得不病不死隂魂此得離蟲食人苦切痛毒之難託生為人身便無怨注之氣也道士可與救斷禁之止令斷生死得恩聞天地道功也老君斷注有符五道并牒帖地界社廟城隍神官上古只言社廟無城隍神起自吳王芮墓在吳中至晉時太守劉文景於吳中築城到墓上至夜城壁俱倒土盡被隂兵運除明旦不見城土俱不得往如此七八度太守即夜令人捕捉夜見一天子從地中出從兵數萬衆却捉捕之人罵之曰我是吳王芮也我墓入地二丈卿何要苦築從墓上過吾每夜使人崩城運土非是别怪卿能移城垣屈曲離墓百步吾與汝保護此城人物令生丗丗平安太守因此留墓移城立廟因此即有城隍神官今諸處即有先葬在地府與地府議太上天帝便許所在州縣有地主者便令為城隍神官之首符牒出勑驅役甚驗應於口允達等衆出兵馬與直官把牒帖百姓行帖官人行牒是也入某州縣鄉里某人家收捉注祟鬼賊云云牒依前引上儀課為帖牒太上老君斷注符五道二道在此呪中是驗者三道在三部雜符中尋取多在正一三部中非靈寶三部中世有靈寶三部雜符太玄三部雜符六甲三部雜符六壬三部雜符六丁三部雜符等總是太上老君所撰集七十二卷並出老君正傳中法也二符神驗具於此書三符真前注卷內符並朱書右符治病注人困苦瘦甚吞之除差每日服一符右殺注鬼注蟲符用素淨合盤盛水安病人前畢别一人把符投水中七日符沉注鬼注蟲總自死人病安神驗不可妄傳非人牒帖及帶符門戶上符並具上引儀中自意課出得後聖君告天師曰卿欲為萬民治注疾者可躡地紀三遍散禹步九跡配衣著斗為衣身如北斗斗君真也轉天關指之病人所住之也方即誦八卦呪一遍八卦呪云乾尊耀靈坤順內榮云云即坐與書符五道與病人吞及帶佩之帖勒限若干日差訖報便依限差甚驗為官人百姓斷瘟法老君曰瘟毒之者中害人物也人物得氣一人染得氣過殺十人十人得其毒氣能過度殺於百人便有死損死一人十人憂之也世人謂之無義病不論貴賤善與惡染病其命皆即難存既以一人致命十人為之隨死上古至今往往皆自見也吾常恐學道之人被多與他人憂故出此章以防災怪也吾有符十九道以能治此病者為之差但染病吞此符三日大差當日小差此符是太上老君親授黃帝帝因行之留之世代相傳至今是其真本大驗二符神驗者書此卷中一符未病人帶之與病人一處坐卧不相染易一符病人吞當日汗通小差三日內大差也右符病人吞服右符未病人佩帶共眠坐卧不相染易老君大符長一尺八寸下有勑曰老君神符主收五部鬼王劉元達張元伯趙公明史文業鍾仕季等五蠱行百毒使黃奴伯桑雜俗六丁之鬼得即腰斬不問往罪急急如律令此勑亦書安大符下帖安大門上其符在三部雜符中故不具書出此書三部雜符中自有斷禁瘟一章符本細尋取後聖君有斷瘟大章一通上此章後應口瘟病自消滅上此章須素食三五日或三七日或四七日五七日六七日大驅若先百日齊素神驗也在金鎖流珠上帙中不具於此書章在金鎖流珠第一卷中有十紙已上未書之奏此章依舊法老君曰夫欲斷瘟法先須得彼病人姓名某州縣鄉里村郭住郭言坊也去某年月日因某人染得瘟鬼氣病至重或死未死即言重死即言死經若干月日差某人又染恐後連注不絶伏乞大道慈悲一一請禁伏望處分法師與判今更連注某人云云具如辭狀法師判狀訖即朱書符於淨室靖中躡地紀三遍飛天綱三遍訖散禹步三步九跡三遍左右是三遍更一遍是再步是也誦呪曰吾託身三五之中魁𩲃之下千鬼萬神盡為吾走使天下精邪惡鬼皆伏死魁綱之下無動無作凶人伏匿縣官者消口舌者匿疾病者急急愈叱叱叱急急如律令呪訖便書符牒牒訖捻瘟鬼目目在左手第四指第三節刀文在節上捻之鬼自死此法大驗吉遙與禁斷永斷如不肯斷上大赤章斬之鬼死人活大驗此瘟病切不得僧人呪術加持他不伏却破反損昔吳王孫權內宫被此疾僧人法超從西國來甚能呪術請呪被鬼所殺師弟五人死宫中有數百所患人致死也發諸色符牒牒遠州收為祟神鬼邪精法老君告黃帝曰帝欲追鬼名書大符太上即今牒帖也上古謂之天符人鬼同呼即今人知是大道符鬼准前呼天符夫欲行此符皆有法術文訣追召勘問捕捉不同故以分别之於後追速於水火帝請問曰何得知其鬼名老君曰但令彼之作辭云某乙病經若千日不差百方醫藥無應有鬼毒精祟所為伏乞追勘大王但勑黃帝即云勑道士隱云判云云九州土地靈祇上古有天神地祇無社廟中古有左社右稷亦無社廟入漢魏晉宋巳來便有社稷神官更入齊梁陳隋即有城隍神官後聖君勑下為考召法師所管呼為社廟直符所由城隍神官管佐助考召之法行符送牒遞過本界以法相承如州縣相順以斷姧非城隍社廟相送以捉妖祟此是上天大道養人鎖鬼之術驅龍使神之法本起上天宫闕後聖應代告授有道之志人勘之即得本祟名字便作法勑令若干日差決鬼禁地獄地獄者上古之法畫地為獄獄以三重畫之有罪之鬼禁於三重畫內十日五日伏承罪訖即斷罪重者合死死亦不逃走不合死者故即不逃走因此相承名曰地獄後人不達時儀稱有地下地獄受罪甚重妄作言惑丗人自招其罪之大今道術之士帖社廟禁鬼准上古畫地為獄禁鬼謂之地獄是也病差帖獄放出云云云云者從今向後切更不得為祟後犯必誅斬者老君曰夫書符檄帖牒出於千里之外萬里之內者先書符檄帖了未封印前作法於淨室中躡地紀三遍散為禹步三步九跡配衣轉天關指某方心存思此去若千里當直官某乙乙是六甲輪日直官名字也須把符牒帖分付天神地祗龍鬼今時不用言天神地祗但云付社廟即得近代有城隍具備行用甚驗行下某州郡令捕捉某鬼某祟事速允達疾病差事得引達行下如判訖報即捻都監目訣都監在左手第一指第一節是也發牒問逺親故平安請報消息法老君曰夫人修道志心未得行往彼州有親故欲得消息知彼善惡但書一牒付地祇祇今城隍社廟是地祇也令當直日神官把送仰二日內報者地遠千里之外即云二日萬里之內即云五日不得住滯急切或云五日內報者書符帖牒訖即躡地紀三遍散為禹步九跡配衣轉天關指某方某方是親故之鄉住處之方是某乙住處其某乙是臣則玄某親或叔伯兄弟姑姨之屬具名也善惡具報捻星使訣訣在左手第四指第一節是也直到夜常看天某方分野忽有一星飛去即是天地差使往彼勘問即報報來必實如不見有星散入彼州分野報來定虛不可信直須更為之即得真實也應夜有星須看之若有星散彼方報來必真實後聖君告夫躡地紀三遍即動天關天關差使往彼看勘即報是真實如無星使往其報必虛非真也是符神直官吏作假須以再為再為符神直官符吏問罪後令往問語云符吏直官不依科罪重准科科自被天上科決十下已訖甚驗不可妄言之常閉口為國尅斷妖星惡祥異氣欲作災怪法老君曰天有妖星祥見必行星者日生也故以上是日字下是生字故聖人云星為姀必臣反君子逆父弟子背師行之也風見此丗是常見有天有赤氣名曰惡祥此二事臣反先亡天知有此惡祥故見祥氣令人見人中有道術之士為國鎮尅一令莫發君臣無憂無事二不知覺覺後以發即以助國令國强早攻收伏此為第一之功上天賜念功滿白日上升雲天為仙真之人也志道知之須避臣或有修志道之人在此臣界內者見星氣所臨其州地分野速須早出避之上吉切勿住居逆地令志人失道且風聞李氏承上得仙祖者繼代行此隂功之德天與之仙祖耳君而有道與君僣申僣申者此是有道之人僣行安居助國之法即後法是也君之無道易姓隱身逃他方丗界隱避改易姓名此名志人指禳妖星法老君曰以素食齊心心定志齊正心神故齊心三日宿居别室不近女子七日女亦不近男子七日即先躡地紀五遍天綱一遍順也散為禹步三遍一遍三步九跡二遍十二跡三遍一十五跡下出外誦地紀十八大呪一遍配衣轉天關指之往往如此不過七日日作三度且午夕三度為之如此二十一遍星落妖散國無災也如此之人有功於國百姓得安獲福無極災星妖氣俱滅縱餘氣暫生不過一年半嵗而自敗散滅也此法行用亦須捻訣訣捻刀支看在何方定金木水火土捻之後聖君命九天玄女下親授金鎖流珠外篇第十卷言九州十道萬國符圖授李僕射靖為右僕射用兵𦔳國通神濟丗忠謹而號神將使隂兵也靖用通神佐國安人聖恩封為神將注已具流珠中引不載老君曰此法名落星之法只知有妖星之法而除之不須問其地界人名姓也此說太上慈悲之心但看天上妖星為國除之不問地界反臣姓名所以大聖之意慈悲之言不欲知有此人故作此言以誨賢達大郡諸侯忠臣良將令起忠孝謹節之心以尊奉上不移之志也或以天上妖星不見地下土地無妖災氣不生兩得無災平靜國泰人安獲功無極往往如此白日升仙得為太清真人之位為府郡官人斷妖災怪祟亂身家法老君曰丗人不論貴賤皆有妖氣强來為祟亂或為光怪或託妖人覓食或打人門戶或燒人屋舍或病注於人或偷人財物或驚雞犬或送蛇鼠狐蟲百種靈異禽獸竒物血水之屬入宅為怪祟者至多不可一一皆具於此中但是妖災千變萬化之物來驚恐人之者皆當與書符禁斷之永除三符在此中其餘符在三部雜文中即具一一檢取也書符訖法曰躡地紀三遍散為禹步三步九跡訖配衣轉天關左手指某人家三度是請符厭怪祟之人家口存吐紫雲蓋他宅即分付符給引差當直日官某乙六甲當直日神是把符或書帖小小即符斷大即行帖牒符止之不過百日如若惡精祟者不肯便休事須將帖追科縛送出界如更回即便誅斬也永無怪祟斷百怪符符主厭不祥宅中怪陳光精鬼妖犬縮鼻上牀井沸湧蛇蟲咬見鼠血之類以符吏斬之老君告羅文強天師曰此符厭禽獸龍蛇為怪祟者懸符版上竹竿標之高一丈二尺不過十日之內作怪者自死必無能害人若是鬼神為怪者事更上赤章書斬永斷絶者後聖君告天師曰龍蛟作怪祟人當以自身出牒牒五嶽四瀆靈神官九州社廟共作關津同心併力收捕訖自身出天關之上轉天綱加地户式也是天式地式雷公六壬六甲四時等七式衆力收捕追之立到身為考召君出門門之上躡地紀天綱禹步配衣轉天關行不逾二十里近十里之間龍蛟被捉來見即更禹步三步九跡三遍進前大呌一聲訖捻刀支斬之為兩假便永絶滅之大驗步躡各三遍具三遍三遍前注訖大叫一聲斬之不論水陸自身不能變化騰空為之假其威地借其力聖矣大靈驗但知考召必行此功前後相繼晉時許遜為之白日升雲上天天地大喜老君曰妖精者莫過於龍且能上天人能所獲妖氣隨至星劒而威靈怪者莫過於蛟且能入水藏避尚被禁術之所獲追捉在乎須㬰故以天生其人人靈之甚但以精心靜志勿妄行用存想本師法自成就靈怪自消滅絶水神水龍蛟刀支在左手第三指第三節上右邊綘絹急縛之妖怪死日解縛除一龍一蛟功獲三千白日升天大仙真位也係代有道術之士與世除祟害為百姓家斷妖怪祟亂身家法老君曰天下人民家妄被妖怪祟亂身家不安者但以真具辭於大道考召法師下以滕投之師具法以讀辭今後聖君改令作狀道士云辭官人百姓真為狀投告法師與判狀畢考召法師與判狀付案切與禁斷出符書令為帖牒也敕勒即令為祟者應時獲斷符在雜符文中此不具載如辭言不肯者便與躡地紀三遍飛天綱一遍一本云夫行法總不用飛天網但言行地紀之法散為禹步不用餘法散為禹步配衣轉天關指之誦十八篇呪應口消滅後永不為災也老君授黃帝曰百姓欲生捻百怪訣訣在左手大指甲下以右手指甲捻之金鎖流珠引卷之二十五
