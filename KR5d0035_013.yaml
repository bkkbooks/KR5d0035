body:
  text: 中華總真大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註五行六紀所生引太上老君告太極真人徐來勒是也曰五命之中唯火命帝王則吉似衰則病註按五星論云火命人小年多憂病及長大時忽不稱意亦病長助王時即吉上仙皆用此法轉令常王盛吾今說此妙法授卿令卿常王不衰不病也卿可常用庚寅辛卯木日可作小壇子註按五行相成記云夫醮祭作壇須向用日前先結土爲壇三級髙一尺五寸古仙爲之也今志人修求以黄土布地爲壇佳也此是作一時之用但於淨室空院之中用黄色土乾篩過布地爲壇祭醮爲上如不要却掃除之不妨髙一尺五寸註令人心存壇髙一尺五寸用得用酒五升或五斗註夫大醮五斗小醮只五升或三斗醮脯脯用鹿脯鴻鷺脯也一斤五盤餅果三果及時新物等酒盃一十五席六領五方五領一領按前菜二十五楪酒罇一坐褥鋪設如法畫嵗星君帶之左肘後祭醮嵗星君以王火之意也然五君總請俱㑹於壇此即請客迎賔共作福力之意是也須作啓請王相辭文讀所請五星從嵗星起註文在下醮𥙊引中具說訖一畫嵗星君一人與青童一人及木符三道同袋繫之於肘後一云香木爲之長一二寸戴安頭此謂之戴王入相盛之无窮註香箋沈木堪餘木不可也有人用金銀爲之戴頭且此即不入相成王盛爲火剋金此入相剋也異域香木及香不入中華用者不堪犯道禁註夫大道中華正教天地神仙之言我中國神仙之郷人不合夷戎蠻狄之寳爲神仙之不合燒異域薫𦤀穢毒烈辛之香此香犯道禁又非真人常修行之香也真人愛紫微幽木之炁箋沈之木聞之皆喜胡狄之香故皆惡聞其炁上真爲之辛烈毒惡之炁也王桐栢謂王子登曰蘇上郷愛燒辛烈之炁衝於中華天尊形象之前地府奏上太上大惡之退仙一等減位階又長令掌西國陁佛臺永不離胡身胡地仙人也卿可能依此之法十年位爲真人一生无衰病之時也徐君依行以箋香沈香爲嵗星長一寸及鎮星君青童君三身各長一寸以錦袋盛之戴頭上五年并思存如見三君爲之下化爲老人告徐君曰公以身堅體王萬邪不敢干也可能轉乾坤於指足轉乾坤是飛天網躡地紀是也指是掌訣皆在指節足自身左右脚足歩綱躡紀是也納三六於心胷註三是三元將軍皆能納入人身六是老君六甲符修行吞符一十四年真人也如此十年白日昇舉爲大仙真人也君初聞不識及其日久漸有悟知爲之八年白日上登太極仍傳數弟子不轉乾坤也猶數百嵗後隱於山而絶世也土星被木星來害我本命生位宿者註土雖居中位爲戊巳而无正位寄王在四季辰戌丑未之地是常以甲午金日壬午木日夜初星宿見時於中庭淨掃地握固閉炁仰觀太白金星拜三拜註太白星有不見之時若不見即存其位即得不必須見啓曰臣某乙行年若干嵗某月某日生本宿某星今被嵗星木災作祟禍害某乙今請西極上臺太素君太白星之神往剋㓕絶之勿令生出犯觸臣所生命之星及生日所管之宿當與臣等速救度即令木精自消不生災害急自退散害炁頓消敢負上聖之恩乞令臣長生久視身家平安敢負上聖上臺太素君之恩即禹歩一遍躡地紀三遍配衣轉天關指嵗星九過九度捻木訣存九鼎金隔斷絶之勿令生動祝曰五行相推金木相伐水火相滅云云又五命之中唯土星三十餘年而一周天也所以逆行不隨日月星之例行也常以臨人生命宿皆不成吉而衰厄之甚不問金水木火土之人皆須常存呼木星君姓名帶木星之形圖於左肘後吞木星之符如此往往行之則別同星宿人當受之自身得出過也太上老君告於修行欲真之人曰註欲真之人徐來勒光妙音常歸山李元布真定光妙含元通等未得仙時受此訣於西乾竺國等傳授卿今修五星之法不論於命相剋者即修行之不剋者不修亦不可也吾授卿等此法不論衰厄强健皆須隨月取日修朝五星謂曰朝皇也夫五星是五行之主又號曰五星之皇故曰朝皇行之一年五徳常備於身二年使之立驗註夫五星化爲五德將軍青龍白虎朱雀玄武黃庭等五將軍是也朝皇五通日正月六日午時二月一日申時三月七日子時四月九日辰時五月十五日子時六月三日午時七月七日子時八月四日午時九月二日寅時十月一日寅時十一月六日子時十二月十二日子時至其日入靖室宻處燒香北面五再拜心呼五星上真皇君五夫人名字三遍註毎一再拜中心一呼曰某星真君某星真君夫人以王星爲始心再拜呼星依當時所終次行木嵗星真皇君諱澄瀾字淸凝夫人諱寳容字飛雲火熒惑星真皇君諱維亭字散融夫人諱華瓶字玄羅金太白星真皇君諱寥凌字振尋夫人諱飊英字虚恩水辰星真皇君諱啓喧字精源夫人諱玄筆字龍娥土鎮星真皇君諱藏睦字耽延夫人諱空瑶字非賢畢叩齒五通拜訖立叩齒解巾長跪曰註脫巾置地便長跪執笏注心臨目視爐微言某州縣郷里註官人言官品位寄某州上清玄都大洞三景弟子某嶽某帝小兆真人臣某乙年若干歲某月某日生謹上啓日月五星上皇髙真道君夫人玉淸太上上清上皇上帝大道聖君几前某七世父母在生之日所有𠍴過逝殁之後被諸考謫者乞蒙原赦使幽魂得從禀錬又某長生在俗不知經教造諸罪過不可憶識又入道受經巳來違負盟誓犯破科戒以螻蟻餘息遵慕學業希求慶㑹特賜恩蕩乞得解脫三官告下天帝使罪名蕩散削除黒簿乞賜兆與五星之真倶奔華辰上登上清交行玉門都畢註稽顙泣請良久乃著巾更燒香五弄拜出勿令人知恒修太上隱法招存五星上皇者五年之中彷彿形見七年都見與之周行十四年五皇一合來下共乗玄華之輿三素紫雲前導五帝後從萬真五星攜之共載白日登辰上朝玉淸受書爲上清上真人五行所生成後各自别變所生衆物註萬物因五行所生亦從五行所滅前後論之衆物入通靈者亦能守固鎮治人身故以名傳授註後聖傳尹真人真人作五行符記傳丗墨書具後尹真人五行記金行初起註丗本合木行在初爲是後聖君授飛天綱祝金水木火土用金爲首所以不敢攺也若據時人論五行即木行起爲首金是太白星下散而爲金也金既能變化精魄假太白陽氣而生商註商是太白之陽氣凝結而爲人是也金隂氣所生商也商是人也既生爲人自取姓商也既有其姓即與羽姓之子婚生六子長子却取祖姓金金之孫過海東爲國是也二子姓銀分金之姓也三子姓夏非今代夏氏之祖其元字爲上下字四子姓姜即今之姜是也五子姓章即今章之姓是也六子姓狼即今胡姓康姓是也而後年代久遠莫能既受者以漢代京房推律再定五姓過而取其本立五姓亦未知得定以否若取元炁而必不同若其炁得同姓與金合服金而得駐顔延年久夀之益馬君傳曰服金液方雖錬金而爲液不如服其粉兼伏而爲水此三等别自有經經在上清法靈書中又服白金銀鉛之徒皆與本姓合同服而有益不同服之无益也銀粉以服銀爲銀膏皆以銀爲之有方在上清靈書中又伏鉛爲紫河車法此法神妙在大丹法籙内訣柔黄經中不復具出又伏銅爲紫粉紫花輕雪方在大龍虎籙靈書中又伏五金銀銅鐵鉛等歸祖法歸祖金也鍊銅鐵等爲黄金法方用公云云在大龍虎籙靈書中此不具載又鍊鐵爲神寳器法器劔鏡鼎方在寳劒籙靈書中商者人也具前注說人是太白之陽氣散而結隂炁乃所生喻夫妻也金石者是隂炁下凝土而所結爲物故將商姓之人教以金石相宜相益利者燒錬丹藥之功添助修行亦甚有佳益註昔黄帝時公孫懷常鍊金爲粉或爲丹服之而年三百歲不死容貌如四十許人帝因問何不昇天仙對曰臣少小无師可師自以尋求名山皆遍至南炎洲之中括蒼天台二山上古名括蒼也遇華蓋子教延生之術未得昇一之道但五金之中臣可以變易數名丹法藥法皆得度丗而得長生千歲萬歲年命只是不可得昇天仙之真帝因問其故對曰金性重故不得昇天帝再問方懷對曰臣鍊金爲粉法鍊金爲花粉法錬金爲水法鍊金爲蘇法鍊五金爲水法飛五金爲丹法化五金爲丹水法錬五金丹水爲蘇法錬蜜五金法錬五金爲液法錬入金通神藥法錬液入玉通神法鍊前石入神法巳上藥法並皆只得延年駐顔不老不死之道遊行五嶽養育子皆以百年八十七十住處即得如過此限即須再移居攺易姓名得如不依太上不許帝再拜告請此神經懷授之帝大喜封懐爲左右先生此諸經方並在上淸靈書中此故不具太上老君曰吾常念於下土地仙飛鍊五金推候水火註夫五金水火俱用濤飛也逾年成敗註夫飛鍊者千人无有十人得成敗者甚衆辛苦註夫鍊合金石等是得師㫖者下手得成上藥大丹九年得成謂之九轉如不得師㫖冥冥自爲不論年月皆是不成辛苦至極歲月虚抛如此辛苦之甚不如服履五金之祖註祖是太白金星太上令依日修行歩五星服太白及五星之炁仍更進登斗履天綱躡地紀之法即白日上昇大勝燒錬金石水銀之輩也且上真人之藥燒錬法只在數字而巳奔辰揖想五行之主註五星也登真隱訣具說奔星行五星道也飛七斗併馸災註七斗北斗七星之數是躡地紀之法具發爐歩祝俱足配衣此名七斗地紀之法歩九星鎮魂魄註九星中斗也是陽明隂精之九星是也固守内炁註握固閉炁拊心躡履是也含弘吞液註大仙自有金精玉液行事之吞嚥而巳往往行修功成仙伯註行五行七斗九星三元之法一十四年功滿上昇往往白日拔宅而去者多矣此之樂好樂之意天之性不假苦頓心神勞力註此出老君内傳中語告元命真人言也木行初起丗木是歲星下散而爲木也木既能變精假歲星陽炁而生角註角是嵗星之陽氣散凝隂而爲木也木陽炁所生角角是人之姓也既有其人而取其姓即與徵姓之于通婚生九子長子祖木姓二子姓大後攺爲大巢氏三子姓東四子姓姫五子姓姒今總攺爲周六子姓長七子姓春八子姓弱今總攺不可一一具也九子姓盧今閭丘家是也即今合爲角姓之人即合服餌木芝性與木炁合同者即得延駐歲年長生之壽木公内傳曰東方木姓角角能生於萬物非獨人也本性與金相剋常畏金不欲燒錬五金反爲六賊於内五藏必虚魂魄不守居賊在内也可以服月精食土之英英芝也出諸仙飲水之靈具後可即養生紀綱七星先舉天庭木姓早成修易得成也九子之父名先姓角角先有二妻前妻九子各自取姓具前注後妻亦九子而不別分總姓角今按東方以九重數故爲九九之號也前後各九子以分散居東海或海中者皆嵗星之散者夫修道之人皆須知此木星之變化功大也當知二九子所居之地木之王火夫木星皆宜益四命之人火命得之爲上上道成也何以火木相王火生於木木性好生於火相得故先力次金也註爲金剋木故苦能下求木必得次於火人受福也五命之中唯土稍畏木以人弘之則畏若於五星宫則不相剋何況其星君註五星常㑹於人間飲酒並不相惡丗人知之祭吉其相剋星之精也以金木水火土性之故而人能作訣法而用之即无水火相剋大約木性善求受使修行之人知之故取冬至後立春前擇吉日而祭木星君爲首後五君總請行之五年星君下降受子木英之芝生於戸庭八年五君總降靈瑞於子之室也一十四年五君下迎子於五都遊五色霄臺註東青玉之臺西白玉之臺南丹陵玉之臺此黒霄玉之臺中黄金玉之臺觀仙樂毎臺隨方計日東九日也餘方總如之祭醮木君若得恐合此得本命曰第一如无即庚寅辛卯即得如土命人即不用此日用甲寅乙卯日戊寅庚子辛丑日吉用蓆十五領香花燈燭時果或飲饌皆須肅浄致真降靈註三五一十五君官精總一時請即一十五盤或三十五盤註若更三盤三元將軍六盤六甲三盤六紀將軍一盤柱天大將軍七盤十九星大衆二十八宿三盤三台衆星九野諸星官將吏兵衆菜楪八十一如齋楪酒杯八十一坐褥香按香爐一十五和香五兩註除樹香佛香安息香甲龍腦等香臭炁者不堪五星甚惡之用箋沈降真蘇合檀丁香酒罇五香爐五案六面花燈四十九或三十五二十八隨力所置註天子及諸侯論千論百今之四十九者修行人力辦不得而巳雖是故少錢一千二百少乏之人一百二十文或二千四百天子諸侯言一萬二萬或三萬四萬是鎮坐錢素絹一疋天子至於諸侯言一百疋或一千疋上金二分天子言斤諸侯言兩是也時果木珍部寳花十二箱天子諸侯八十一箱星月明夜黃土爲壇鋪設畢即發爐祝讀文儀儀文別出云云三讀九獻三讀文也九獻酒也禮畢即吞五符以求五德鎮身也鎮呪然後散施一切不散招冥罰後聖君告四時五行符九天春夏秋冬命符木行歲星君符火行熒惑星君符金行太白星君符水行辰星君符土行鎮星符巳上六符後聖君授東海小童君也童君是木命人乃下故授之令與諸命人修也巳上符並朱書太上老君告善惠真人註善惠真人是西國胡人是身今爲後聖左玄真人曰木行星炁好生也可木王之日時先從木星履匝五星棯金水火土訣後聖君授天師五行主五星之訣木訣在左手第二指第二節下西上第二正節上王木訣火訣左手第三指第三節左邊王訣節正中土訣在第四指第三節金訣第四指第三節王訣節下一半米水訣在第三指第一節王訣在第三半米是此是五行訣常行事之時以五色筆隨㸃之令訣得滿行修往往如此三年五星君變下教子修真所要皆得自然至道之人而一切不爲唯言好道即與子道下五星禹歩三遍盡誦五行祝十八篇一遍行之九日位上仙籍遷仙品定生真之名去九厄百病三尸九蟲凶人惡鬼圖謀口舌即得永入神仙行之九年註毎年春季中有三月毎月中行九日此法從天綱履至三台五星畢方即禹歩擊指有凶鬼即拳拳重一十五斤常拳止凶鬼自伏死敢言即北斗伐之而不可妄行之也嵗星屬北斗九星君真妃嬌女等下嵗星君與五方星君北斗九真君真妃五星君夫人註真妃北斗真妃也夫人五星君之夫人也等衆𥙷署上清真人之位十四年拔宅妻子上昇金鎖流珠引巻之十三金鎖流珠引巻之十四言四中華總真大仙宰王方平张道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風註五行六紀所生下後聖君告玄洲二十九真人曰卿欲爲天人師須傳道要修真内訣授於志人非人不可妄傳反招其殃夫真人傳此五行真訣及此符醮祭之道也且諸要真上道祕重在於捻訣配衣轉斗指天能飛雲走雨拔折樹木者龍也志人得此妙道訣之者但行躡飛註二事翻出禹歩禹歩三年配衣捻飛龍訣轉天關指之應手墜落而死雖能指落不可妄行妄行退失仙位知此即不行也非人將爲戲弄一時之能不知其龍无罪而死反自罪身并罪及師也須切禁之勿行須有敵來害身避不得即可行之少時速須解註後聖授此訣只與志道者保䕶身家夫此法左禁右解註禁即捻左手指解即捻左手指聖君授天師左禁右解用之无窮也錬河車法張少真得太上老君教且延駐一千年爲下土鎮災後便未得昇天恐其五藏敗散方用青鉛二百斤註汞多者曰盃鉛澤精者曰磨並不堪用唯伊陽及波斯者計紫爲上也甚有力右置一仰月鐵釜量大小著鉛用猛火炒之候鉛洋訖徹底匀攪之須㬰自成青砂初建火其鉛又有成青砂又有未變者但匀攪不停變盡即止如火轉冷處即爲鉛欲便遣成鉛黄花者鉛作青砂後猛火不歇匀攪之即成鉛黄花乃青砂於盆中少少益苦酒漸添研之用糖醋不全用釅者澄濾細砂訖於瓦上曝乾須㬰微微火炕之取帝流漿粉入左味團之磁粉入左味也不得此法團鼓之不成鉛曝乾即入鑄道鐵鍋中上下覆猛火燒皮袋鼓之其青砂須㬰即變爲鉛從鑄道流出下著一鐵器承取以盡爲度其色白明名鉛孫八反九轉成紫色凡一斤鉛九轉耗折十五兩得一兩强名曰金公丹一曰紫河車一曰金狗子一曰九轉寳一曰九轉鉛精用之云云别有經在上清靈書中及龍虎正籙中東木星君授太極真人介子良杏金丹方子良介象之孫琰之君曰杏子熟和皮肉留乾地地若濕以木板盛之待皮肉自消乾到秋初即一一所尖頭小孔見裏以文火燒之滋滋作聲即金出以竹刀取積聚之方圎一寸起一斤用作杏金丹註丹經在上清靈書中言黄花金是也餘金即山澤金非上藥也以今仙人未得金鎖流珠上經及此書者未可得入真人昇天且延駐身命一二百年尋求至人此修行上妙法也合錬以上清靈書具說不再註後聖君告黄石公曰子爲人師不知嵗星木精下入桐木之中以雷初震聲之時伐取東枝爲符授子房以霸劉氏爲主豈不救得數十萬人之命卿可不是行隂德者之功註流珠外篇用桐木符是此授也子房是漢將相張良也以用黄石公之計術滅於强項項氏與漢氏爭天下合殺一百萬人項氏始滅子房用兵收强項後筭前後七十餘陣殺者五十六萬人而收强項餘四十萬人得不還死之債後各一一得其死後所知前合還項氏軍之命以隂中衆讃稱子房黃石生之德也與我等四十萬衆人出得不流血之刑各得安卧而死爲清淨之鬼者恩之重功之大也以衆具啓太山君太山君知其事聞奏天曹後聖玄元玉皇上道君下將遷子房黄石生爲仙官雖不白日昇天亦得形託解化而去解化木解爲尸而去也補爲青城山洞天仙卿此木星化炁之功也恐至人學道但行隂功救濟疾病危厄貧乏及兩敵相刑解得散者及丗人被神龍鬼精祟害災害水旱疾疫相謀魘詛口舌如此之者至人當與解之甚有功徳後聖君告諸天真人曰有修行至人但以一心學道得正道正炁解不正之炁功德甚多妙重太上老君告禹曰註禹時老君季咠子教舜禹之道夫木星之精爲舟泛於滄溟之野以尋決水之所又曰木星之靈爲式天地註式天楓木也式地棗木也二木相合鐫刻爲天地萬神星象倶備上天下地轉輪相加以禁止凶人惡鬼如手遂心可投萬物可制神鬼迴天轉地可佐助我登歩地紀天綱之道也可役虎豹可指萬兵可加凶惡可止風雨可役使蛟龍可廻吉凶種種之驗也造之可以純吉人凶孝穢之人切不得用造此式并及木先被未死手把了其人後死其木亦不堪造式并及死人之式切不得看視何況凡愚之輩更取再用大爲穢犯丗人行式不通者也夫式不得僧尼見犯便穢觸也若是其道士自身居重服出二十五日外方可犯式用之如自式要用急解穢吞解穢符著吉服用之若別凶孝僧尼産婦切不得見把行用之如或女人受式常自量用有疾發即且不用把得須待過疾後用得无妨桐栢真人王子喬告第二女曰夫式者以防急用正當用有疾但吞解穢符并解穢水又呪用之得可佐助行道之人修禁制之法百无不通神力可驗自別有經圖吾當授卿太一註雷公四時六壬六甲八蠻六戎等符授禹禹修之十巻經爲四十九巻號曰黃帝集靈記註今集靈上中下篇是也并黃帝式經也後聖君授天師六式經十巻六壬籙三巻告曰木精散下楓樹之上生不髙人者靈式髙人者凶式雖凶且不通靈不中爲式得之依經所造祭醮行以佐道助人如神應驗无不通濟之者力可以天地而同功攝制在乎須㬰註式上爲天下爲地天地之神星宿神靈无不書遍行之如天地之功變化也丗人行之得道仙人出觀之矣又曰木星初散化爲棗𣗳棗樹爲萬木母楓樹爲萬木父註式經云楓木爲萬木之長棗木爲萬木之母也但楓棗之木老多年者即堪爲式何況別生式人式子之者通靈於九天也註夫式人於楓樹下連根生不髙人靈也夜能出取身踴上髙於母有人往往以綿試綿皆在樹頭即知其夜上髙於母身靈也此之木是嵗星真氣取之捐人凡不可妄斫損者殺人也取以道炁禁訣註訣在左手第四指第二節以五色絲縳之訖書取式符帶之吞符即伐斫得之以符帖檄註檄帖土地神官共取謂之曰隂取陽伐隂陽通天地感動神仙攝録神龍鬼以人弘之使之可移山塞海拔出樹木入兵入水入火皆不能傷也此是人心智慧之能弘用禀天地隂陽自即通神靈謂之妙用之能制而隂乾吉日造制主則端正上天小下地闊相等𩔖而則大小大不得逾四寸小不得無二寸東西南北不得長短闊狹中有天柱名配流珠中相次用註流珠中有柱天將軍亦如之配號名也且聖人之意造式象配天地驅御隂陽皆用之智智若苞萬物式性亦即一同是故萬亊從而用之即得但以善用天必從之地必順之隂陽行焉萬事成焉若以逆用萬事不得損之也卿能造制得一十二面式力可以道同行正一之右真教正炁禁爲道之武金鎖流珠道之左真教正炁禁爲道之文具其文武備則天地在於掌握隂陽在於心口一云手也立能取道須以忠心直性註忠以孝師直以濟人不邪不曲德濟人物用慈爲本先佐助郡國後安身家如此行心行法註法是流珠法法中配衣履斗躡紀是也行式其功廣大卿可即舉家拔宅上昇得爲天人之師註後果然如太上言今丗上行用之非禹定經也名用黃帝之言皆今古用之事於今用之即不如禹撰述經通靈憑驗上應木星之炁常以立春曰後春分前擇吉日而祭式神毎年兩祭醮醮式畢无事常封之註六壬本欠式封之文式上下天地相對不令失對對天上子亦對地上子雷式綱常加食神食神鬼門也六壬太一皆以天地相對勿令失對損人勿令網加自身本命四時式春夏秋冬各令相對用即冬加春則臨夏夏則臨秋是其用也其醮祭文儀自在黄帝集靈記上具也常以五色絲縛之勿令有移轉加主生命行年註行年在元辰圖儀注筭甲子行年是大行年三元行年是小行年八卦行年是遊行年三者主三元之用其餘筭非實筭也並无憑據驗用且甲子行年是前聖老君虚皇所撰爲六甲内符行年後聖玉皇上道君授天師號曰六甲籙行年筭取元辰五鬼之地相重必須上元辰章解之即過度此厄如此之人長宜王相即无憂厄忽有災厄加身身出厄不出也若據聖人取此爲行年即別說行年不是大行年也則有所損夫人學轉式常謀他人不筭自身若自行年近於四門之神天門人門地戸鬼戸切不得綱加四門也行年若在四孟寅申巳亥是也綱即不加四孟行年若在四仲子午卯酉是也綱不加四仲行年若在季辰戍丑未是也綱不加四季行年註巳上如有急事即捻都監訣蹔時十日五日事无即急解之即得若更有急卒未得解者取天式上行年神位上著長生符一道鎮剋之永不畏加臨人害也長生符巻内符並朱書此符一道安天式上本命行年神位鎮却災厄一道帶之於左肘之後用加諸式不畏反損巳身也五行初起丗水是辰星散炁而水也水能變精炁而從龍龍假辰星隂炁而生羽羽是辰星之陽炁散凝隂而爲水也水陽炁所生羽羽是人也姓羽既有其人而取其姓即與商姓之子通婚生五子長子取初姓水二子姓羽三子四子總成羽姓五子姓赤今之赤氏亦多攺姓朱浮吴氏是也又三子二子支中後代多攺易姓潘羅甘王石之姓也今據合是羽姓之人合錬水銀水銀屬水金屬商金水合宜合二物爲藥服而有益壽之理也浮丘公内傳曰北方水姓羽羽性潤長萬物亦能滅萬物以隨四季而行令生滅也皆用人弘之令潤益亦得令縱性損人物亦得本无正心而有正炁志人行温冷在人豈在乎水浮丘先生常以採水芝而食生長二百年遇太上前聖老君教中斗地紀之法四年駕龍體輕自能飛身五年辰星君下觀試才有九過便以別駕一龍與公公畏落身死再拜求乞自身生毛羽即乗龍无或墮落身粉爲微塵不可即去辰星太真君乃問卿姓浮丘本姓羽也與卿變履斗爲禹配衣之法行之五年體自生毛羽飛遊洞天此之仙官至貴至大何必要昇天其昇天亦到天曹引朝太平君後即還配於洞天也子若能即可便教公再拜請受君曰不聞有大禹之後是禹歩理水之時太上下教親觀履三歩九跡太上老君告禹曰卿不見靈疑羽鳥也鳥猶作綱三歩九跡轉石木取蛇註鳥尚有心如此何況人乎禹受教尋學法便成翻五斗昇於太極假水精爲尸而葬於南越公因悟而學之五年體果生毛羽一年能飛十里五里時人謂此人生毛羽能飛衆呼毛羽之客因而名也後七年能飛千里人洞天來往人間數百𡻕忽一日乗龍去不反五子各而有改姓雖攺姓不能離於北方因而爲五炁註諸方皆因五姓金水木火土爲炁數配五色一色各主一方今人故號某寅生青之子因是也積水之徳舒禹之功此即辰星之變化也稍畏土土雖剋水水多而亦不絶剋也其五姓之用唯水利物又能損物偏與木之相扶抱與金之相生相得修行之人常履水星即捻木訣金訣順水水即能潤真炁而扶潤於人後聖君告大王君曰方平卿弟子茅盈茅固是水命人可履歩之時先捻木星訣又次手指木星扶其身固其神乃可爲下真地上主仙位爲其年老神枯不復可昇飛百年千歲之後更不遇大仙人方可待上真太上老君告元極子曰卿註是无極先生秦人姓鄭名季初亦五姓之理偏於水姓有功善能敬水水龍見而授書善水姓敬重於水金命人姓重水常履斗偏捻水星訣心常敬之故也常以修行又爲水捻土訣如此五年江海之神與之相見教卿以役龍之法使晴雨如手應心立在須㬰豈非修行之時留得於水之功遂能奔龍走雨速也无極授後行之實如告言後乗龍而昇玄洲也又堯舜之時有山棲子許詢水命人常好敬水爲池常令家中人以敬用珍重因常行之次常服水一合如此六年忽池中心出鏡一面闊六寸圓羙如月詢佩之有鏡神十六人隨後行又有玉女十四人玉童十四人將軍一人詢問對曰我大神也辰星大君還我掌以北霄水母之鏡恐君所失捐君令我試子如實敬水信重五行常履星斗得法不矯用如試得過即與授天真之位後果試不過而昇太極不得上淸後聖君授茅喜註喜盈曽祖爲欒巴之師秦末得仙能以變水爲雨也變水爲雨法常以丙子日甲子日用水一捥左手把之履地紀三遍註如若熟但行歩心存爲北斗地紀之形不得作中斗形中斗屬土使雨不通皆須作北斗形如若思存熟有功不用歩網亦得但作行歩思存必驗三遍訖即翻作禹歩三遍以散三野六遍六野九遍九野即滿天行雨得九遍歩訖捻行雨訣舍九口水向天噴之須㬰天地冥暗即雨此法神驗不可妄行天忽旱巳切不得用之爲旱是上天帝所禁用之入反天之罪逆後聖君之告命必被退仙品此者聖君授爲其志人或被火災即可行用救人屋室及人被火難也散開禹歩三遍舒爲三野六遍舒爲六野九遍歩綱而所周九天作萬里之外雨也四方神龍俱奔雲走雨救某物某家火災云云註即武帝臣欒巴以對御飲得酒謝訖向西南噴爲雨救本家及親屬之火災消後帝方始知有其功能靈驗必是神仙道術之士敬之書史籍呪曰辰星之精積水爲形飛火忽起憑水之靈散形舒靈滿天自生靈飛冥晦龍噴而行霶霔五時彼災須寧急急如律令註王真人曰此法切不得妄行行之須是救家濟人方可任行之也金鎖流珠引巻之十四金鎖流珠引巻之十五言五中華總眞大仙宰王方平張道陵趙昇王長司命李仲甫茅盈許王斧等係代撰述中華仙人李淳風注五行六紀所生下之下老君告大禹曰卿理水之官可常以甲子之曰以朱書四海之神名於簿紙之上註四海神名東海神名頗利尼南海神名大遮迦西海神名和羅問北海神名文季問巳上四海神名各風新注入先並不書記早朝修行後而吞之三年功滿理水如地開江決河海之神水官四海大神功滿之立到令決開江河須捻四海訣自理三歩九跡而其名呼召之立到速遣此神非但四海内海中海外亦管如問之無不知立令取雨速在須㬰行之五年依前法捻鬼王訣訣在左手第二指第二節中北方大鬼帥毗沙門神到令與我助國云云云云者或伐某䖏反逆某賊或吐蕃西戎𩔖悉用之又常以朱墨𡍼其使鬼王訣目使上天入地入火入水入兵无不如意其四方鬼王名姓總此管主朝於辰星太皇君修行之人但歩五星註真五星圖在飛步經中五星圖步用五行註即變五星圖五行金水木火土是也五星從金起左行畢水註從金上入火入土入木入水五行從木起右行畢水註從木起歩入火入金入土入水各歩躡註躡五星歩五行五遍訖即散歩出綱外更禹歩四遍即使四門神助國伐逆如三軍之行江海山川樹木皆被雷風震雨拔塞立而變攺註變改江湖爲之塞斷山川爲之開決爲江河樹木爲抜出折亦能與人求長生久視之要火行初起丗火是熒惑星散炁徴徵天皇也姓徴餘炁爲銅赤石天皇擊石銅火燧人鑚木變爲火之生也火生於天皇燧人從此用火水變生爲熟是火之功徴註徴人也是熒惑星之子自姓徴即與宫姓之土子通婚生三子長子攺姓理今後聖李君攺取李之姓二子姓紀分姓戴鄭之姓等有三十九姓今正五姓之中唯火姓金姓合錬藥以爲正當其理皆必有延駐之功有延駐大丹藥盡成黄帝内傳師廣成子成子姓理經云廣成子是老君分身若據姓理即是一身代代出化人君人臣也若錬金液從金液中再九錬爲金丹亦錬金石水銀鉛朱砂曽青等爲龍虎大丹九年而成帝服之稍有少容且力强日行百里不倦後履躡天綱地紀結心印以在左手大指甲下以右手就之存之皆以八月三日十三日二十三日大坐爲之如圖或爲之立如含弘圖圖以垂兩手是隱也但存之如含弘不論立與坐皆由人意想太上老君虚皇上帝教元明上真人授結心印坐立總行黃帝所以晝圖弘一坐一立今以後人但修一圖而巳三子後各有三子所以三三九人也以角宫爲婚後代盛茂下足有出五行之人去世皆乗雲駕龍而去常繼代傳法云火姓註姓是屬徴姓是火也與火命註人生命屬火亦同徴火甚畏水註火行畏水何緣水滅火之故餘姓皆云相剋水火獨相滅故甚畏也常以四季日辰戍丑未存躡紀圖順倒反三等訖散歩三帀便存地紀七星圖處前變作禹歩指水星註星亦存之如五星圖五星足是也捻水訣訖次指土星捻土訣即呪曰五行相推金木相伐水火相滅云云呪在流珠中若一月之中能三度爲之月有三旬一旬之中皆有四季日行之一年一生无災厄疾患流珠及飛歩天綱經云一年辟非此即是也實但依此言无有不得仙之者若據手文經說修行萬无一成所以書此訣者是其志修志信直心之人可一一傳付訣以口傳繼代相付勑祝是其人者任傳非人者萬億金玉不傳時若无良賢人傳封於靈山又不得火燒水流天寳二年辟兵註行之二年三五併可出五兵後聖君告天師曰子可仙王三五俱則能强一上元主天即飛步天綱中元主人即演禹步下元主水地即躡地水聖君言地者北斗星也俱鎮水郷故名地水夫志心學仙去仙履地水即令躡地紀圖順倒反謂之下元即爲禹步三步九跡謂中元即履天綱飛行九跡謂之上元此說三者以録三魂制止三官五是五行此之說是也三年通神不死之道立在坐亡九年入水入火入石入木入日月無礙也太上老君授火行符與三天司命君佩以辟水害命水官戴安頭上註一云長戴一云本命及水日丹書戴之永去災害也去水害炁火行符右第一火行火命自帶去水災害後聖君曰前聖告命水官符皆是文字吾今一云今解說解火行一符後四符同用太上符火行蒸土塞水害災是也木行符右第二火行符以木人帶去金害炁符金行符右第三火行符以金命人帶去火害炁水行符右第四火行符以水命人帶去土害炁土行符右第五火行符以土命人帶去木害炁老君告司命韓君註名信向上黄帝時韓信非漢韓信也上古信上三天司命漢時信爲齊楚燕秦地之司命之官也後英雄死者不繼得韓信司命信漢將曰五行之中二行好人生成東方九炁主好生南方三炁主好成今大道之教以重生成隂鬼之教以重休廢休廢屬隂註隂者古謂之地教近周朝西國出胡神姓釋號佛稱丗尊以盛隂教人龍鬼中國名儒以號隂教通人龍鬼之教甚能勸善行心訣與道同且不合令勸人早化早生如此之見以重休廢不虚即不似重生成之義而爲大陽神之教以重生成生成屬陽註陽者古謂之天教本无別名三皇之世衆尊无名平等之教强名名之大强乃至黄帝之時帝重大强其名似不合大道之教律攺名曰天道近禹代之時而取正名曰太上大道也隂與月爲喻喻命不用久長註月即爲三十日十五日喻圓十五日喻漸闕以稱隂之主陽以日爲言言長生久視故隂陽二時行木火好生成是一二義行金水好休廢是一義又一行順吉凶註故土行順吉亦順凶是故云吉王順吉凶或順凶我此之教雖喻隂陽始生而作迥出隂陽炁去吉凶之道履斗歩星登上仙闕後聖君告尹喜真人曰太上虚皇傳此五行符於火者火屬夏熱能育成萬物又能火錬去塵災註金銀錬去塵之染以出光火錬去災厄以出疾是以火錬百功故書火行所傳於火行也太上道君告老君曰卿何命人也老君對曰臣木命人也道君曰吾火命人也與卿俱巳出於水火巳無憂註此二上真尊以身出於五行身無敗壞之期故言者所以憂下真上仙難離於水火身雖有延駐不過千𡻕水火輪迴衰苦相臨自當敗壞所生所殺非道不救故以師弟二尊論於水火後聖君吿天師曰吾聞至真二大天尊論於水火何也緣其五行之中水火相刑甚多病疾敗力崩壞天地何況人身有不敗壞之身難且其火星精熒惑之星頓散於陽炁爲火敗毒大風吹水水之精辰星頓散炁隂爲雷雨二物並行相攻相伐故爲天病受此狂風暴雨天被之崩石落星地被之折𣗳崩山人被之敗藏亡身爲此能病三才所以上真高尊論意欲得下真上仙之人受聽此言以受法於内心心須不受水火之災敗䈴身心令以得度以得度出五行之路求三清之心水火之性自然无憂不被水火之災厄是故前聖三尊將水火之喻以誡下真上仙令得度水火之災入无爲之性自然成真道身堅體淨天地也於身具前注有憂於人亦具前注卿爲人天之師可傳水火之符度下真入上仙令出水火之病註夫志人修道皆无水火之性棲宿山林精誠懇志香火誦經不休之者或有燒錬金石服餌之者或復絶榖服炁之者數等之人學道積有𡻕年䖍若皆不出於水火病衰老死而无所得至多太上道君令老君教度志心之人出於身中水火病及過度天地五行水火病致祝訣注解流珠中五星法要故出此書并後聖君傳天師法三五流珠之經制太上三五正一符籙八十一階護衛身家出水火之災也第一水符註符在靈寳五符中大者云是北帝符墨筆書之佩於皆上其五行總有符老君授與黄帝者是真本禹於荆山及再修行者小本非老君親手書本即稍似不如大本驗靈第二火符註此二符同在五符中此不具書出老君告南極真公曰卿年多少真公曰年巳一百一十七嵗須行即行須走即走炁力不退鬚髪白不再黒君曰髪白是閑卿身未離水火云初不識後自思量良久方知頓首再拜求請伏望太上大慈恩濟枯朽之骨得見長生之道且﨑常蒙師言汝身未出水火之災豈得神仙之任不知將何出於水火其水火皆稱壤劫之年復是何年即到老君笑良久而言水火之劫汝身也身若不出水火即皆敗壞故謂之劫壞豈天地有壞崩之期乃告水火之義符訣此卷與之行九年道成至今爲南極真公鄭子﨑字仁安本行經云南方赤帝鄭仁安是也至今猶佩此二符并五符帶佩第三金木土符註此三符志修行人隨季帶佩服朝禮月三爲之又本命庚申甲子日爲之餘日不用帶佩謂之五行符其水火行者常戴之頭上永不除二年一換書皆本師親署名書皆有日後聖君告尹先生曰五年靈寳五符書各有日東方青符以立春日請本師書帶之於肘後南方赤符以立夏日書西方白符以立秋日書北方黒符以立冬日書中央黄符以冬至日書及春用清明日夏以端午日書各以依節候正氣日書不能依節候正炁日書即五月五九月九十月十此三月書之亦得夫書此符本師書清淨設齊素方以日中時授與弟子應帶佩是木符左肘後火符戴頭上金符右肘後水符扶肚中土符佩於背上其五符上須各以錦袋威之一書五年換如无本師老弱不解書者即保舉師書如无即衆中法籙髙三五足者代書得此人名出五行之訣不可妄行令不禀靈炁之人書及知之五星五帝不伏也各以本師傳五法五符之日書之與籙同各授唱弟子唱授明度法如師不知五法是出五行之要訣度大劫小劫之靈文即應不别書符同度即以立春日起首具前注中請明師書之隨季帶佩如恐五行災有相臨即吉日書或五月五日九月九日此二日是續命消災之日書得廣成君五月五日書水火二符朝授黄帝日中又授金木土三符帝再拜請問對曰前除水火後出五行註天下真上仙之人身雖得神通自在猶未出於水火心雖出得水火身即未出身心俱出天地水火未出夫言水火之災身心與天地俱出者謂除水火離三界即中真大仙也夫三界金木土也金俗儒依佛喻金玉珍竒七寳可女音樂不受土俗儒喻官爵榮貴守土之驕富不受木俗儒釋喻樓閣臺殿不坐心无所著愛謂之心出三界之外此依道科此名心出身猶未得出身失敗後當來丗身却受榮之貴正在三界之中五行所管著謂之身不出五行之中内我得中真之要除水火之災出五行之外超三界之上身心俱住經天地水火不能害及於身心行佩一年五苦九厄自消二年能去萬毒降伏五兵三年却死來生四年受職人丗名書玉京五年得離水火註離其災非是便不食水火之炁其炁不能有毒中於佩符之人太上老君告尹先生曰佩水火符五年水火不能害佩金木土符金木不能剋土木不能賊五等離身身堅久長生不入下等神仙品位也六年七年漸更妙力二七年白日上昇註五行總妙水火爲先是主生成疾敗之宗也老君告諸大真曰水火二字非但下界人物所畏成敗註縁人有命信食飲於水故以出成除敗爲難故以畏者也乃至髙真大仙常修行次亦用訣步不休於本生註生命也道君寅生火命常以丙寅捻水次火訣以求取獲長生何況丗人不求長生須以本命日記爲命日土行初起丗土是鎮星散炁宫註宫地皇也姓宫名風地皇以土德行丗積土爲臺竪石爲柱築土爲穴室註髙藥土爲山百丈有餘四向穴孔爲宫室居活用此穴爲宫字姓阿以宫字重口故宫室築土爲之髙臺作數重掘穴以安養人口重累義所作宫字故重口也此臺𡻕月久上掘穴崩壞損下人皇觀之知上崩下損宫室故以書害字如宫相近故作上口破損勢下口之所以用此字行世記之上剋下也因此則丗流行害字上應土星即多害剋之炁行損人物病死也室大號曰宫宫而爲姓也今人以宫姓爲長起地皇之意重人故尊土姓而爲長五行之初也與徴姓而通婚生子六人長子攺姓風二子姓工三子四子五子六子巳上四姓風也徴姓妻亡又再與商姓子通婚又生六子長子攺姓公孫二子攺姓力三子攺姓飛註今改姓湛任是也四子五子六子總承宫姓且地皇有一十二子以取土炁之盛與五姓而同居通婚子孫甚至王象土星之輪迴逆行周天之意故取土之寄王四季也常以此土害炁周行四季不停以人命被臨者被十日即有其病知之人捻木訣歩木斗註東宿七星是木斗以消之即止故土偏畏木木能剋土土常扶木木爲之所畏修行人若是土命即捻金訣止木災若木命人即捻火訣止金若是金命人即捻水訣止火若是火命人即捻土訣止水若水命人即捻木訣止土故立五行之中唯土行最多刑害之炁故以五行相生相剋皆附土行之中又土星三十五年一周天九野管五行今五音之中皆宫爲首若據飛步呪說即金爲首二說不同註按三才論云天地人謂之三才從有天而即有地地立之後土是地生所生前土而土生金故合爲首按尹先生記神靈具録云老君母金命而生老君老君後上昇遷後聖天尊位故告命三官北斗呪曰金水火木土亦理不失縁五行皆所以生而以居地上後聖君取金爲首也夫土者是三界之長也老君告諸帝君曰吾常念下真上仙學道不離於三界何由可得不生不滅卿等既明三界何不起心度於後未暁之人令得永逹度出三界不爲魔賊所障即出三界之上三清之中而爲至真豈非慈力濟度之功而益身无上之德也火是三界之男人无火而命不全故須假炁以熟生養身根長命之脉也水是三界之妻人无水而即死人得水而即生生死且須得水水能養萬物何況獨是人乎後聖君符吿命三界魔王言卿部三界人物皆歸非三界不生非三界不育非三界不長長成生死輪迴而不知其返水火无停生滅歸土无貴无賤老少俱同來去迷心不知心從何而出得我三界魔王衆俱稽首再拜乞求出於三界之上而心俱愛不知令去水火此身即餓頓而死非水火而食不能熟非土而水火不能居住相成故知某等之人寸步不得離苦何爲出得三界後聖告曰出三界有六等法若能依行身心自出三界何用禁食於水火夫水火是隂陽之真炁土是五行之主何用而即除之且上聖天仙其用俱別我今一一示卿須聽受之一法身心受教離水除火註水火二性也夫水火之性利於人人謂之德若起水火刑於人人謂之賊是名二法天即不能禍地即不能災註心除水火之性天不能害地不能敗身安也二法身心土鎮鏁津註喻身上仙者精也志人行房帷之事閉精不洩洩即損神少津敗身能存歸神溢津潤身通多且行不陳自有經㫖而得天真三法制金理火註本命日從地紀一遍後散爲禹步捻金訣在左手甲爲火五指指金星三遍訖即誦金木呪呪金木相剋云云四法制木理金註本命日從天綱一遍後化爲禹步捻木訣在左手爲金斧指木星三遍訖即躡三度誦五行祝曰天綱中呪金水木火土金木相推七星煥煥天綱最威云云巳上四法是消三界之災害五行之相剋若依此法行之一年身中五苦八難九厄百病自能除之此即是順本師履地紀躡斗傳度時受訖今即本命日修真出三界五行之法也註按太平經内品修真祕訣云上清大真人未昇天以前皆一一取本命之日修行四等法訣後歩履斗星躡地紀昇登天門使入金闕玉臺而後聖君也五法總制五行於身之外身出五行之上註後聖君曰授天師訣制五行於身之外法六甲有六旬六旬之中皆有本命日先躡地紀訖即躡三台即履五星各須五遍誦五行呪十八篇流珠上卷是訣即步火綱三遍順倒反三遍是也亦誦順倒反三等呪訖即出東南地戸上立面西北存思將軍吏兵先存中元三將軍領吏兵如圖中元主人次下元三將軍領吏兵主地宫奏身有功修行不闕次上元三將軍領吏兵下迎次五德將軍次天公雷公等將軍各領兵馬百千萬衆五雲飛空金剛力士引身上朝太平金闕帝晨後聖君存之如三元將軍圖具冠簡紫衣如法諸衞從如含弘等三圖存之唯加具衣冠簡六法常以庚申初夜註初夜一更是巳未日初夜入五更是庚申日定之也思存出如含弘圖以斷截三界災厄三尸六魔三官九地落滅罪根添益壽筭落除三官死簿注上生曆神真之位畢叩齒三十六通握固即捻本身司命訣服去三尸之符註符在五十將軍靈書中畢即任安卧卧起五更二㸃前後又思存一如前法一度訖吞符行之一十二度三尸蟲永去死亦不敢來便是上真之人可貴可保此法微妙不可妄傳非人殃及七祖矣金鎮流珠引卷之十五
