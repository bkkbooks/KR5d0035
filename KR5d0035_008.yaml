front:
  text: 金鎖流珠引卷之八思七
  hash: sha256:74cb72d3c7e3389e887aee7576f78291f6863e8dcde7e7ce362475f5e2e7ce86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0035_HFL_008-001a, image: hfl/0632/0632-066.png}
body:
  text: 中華總眞大仙宰主方平張道陵趙昇王長司命李仲甫茅盈許玉斧等係代撰述中華仙人李淳風注說上元三部將軍及三功曹等圖卷内符並朱書老君曰上元上部將軍一人也主掌三清註上清太清中清之上大羅之中註大羅天名也羅者都蓋三十六天謂之大羅也其大羅之中列於四方一方入天言東西南北之地四八三十二天中淸至於太淸三天三十五天吏包上淸一天總三十六天之丗界世元始天尊說度人經云有三十二天三十二帝皆說中清之下四方天也又不說坐者中天若總元始說法天總三十三天是其下界都數天地丗界皆有帝王巡檢人神龍鬼之徒也從官百億萬衆兵士也本姓盤名體註上古上元將軍一人姓名至三皇天皇之丗太上老君爲太上大道君萬道之主之時遷盤將軍一人入大真人位以唐短替上元上部大將軍之位因兹始也用法思本師在身之前註傳此法師即可存之如不傳此法不可妄存反損存用之人昔地皇氏不受妄存忽一旦將軍見身長九千萬丈聲似天雷呼地皇爲地氏之子子師何人攝呼我身於是地皇對曰臣師是五靈老君將軍又曰子縁不師於五靈老君若師老君我更見身責子將作何也子師東來子爲師且束來子身受經法玉籙不足金籙全無口訣云我受道於東夏子夏子是來子父雖父在之日傳於經法從來不曾簡寫妄言授簡道於靈山是何山上妄言妄語殃及子身容子三年理人後當代責子之罪於是地皇日夜憂懼恐死即登山渉水尋求五靈老君五靈老君見來遥知被責便言曰大皇奉道不真罵道不神今被天神所責怨在何人於是地皇氏再拜老君唯稱死罪鄙性好道修求不眞自身本是愚人令逢愚匠令某妄修行天官責罰敢望人身伏乞大道大恩賜納驅使免得三年之外天官責罰其罪恐失人身何敢更受皇位老君即變大神通閉炁捻訣西土人謂之結印是也須㬰之間唐李徐三將一時俱下與地皇氏爲保舉度大道金籙玉籙八十餘階天皇地皇人皇三皇内文内籙等經四十九卷修行十四年得道理丗八萬九千年後而昇玄丘之臺自身在本師後捻訣更存思上元上部唐將軍一人姓唐名短註小低聲呼之此神是太一尊神之上將也不可妄呼身長九千萬丈上五綱神功曹一人姓姜名毒身亦長九百丈領朱衣百千萬重人朱衣赤幘手把金符帶龍淵之劒領兵百萬衆在三十二天之上太清之極總領天宿星斗之神註太上老君告盤古王曰天宿者二十八宿是也星斗者中斗九星九精也應是天上九野星斗皆屬此神管領也號曰功曹如國中宰相之位也上元將軍如天子之位也故曰巡檢三淸之極也大羅四方之中一切生死皆由注落注生落死也王須知之則長生不知則短壽盤古王知長存於眉山之上出入左腎之中如此十四年得道理國八萬九千年而昇太極一國男女同昇從天而下存見鬱鬱從雲中下皆在人泥丸註泥丸是身腦之宫名曰上元上部將軍所止之宫住也與左腎神相應相通人常存之止泥丸鎮於左腎女人鎭右䁂是也如若不能知辯者看於含影圖即思存得天地萬神與身神通鎭一身之内更捻司命之訣即能立取長生不虚也此是後聖君告命於五嶽靈山修行之人葛越彭壽等二十八仙所記於修行靈山述記敘錄不傳世人之宫註金鎖流珠云泥丸之中後聖君告云宫藏在左腎裏註夜卧常存鎭於左腎女右腎白日有事或衝出從左眉上而出也遍滿天入來覆人忽思用衝出左眉上從天門雙出也註金鎖流珠中无雙字後聖君吿命浮丘公有雙字是也何以知也夫人修道更身得道亦象天地故合相應且上元將軍是天神大仙官雖通人人以籙强錄在左腎腎中者是人神與天神通靈相應故人身神出從左腎而出天上上元將軍即從天門出同於人身人身亦存眉爲天門之狀如奏章存圖也團團雲中轉來覆人身家也註金鎖流珠无此三字後聖君告命浮丘公有此三字至如修道之人得道之後濟家助國救人何況只一身一家而能濟无極他方世界之人若身家及他人亦得有急事向北斗呼之即有降下與卿註金鎖流珠无三字後聖君吿命中有解滅災禍因神龍鬼註亦无此八字是告命中出即身轉天關於手結法印於指註是捻訣也訣在左手第一指甲下以右手就捻之少時禹步十二跡或九跡註大禹步九跡小禹步十二跡此是後聖君言大小禹步若太上老君言十二跡是大禹步舉天關指有祟之方註或兵官或病人所住之方是也或惡人鬼來處之方也即自消滅速於水火註言此法急速之應立能通靈无事輕唤身心家滅亡註金鎖流珠並无无事家三字亦是告命中出注上引太上老君吿黄帝曰身家國无事妄存身家滅門不可輕唤爲金籙云輕喚北斗及上元上部將軍身心滅亡太上又告安和子註安和子是神農之弟學道於恒山遇太上老君降授於上清三五飛歩天綱地紀之法常存三五之要訣引感得三元神降下教授修行之道白日上昇炎火南極之天丗界火鋉金石而爲根之地曰三元之中上元上部爲貴尊如丗天子之位甚能令人得道存用有日不可妄爲除本命日甲子日上元日註甲子是上元甲子日是除此日之外不可妄行損人存修行用爲之如忽有身家急疾事被人謀害重病垂死兵賊存呼之立即滅亡極驗不在此日亦得後聖君告天師道陵曰卿欲教人求出災害入長生之道取彼人上元註甲子中有上中下三元暦日中取本命之曰夜於北斗下燒香思存本師訖存見上元上部將軍下入泥丸宫次入左腎次中元下元註中元入右腎下元入心中夫思神先令止於泥丸入於心腎安鎮五蔵即捻訣禹步四步十二跡訖思存之出覆身如含弘之圖周備三元五行雷公五雷八卦日月星宿周畢即誦五行十八呪一遍求長生一年便入不死之道二年名入長生辟兵出厄通靈感動天地心欲便成俱入泥丸後各依入心腎中少時安鎮身神定即出之如含弘圖畢捻訣閉炁禹步十二跡求生出厄一年之内神驗立成甚能佐天綱地紀之道卿其勿妄傳非人此法三元内法能以直逕入大道之門祕之吉泄之凶老君吿上古三元神君曰夫修三元皆從上元本命起次即中元次即下元三元周備修之一年之中或得五度註上元甲子六十日中有本命一度中元甲子中有本命日二度下元甲子中有本命日三度以次到上元周而復始取本命爲之二年之内得十日修行即得其不死之道後聖君授上元上部將軍符一道與張道陵吞吞畢即存使之无不如意并勑令係代相傳志人註仁人是其志人志道之士令得真人之道後聖君授上元中部將軍符一道與道陵吞吞訖行中部事并令係代傳其志人令同得真道後聖君授上元下部將軍符一道與道陵吞吞畢行下部事并令傳志人代代相繼同稱至真之道後聖君授三符一一吞之主告命上元三部將軍令佐助受太玄三五正法之人修行思存呼召立到依口順心直使令應心口急急如律令三符並朱書又告善行子註行子是李少君之孫承祖之福德得道昇西嶽洞天中自稱善行子因而爲名卿好道學雖功勤不得其理理從三元而修從五行而入子可師道陵於是行子入蜀投受上三部之法五行之要修十四年滿昇西靈仙掌洞天兹後有數百人承此三五之法皆得爲真人太上老君告人皇曰王求至道欲得真性真性在於三五三五之力是爲道祖如水出泉得其流源如人出穴得其門户註上古穴居故言出穴王受之壽極天地註人皇受之果得長生在位八萬九千年後全宫室上昇太極亦留文於丗今傳人皇文老君曰大道有千門萬戸其要甚少前敘三五始生引亦說三元猶未盡其根本今一一具件於卷後綱訣呪符存用等爲少言語逕引直入重門見道註此卷說三將軍畢說歩綱正訣存用呪符術等應是上元三部之中事盡說一一具件題目次思上元中部李將軍一人姓李名拒註低小聲呼之是太一之尊神中將也身長七千萬丈領註金鎖流珠總不言領字前聖君受引書上中下皆有領字多應有此字流珠出世年月深逺丗書寫人漏失之故必非先无必有今行用依引言得五剛註據洞天中本作此網字前聖君授引此剛字後聖君因教松子言五剛功曹即是此剛字定也風爲流珠本是金籙前聖後聖猶不賜改易風未敢便改功曹姓張名李一云季字是也身長七百丈註流珠本无身長七百丈此五字前聖引有五字百千萬重人註按流珠說不周細其事並不顯若按後聖君告命東海小童君言上元中部將軍一人姓李名拒身長七千萬丈領五剛功曹一人姓張名季領天兵百十萬重人莫知其數此説即是二人是將軍功曹也其餘百千萬重即兵吏也赤幘右手持㦸腰帶消魔之劔註流珠云上部軍唐將腰帶龍淵之劒中部將軍闕字元名太上老君授引消魔之劒名也後聖君授東海小童君云三部將軍三人腰帶命魔之劒是上部也消魔之劒中部也按天師言多有失處蓋從古如此非近代人書失在太清之中上清之下註老君告韓義子是太皇曰天之孫太淸是太極之號也上清是大羅之中是三淸之中之號也中天之上常降入人泥丸宫右中具前言少時入右腎之内鎮按事畢須㬰出於右眉上如含弘訖上應天門出來註後聖君告天師曰卿出上元三部神將本存從上三清之下人身泥丸中少時又存入右腎中鎮身蔵訖即思從腎中上右眉頭出如出天門是也此謂從天而降我身受我之使使巡天檢地滅凶惡之故命三官見我身與天地大道通誦之通神我身則千神萬鬼百靈千邪萬精人龍畏敬於我我則身入无爲之德便得長生之道也存之如圖註含弘圖存在右眉頭出出漸漸髙長身亦隨之長大髙十二千萬丈訖即收手捻三元將軍訣即歩上部中部二部併歩步訖叩齒三十六通即開目呪曰前聖後聖教臣一云稱名長生飛歩三元九將萬營行御六甲配衣七星吞六使七註六六甲符也七七星也凶惡斬形金木相順水火相成人无干犯鬼无妖精若有犯我者天關滅汝生註即轉天關指之即消滅也呪訖即歩上元將軍綱三遍次即中元次即下元三部各有綱圖一一各三遍歩綱一遍歩帀皆云攝攝註重言亦三遍叱叱註若有凶人惡鬼徒即云叱叱三遍若治凶人捻惡人刀支註人刀支在右手第五指第三節上右邊左主殺右主放放攝皆得其理可不妄行行之切須依道治惡鬼捻鬼刀支註鬼刀支在左手五指第三節上邊總是鬼刀支具一一言其某鬼即捻依之金鎖流珠引卷之八
